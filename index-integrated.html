const isDataUri = s => typeof s === "string" && s.startsWith("data:");

async function compressImage(dataUri, maxPx=800, quality=0.72) {
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      const scale = Math.min(1, maxPx/Math.max(img.width,img.height));
      const w = Math.round(img.width*scale);
      const h = Math.round(img.height*scale);
      const canvas = document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = ()=>resolve(dataUri);
    img.src = dataUri;
  });
}

function useStore() {
  const [site,    setSiteLocal]   = useState(DEFAULT_SITE);
  const [author,  setAuthorLocal] = useState(DEFAULT_AUTHOR);
  const [novels,  setNovelsLocal] = useState([]);
  const [messages,setMsgLocal]    = useState([]);
  const [loading, setLoading]     = useState(true);
  const [dbError, setDbError]     = useState(null);

  useEffect(() => {
    const unsubs = [];
    let resolved = 0;
    const check = () => { resolved++; if(resolved >= 4) setLoading(false); };

    unsubs.push(db.collection("settings").doc("site").onSnapshot(snap => {
      if (snap.exists) setSiteLocal(snap.data()); else setSiteLocal(DEFAULT_SITE);
      check();
    }, e => { setDbError(e.message); check(); }));

    unsubs.push(db.collection("settings").doc("author").onSnapshot(snap => {
      if (snap.exists) setAuthorLocal(snap.data()); else setAuthorLocal(DEFAULT_AUTHOR);
      check();
    }, e => { setDbError(e.message); check(); }));

    unsubs.push(db.collection("novels").orderBy("createdAt","asc").onSnapshot(snap => {
      setNovelsLocal(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      check();
    }, e => { setDbError(e.message); check(); }));

    unsubs.push(db.collection("messages").orderBy("createdAt","desc").onSnapshot(snap => {
      setMsgLocal(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      check();
    }, e => { setDbError(e.message); check(); }));

    return () => unsubs.forEach(u => u());
  }, []);

  const uid = () => db.collection("_").doc().id;

  const setSite = useCallback(async v => {
    const next = typeof v === "function" ? v(site) : v;
    setSiteLocal(next);
    try { await db.collection("settings").doc("site").set(next); } catch(e) { console.error(e); }
  }, [site]);

  const setAuthor = useCallback(async v => {
    const next = typeof v === "function" ? v(author) : v;
    let toSave = next;
    if (isDataUri(next.icon)) {
      try {
        const url = await compressImage(next.icon, 400, 0.80);
        toSave = { ...next, icon: url };
        setAuthorLocal(toSave);
      } catch(e) { console.error(e); }
    } else {
      setAuthorLocal(next);
    }
    try { await db.collection("settings").doc("author").set(toSave); } catch(e) { console.error(e); }
  }, [author]);

  const addNovel = async () => {
    const now = firebase.firestore.FieldValue.serverTimestamp();
    const data = {
      title:"新しい作品", subtitle:"", author:author.name, genre:"小説",
      tags:[], description:"", color1:"#0a0a14", color2:"#1a1a2e", accent:"#c8a86a",
      wordCount:"", updated: new Date().toISOString().slice(0,7),
      chapters:[], createdAt: now, pinned:false, locked:false,
    };
    const ref = await db.collection("novels").add(data);
    return ref.id;
  };

  const updateNovel = async (id, patch) => {
    setNovelsLocal(a => a.map(n => n.id===id ? {...n,...patch} : n));
    try { await db.collection("novels").doc(id).update(patch); } catch(e) { console.error(e); }
  };

  const deleteNovel = async id => {
    setNovelsLocal(a => a.filter(n => n.id!==id));
    try { await db.collection("novels").doc(id).delete(); } catch(e) { console.error(e); }
  };

  const addChapter = async nid => {
    const cid = uid();
    const ch = { id: cid, title:"新しい章", content:"" };
    const novel = novels.find(n => n.id===nid);
    const updated = [...(novel?.chapters||[]), ch];
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
    return cid;
  };

  const updateChapter = async (nid, cid, patch) => {
    const novel = novels.find(n => n.id===nid);
    const updated = (novel?.chapters||[]).map(c => c.id===cid ? {...c,...patch} : c);
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
  };

  const deleteChapter = async (nid, cid) => {
    const novel = novels.find(n => n.id===nid);
    const updated = (novel?.chapters||[]).filter(c => c.id!==cid);
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
  };

  const addMessage = async m => {
    const data = { ...m, date: new Date().toLocaleString("ja-JP"), read: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp() };
    try { await db.collection("messages").add(data); } catch(e) { console.error(e); }
  };

  const deleteMessage = async id => {
    setMsgLocal(a => a.filter(m => m.id!==id));
    try { await db.collection("messages").doc(id).delete(); } catch(e) { console.error(e); }
  };

  const markRead = async id => {
    setMsgLocal(a => a.map(m => m.id===id ? {...m,read:true} : m));
    try { await db.collection("messages").doc(id).update({ read: true }); } catch(e) { console.error(e); }
  };

  const addMurmur = async (text, files) => {

    const now = new Date();

    try { uploadedFiles = files||[]; }
    catch(e) { console.error(e); uploadedFiles = files||[]; }
    const m = { id: mid, text, files: uploadedFiles, date: now.toLocaleString("ja-JP"), isoDate: now.toISOString() };
    const nextMurmurs = [m, ...(author.murmurs||[])];
    setAuthorLocal(a => ({...a, murmurs: nextMurmurs}));
    try { await db.collection("settings").doc("author").update({ murmurs: nextMurmurs }); } catch(e) { console.error(e); }
  };

  const deleteMurmur = async id => {
    const nextMurmurs = (author.murmurs||[]).filter(m => m.id!==id);
    setAuthorLocal(a => ({...a, murmurs: nextMurmurs}));
    try { await db.collection("settings").doc("author").update({ murmurs: nextMurmurs }); } catch(e) { console.error(e); }
  };

  const updateMurmur = async (id, text) => {
    const nextMurmurs = (author.murmurs||[]).map(m => m.id===id ? {...m, text} : m);
    setAuthorLocal(a => ({...a, murmurs: nextMurmurs}));
    try { await db.collection("settings").doc("author").update({ murmurs: nextMurmurs }); } catch(e) { console.error(e); }
  };

  return { site, setSite, author, setAuthor, novels, messages, loading, dbError,
    addMessage, deleteMessage, markRead,
    addNovel, updateNovel, deleteNovel, addChapter, updateChapter, deleteChapter,
    addMurmur, deleteMurmur, updateMurmur };
}

function groupByYM(items, getISO) {
  const map = new Map();
  items.forEach(item => {
    let ym = "不明";
    try { const d=new Date(getISO(item)); if(!isNaN(d)) ym=`${d.getFullYear()}年${d.getMonth()+1}月`; } catch {}
    if(!map.has(ym)) map.set(ym,[]);
    map.get(ym).push(item);
  });
  return [...map.entries()].sort(([a],[b])=>{
    if(a==="不明") return 1; if(b==="不明") return -1;
    const parse=s=>{ const m=s.match(/(\d+)年(\d+)月/); return m?new Date(+m[1],+m[2]-1):new Date(0); };
    return parse(a)-parse(b);
  });
}

              <div style={{ display: 'flex', gap: '8px', marginBottom: '1rem' }}>
                <button onClick={() => setCurrentPerspective('main')} 
                  style={{ background: currentPerspective === 'main' ? '#333' : 'none', border: '1px solid #333', color: currentPerspective === 'main' ? '#fff' : '#888', 
                    padding: '4px 12px', cursor: 'pointer', fontSize: '12px' }}>
                  私から見た彼
                </button>
                <button onClick={() => setCurrentPerspective('alt')} 
                  style={{ background: currentPerspective === 'alt' ? '#333' : 'none', border: '1px solid #333', color: currentPerspective === 'alt' ? '#fff' : '#888', 
                    padding: '4px 12px', cursor: 'pointer', fontSize: '12px' }}>
                  彼から見た私
                </button>
              </div>
              {currentPerspective === 'alt' && <div style={{ fontSize: '15px', lineHeight: 2.4, color: '#888', whiteSpace: 'pre-wrap', marginBottom: '2rem' }}>{man.altText}</div>}
            </div>
          )}

          {currentPerspective === 'main' && (
            <div style={{ fontSize: '15px', lineHeight: 2.6, color: '#bbb', whiteSpace: 'pre-wrap', marginBottom: '4rem' }}>{man.text}</div>
          )}

          {man.choices && (
            <div style={{ marginBottom: '2rem' }}>
              <div style={{ fontSize: '12px', color: '#888', letterSpacing: '0.1em', marginBottom: '1rem', textAlign: 'center' }}>あなたはどうする？</div>
              <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', justifyContent: 'center' }}>
                {man.choices.map((choice, idx) => (
                  <button key={idx} onClick={() => alert(choice.result)}
                    style={{ background: 'transparent', border: '1px solid #444', color: '#888', padding: '10px 20px', cursor: 'pointer', 
                      fontSize: '13px', flex: 1, minWidth: '150px', transition: '0.3s' }}>
                    {choice.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          <button onClick={handleNextMan} style={{ background: 'transparent', border: '1px solid #444', color: '#888', padding: '12px 40px', 
            cursor: 'pointer', fontSize: '13px', display: 'block', margin: '2rem auto', transition: '0.3s' }}>
            街に戻り、別の男とすれ違う
          </button>
        </div>
      )}

      {showCollection && (
        <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: 'rgba(8,8,10,0.97)', zIndex: 500, 
          overflow: 'auto', padding: '60px 40px 40px' }}>
          <button onClick={() => setShowCollection(false)} style={{ position: 'fixed', top: '20px', right: '24px', background: 'none', 
            border: 'none', color: '#888', fontSize: '24px', cursor: 'pointer' }}>✕</button>

          <div style={{ textAlign: 'center', marginBottom: '40px' }}>
            <h2 style={{ fontSize: '24px', fontWeight: 400, letterSpacing: '0.3rem', marginBottom: '0.5rem' }}>すれ違った男たち</h2>
            <p style={{ fontSize: '12px', color: '#888', letterSpacing: '0.2rem' }}>街で出会った記録</p>
          </div>

          <div style={{ maxWidth: '700px', margin: '0 auto' }}>
            {['都市', '自然', '動物', '社会', '時空'].map(cat => {
              const menInCat = NINETY_NINE_MEN_STORIES.filter(m => m.cat === cat);
              return (
                <div key={cat} style={{ marginBottom: '36px' }}>
                  <div style={{ fontSize: '11px', letterSpacing: '0.2em', color: '#888', borderBottom: '1px solid #333', paddingBottom: '8px', marginBottom: '14px' }}>
                    {cat}
                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                    {menInCat.map(m => (
                      <div key={m.num} style={{ padding: '5px 12px', fontSize: '12px', border: readMen[m.num] ? `1px solid ${site.theme?.accent||'#c8a86a'}` : '1px solid #333', 
                        borderRadius: '2px', color: readMen[m.num] ? site.theme?.accent||'#c8a86a' : '#444', cursor: readMen[m.num] ? 'pointer' : 'default',
                        transition: '0.2s' }}>
                        {m.num}. {m.title}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════ MAIN APP ═══════════════
function App() {
  const store = useStore();
  const [page, setPage] = useState('home');
  const [lightMode, setLightMode] = useState(false);

  const accent = store.site.theme?.accent || '#c8a86a';
  const bg = lightMode ? '#f5f0e8' : (store.site.theme?.bg || '#07070f');
  const txt = lightMode ? '#1a1814' : '#e2ddd4';

  if (store.loading) {
    return <div style={{ background: bg, color: txt, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      読み込み中...
    </div>;
  }

  return (
    <div className="app" style={{ background: bg, color: txt }}>
      {/* NAV */}
      <nav style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 500, height: '60px', padding: '0 40px', 
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `1px solid rgba(255,255,255,.06)`, 
        background: lightMode ? 'rgba(245,240,232,.92)' : 'rgba(7,7,15,.9)' }}>
        <div onClick={() => setPage('home')} style={{ cursor: 'pointer' }}>
          <div style={{ fontFamily: 'var(--serif)', fontSize: '20px', fontWeight: 300, color: accent, letterSpacing: '.12em' }}>
            {store.site.name}
          </div>
        </div>
        <div style={{ display: 'flex', gap: '4px' }}>
          {['home', 'hitorigoto', 'profile', '99men'].map(p => (
            <button key={p} onClick={() => setPage(p)} 
              style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '10px', letterSpacing: '.26em', 
                textTransform: 'uppercase', color: page === p ? accent : '#8c8578', padding: '6px 12px', borderRadius: '2px',
                transition: 'all .2s', backgroundColor: page === p ? 'rgba(200,164,106,.1)' : 'transparent' }}>
              {p === 'home' ? '作品一覧' : p === 'hitorigoto' ? 'ひとりごと' : p === 'profile' ? '著者' : '九十九人の男たち'}
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
          <button onClick={() => setLightMode(!lightMode)} 
            style={{ background: 'none', border: `1px solid ${lightMode ? accent : 'rgba(255,255,255,.06)'}`, 
              borderRadius: '20px', padding: '4px 14px', cursor: 'pointer', fontSize: '10px', letterSpacing: '.18em', 
              color: lightMode ? accent : '#8c8578', transition: 'all .2s' }}>
            {lightMode ? 'DARK' : 'LIGHT'}
          </button>
        </div>
      </nav>

      {/* CONTENT */}
      <div style={{ paddingTop: '60px', minHeight: '100vh' }}>
        {page === '99men' && <NinetyNineMen site={store.site} />}
        {page === 'home' && <div style={{ padding: '100px 40px 60px', textAlign: 'center' }}>
          <h1 style={{ fontSize: '3rem', fontWeight: 300, marginBottom: '2rem', color: accent }}>淵</h1>
          <p style={{ fontSize: '16px', lineHeight: 2, maxWidth: '500px', margin: '0 auto 3rem', opacity: 0.8 }}>
            {store.site.catchcopy}
          </p>
          <p style={{ fontSize: '14px', lineHeight: 1.8, maxWidth: '600px', margin: '0 auto', opacity: 0.6, whiteSpace: 'pre-line' }}>
            {store.site.description}
          </p>
        </div>}
        {page === 'profile' && <div style={{ padding: '100px 40px 60px', maxWidth: '600px', margin: '0 auto', textAlign: 'center' }}>
          <h2 style={{ fontSize: '2rem', fontWeight: 300, marginBottom: '2rem', color: accent }}>{store.author.name}</h2>
          <p style={{ fontSize: '12px', letterSpacing: '0.08em', color: '#888', marginBottom: '2rem' }}>{store.author.nameRoman}</p>
          <p style={{ fontSize: '14px', lineHeight: 1.8, opacity: 0.8, whiteSpace: 'pre-line' }}>{store.author.bio}</p>
        </div>}
        {page === 'hitorigoto' && <div style={{ padding: '100px 40px 60px', maxWidth: '600px', margin: '0 auto' }}>
          <h2 style={{ fontSize: '2rem', fontWeight: 300, marginBottom: '2rem', textAlign: 'center' }}>ひとりごと</h2>
          {(store.author.murmurs || []).length === 0 ? (
            <p style={{ textAlign: 'center', opacity: 0.5 }}>まだ何も書かれていません。</p>
          ) : (
            store.author.murmurs.map(m => (
              <div key={m.id} style={{ borderBottom: `1px solid rgba(255,255,255,.06)`, paddingBottom: '2rem', marginBottom: '2rem' }}>
                <div style={{ fontSize: '11px', color: '#888', marginBottom: '1rem', letterSpacing: '0.1em' }}>{m.date}</div>
                <div style={{ fontSize: '15px', lineHeight: 1.8, whiteSpace: 'pre-wrap' }}>{m.text}</div>
              </div>
            ))
          )}
        </div>}
      </div>

      {/* FOOTER */}
      <footer style={{ borderTop: `1px solid rgba(255,255,255,.06)`, padding: '40px 48px', display: 'flex', 
        justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '14px' }}>
        <div style={{ fontFamily: 'var(--serif)', fontSize: '18px', fontWeight: 300, color: accent, letterSpacing: '.1em' }}>
          {store.site.name}
        </div>
        <div style={{ fontSize: '10px', color: '#8c8578', letterSpacing: '.18em' }}>
          © {new Date().getFullYear()} {store.site.name} — {store.site.footerText}
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
