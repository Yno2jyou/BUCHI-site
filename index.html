// ═══════════════ ENCOUNTER (九十九人の男たち) ═══════════════
// 元の「九十九人の男たち」サイトを「淵」内のタブとして移植したもの。
// 進捗（すれ違った男のID一覧）はFirebase Authの匿名認証でユーザーごとに
// 区別し、Firestoreの encounterProgress コレクションに永続化する。
// デザインは「淵」全体のテーマ変数には依存せず、独立した黒背景の世界観を保つ。

function useAnonAuthUid(){
  const [uid, setUid] = useState(null);
  useEffect(()=>{
    if(!auth) return;
    let unsub;
    unsub = auth.onAuthStateChanged(user=>{
      if(user){ setUid(user.uid); }
      else {
        auth.signInAnonymously().catch(e=>console.error("anon auth failed",e));
      }
    });
    return ()=>unsub&&unsub();
  },[]);
  return uid;
}

// 「不在の男」— 九十九人目を見届けたあと、闇の中に浮かび上がる幻の百人目の物語。
// 句点や読点の連なりで自然な間（息継ぎ）の単位に分割し、一節ずつ浮かび上がらせる。
const ABSENT_MAN_TITLE = "不在の男";
const ABSENT_MAN_PARAGRAPHS = [
  "百人目の男は、いなかった。",
  "いや、厳密にはそこにいるべき場所に、誰ひとりとして立っていなかった。九十九人の男たちの物語がすべて終わり、九十九人目の男が最後の頁を閉じたとき、舞台の上には静寂だけが残された。街の灯は消え、世界は深淵なる暗闇に包まれた。しかし、その漆黒の暗闇の中で、ふと何かが「開く」音がした。",
  "百人目の男は、登場人物ではない。彼は物語の輪郭の外側にいた。彼は物語を読み、それを見届け、そして最後にはこうして振り返っている「あなた」の近くにいる。朝の通勤電車の窓ガラスに映るぼんやりとした輪郭として。深夜、誰にも言えない秘密を反芻する瞬間の吐息として。あるいは、九十九人の男たちの誰にも感情移入できず、ただ彼らを冷ややかに、あるいは痛ましく見守っていたはずの、あなたの視線そのものとして。",
  "「世界は一つの本になった」と九十九人目の男は言った。ならば、その本を今、開いて読んでいるのは誰なのか。",
  "百人目の男は、何もしない。彼は物語に介入しない。ただ、読み終えた本の表紙をなぞり、そこに刻まれた九十九の傷跡——いや、九十九の「生」の重みを、自分の記憶の一部として引き受ける。",
  "物語の中の男たちは消えた。しかしその物語を読み終えてしまったという事実は、あなたの心に小さな、けれど決して消えることのない棘となって残る。",
  "物語は終わった。\nしかし本を閉じた後の世界は、閉じる前と同じままではないはずだ。",
  "あなたは閉じた本の表紙に自分の指紋を残した。その瞬間から、あなたもまた、この都市の物語の一部となる。百人目の男——それは、九十九人の断片をすべて飲み込み、それでもなお「明日」という新しい頁をめくり続ける、現実の此方にいるあなただ。",
  "本は閉じた。\nさあ、顔を上げてほしい。\n街の灯は、あなたが目を覚ますのを待っている。",
];

function EncounterPage({onExit, stories}){
  const uid = useAnonAuthUid();
  const motokoStories = stories && stories.length>0 ? stories : MOTOKO_STORIES;
  const [viewedNums, setViewedNums] = useState([]); // すれ違った男のnum一覧（99は除く）
  const [current, setCurrent] = useState(null);
  const [showStory, setShowStory] = useState(false);
  const [cityShift, setCityShift] = useState(0);
  const [cityHidden, setCityHidden] = useState(false);
  const [blackout, setBlackout] = useState(false);
  const [metEndingMan, setMetEndingMan] = useState(false); // 99人目「終わりの男」を読み終えたか（進捗表示用。viewedNums/pickNextのロジックには影響しない）
  // blackoutStage: "silence"（無音の暗闇）→ "absent"（不在の男、本文が浮かび上がる）→ "complete"（記録のコンプリートと敬意）
  const [blackoutStage, setBlackoutStage] = useState("silence");
  const [absentParaIdx, setAbsentParaIdx] = useState(-1); // 浮かび上がった段落数（-1=まだ何も）
  const blackoutTimersRef = useRef([]);
  const [fadeOut, setFadeOut] = useState(false); // encounter-view / story-view の表示切替アニメ用
  const [showArchive, setShowArchive] = useState(false); // 既読一覧（図鑑）モーダルの表示状態
  const [lastNewNum, setLastNewNum] = useState(null); // 直近で新しく出会った男のnum（図鑑を閉じるとクリアされる）
  const [isRereading, setIsRereading] = useState(false); // 図鑑から既読の男を選んで読み返している最中か
  const initializedRef = useRef(false);
  const viewedNumsRef = useRef([]); // 進捗読み込みが遅れても、その間に出会った男を見失わないようにするための最新値参照
  viewedNumsRef.current = viewedNums;

  const pickNext = useCallback((nums)=>{
    const usedNums = nums!==undefined ? nums : viewedNumsRef.current;
    if(usedNums.length >= motokoStories.filter(s=>s.num!==99).length){
      return motokoStories.find(s=>s.num===99) || motokoStories[motokoStories.length-1];
    }
    const pool = motokoStories.filter(s=>s.num<99 && !usedNums.includes(s.num));
    const usable = pool.length>0 ? pool : motokoStories.filter(s=>s.num<99);
    return usable[Math.floor(Math.random()*usable.length)];
  },[motokoStories]);

  // 認証や進捗の読み込みを待たず、画面が開いた瞬間に最初の男をすぐ表示する。
  // 認証(uid取得)に時間がかかったり失敗したりしても、体験自体は止めない。
  useEffect(()=>{
    if(initializedRef.current) return;
    initializedRef.current = true;
    setCurrent(pickNext([]));
    setCityShift(Math.floor(Math.random()*12)*25);
  },[pickNext]);

  // uidが取得できたら（多くは即時〜数百ms後）、Firestoreの進捗を読み込んで反映する。
  // すでに画面には最初の男が表示済みなので、ここでは進捗(viewedNums)だけを追いつかせる。
  useEffect(()=>{
    if(!uid) return;
    let mounted = true;
    db.collection("encounterProgress").doc(uid).get().then(snap=>{
      if(!mounted) return;
      if(snap.exists && Array.isArray(snap.data().viewedNums)){
        setViewedNums(snap.data().viewedNums);
      }
    }).catch(e=>console.error(e));
    return ()=>{ mounted=false; };
  },[uid]);

  const saveProgress = useCallback((nums)=>{
    if(!uid) return; // 認証が済んでいない/失敗していても、表示自体は継続できる。保存だけスキップされる。
    db.collection("encounterProgress").doc(uid).set({
      viewedNums: nums,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).catch(e=>console.error(e));
  },[uid]);

  const handleShowStory = () => {
    if(!current) return;
    setCityHidden(true);
    setFadeOut(true);
    setTimeout(()=>{
      setShowStory(true);
      setFadeOut(false);
      if(current.num < 99 && !viewedNums.includes(current.num)){
        const next = [...new Set([...viewedNums, current.num])];
        setViewedNums(next);
        saveProgress(next);
        setLastNewNum(current.num); // 今回新しく出会った男としてマーク（図鑑を閉じるまでNEW表示）
      }
      if(current.num === 99){
        setMetEndingMan(true); // 99人目（終わりの男）に到達 → 進捗表示を99/99にするためのフラグ
      }
    },600);
  };

  const clearBlackoutTimers = () => {
    blackoutTimersRef.current.forEach(t=>clearTimeout(t));
    blackoutTimersRef.current = [];
  };

  // 各段落の文字数に応じて表示間隔を可変にする（短い一文はすぐ、長い段落はじっくり）。
  const ABSENT_MAN_DELAYS = useMemo(()=>{
    const delays = [];
    let acc = 0;
    ABSENT_MAN_PARAGRAPHS.forEach((p)=>{
      delays.push(acc);
      const dwell = Math.min(7200, Math.max(2400, p.length*55));
      acc += dwell;
    });
    return { delays, total: acc };
  },[]);

  const handleNextMan = () => {
    if(current && current.num===99){
      // 最後の男 → ブラックアウト演出（無音の暗闇 → 不在の男 → コンプリート）
      setFadeOut(true);
      setTimeout(()=>{
        setShowStory(false);
        setBlackoutStage("silence");
        setAbsentParaIdx(-1);
        setBlackout(true);

        clearBlackoutTimers();
        // しばらく無音の暗闇が続いた後、本文が一節ずつ静かに浮かび上がる。
        const t0 = setTimeout(()=>{
          setBlackoutStage("absent");
          ABSENT_MAN_DELAYS.delays.forEach((d, i)=>{
            const t = setTimeout(()=> setAbsentParaIdx(i), d);
            blackoutTimersRef.current.push(t);
          });
          const tEnd = setTimeout(()=>{
            setBlackoutStage("complete");
          }, ABSENT_MAN_DELAYS.total + 3200);
          blackoutTimersRef.current.push(tEnd);
        }, 3200);
        blackoutTimersRef.current.push(t0);
      },1000);
      return;
    }
    setFadeOut(true);
    setTimeout(()=>{
      setShowStory(false);
      setCityHidden(false);
      setCityShift(Math.floor(Math.random()*12)*25);
      setCurrent(pickNext());
      setFadeOut(false);
    },500);
  };

  const handleSkipBlackoutStage = () => {
    // 演出を急ぎたい人のための簡易スキップ：今のステージを即座に終端まで進める。
    if(blackoutStage==="silence"){
      clearBlackoutTimers();
      setBlackoutStage("absent");
      setAbsentParaIdx(ABSENT_MAN_PARAGRAPHS.length-1);
      const tEnd = setTimeout(()=> setBlackoutStage("complete"), 1800);
      blackoutTimersRef.current.push(tEnd);
    } else if(blackoutStage==="absent" && absentParaIdx < ABSENT_MAN_PARAGRAPHS.length-1){
      clearBlackoutTimers();
      setAbsentParaIdx(ABSENT_MAN_PARAGRAPHS.length-1);
      const tEnd = setTimeout(()=> setBlackoutStage("complete"), 1800);
      blackoutTimersRef.current.push(tEnd);
    }
  };

  useEffect(()=>{
    return ()=> clearBlackoutTimers();
  },[]);

  const handleRestart = () => {
    clearBlackoutTimers();
    setBlackout(false);
    setBlackoutStage("silence");
    setAbsentParaIdx(-1);
    setFadeOut(false); // ブラックアウト演出中にtrueになったままだったのを戻す（街だけ見えて男が表示されない不具合の修正）
    setViewedNums([]);
    setMetEndingMan(false);
    saveProgress([]);
    setLastNewNum(null);
    setCurrent(pickNext([]));
    setCityHidden(false);
    setCityShift(Math.floor(Math.random()*12)*25);
  };

  const closeArchive = () => {
    setShowArchive(false);
    setLastNewNum(null); // 図鑑を閉じたらNEW表示はクリアする
    setFadeOut(false); // 図鑑を閉じたら、背後の場面（街 or 物語）をゆっくりフェードインで見せる
  };

  // 図鑑（既読一覧）で出会った男の名前をタップ → その物語を直接開いて読み返す。
  // 通常の「すれ違い」フローとは独立しており、viewedNums/進捗/ブラックアウト演出には一切影響しない。
  // 読み返しを終えたときに元の状態（街 or 物語）へ戻せるよう、開始前の表示状態を退避しておく。
  const preRereadStateRef = useRef(null);
  const handleRereadMan = (num) => {
    const target = motokoStories.find(s=>s.num===num);
    if(!target) return;
    if(!isRereading){
      // すでに読み返し中の別の男から、図鑑経由でさらに別の男へ移る場合は、
      // 一番最初に読み返しに入る直前の状態を保持し続ける（上書きしない）。
      preRereadStateRef.current = { current, showStory, cityHidden };
    }
    setLastNewNum(null);
    setIsRereading(true);
    setFadeOut(true); // 背後のコンテンツを見えない状態にしてから切り替える（唐突な切り替わりを防ぐ）
    setTimeout(()=>{
      setCityHidden(true);
      setCurrent(target);
      setShowStory(true);
      setShowArchive(false); // この時点ではまだ見えない状態なので、図鑑を閉じてもフラッシュしない
      // 「非表示状態」が一度ブラウザに描画されたことを確実に待ってからフェードインを始める。
      // 固定時間のsetTimeoutだと描画タイミングによってカクついて見えることがあるため、
      // 二重のrequestAnimationFrameで「次の描画が完了した直後」を確実に捉える
      // （図鑑に戻るときのcloseArchiveと同じ、単発のフェードイン指示にするための仕組み）。
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          setFadeOut(false); // ここから、図鑑に戻るときと同じ仕組みでゆっくりフェードインする
        });
      });
    }, 280);
  };

  // 読み返しを終えて、図鑑（既読一覧）モーダルに戻る。
  const handleCloseReread = () => {
    setFadeOut(true); // 読み返していた物語をゆっくりフェードアウト
    setTimeout(()=>{
      const prev = preRereadStateRef.current;
      setIsRereading(false);
      if(prev){
        setCurrent(prev.current);
        setShowStory(prev.showStory);
        setCityHidden(prev.cityHidden);
      }
      preRereadStateRef.current = null;
      // fadeOutはtrueのまま保つ＝背後のコンテンツは見えない状態。
      // ここで見える状態に戻すと、図鑑モーダルがフェードインする裏で
      // 読み返し前の男の背景が一瞬透けて見えてしまう（フラッシュバック）。
      // 見える状態への復帰は、図鑑が実際に閉じられるとき（closeArchive）に行う。
      setShowArchive(true); // 読み返し前にいた図鑑ページへ戻る
    },700);
  };

  return (
    <div className="enc-root">
      <div className="enc-noise"/>
      <button className="enc-archive-btn" onClick={()=>setShowArchive(true)}>
        既読一覧
        {lastNewNum!==null && <span className="enc-archive-btn-dot"/>}
      </button>
      <button className="enc-exit-btn" onClick={onExit}>← 淵に戻る</button>

      <div className={`enc-city-container${cityHidden?" enc-city-hidden":""}`}
        style={{transform:`translateX(-${cityShift}%)`}}>
        <div className="enc-city-silhouette"/>
      </div>

      <div className="enc-container">
        {!showStory && current && (
          <div className="enc-view" onClick={handleShowStory} style={{opacity:fadeOut?0:1}}>
            <span className="enc-label">すれ違った男</span>
            <h1 className="enc-man-title">{current.title}</h1>
            <p className="enc-hint">— 立ち止まり、物語を覗く —</p>
          </div>
        )}

        {showStory && current && (
          <div className={`enc-story-view${!fadeOut?" show":""}`} style={{opacity:fadeOut?0:undefined}}>
            <div className="enc-story-header">
              <div>
                <span className="enc-story-num">NO.{String(current.num).padStart(2,"0")}</span>
                <h2 className="enc-story-title">{current.title}</h2>
              </div>
              <span className="enc-story-cat">{current.cat}</span>
            </div>
            {isRereading && <div className="enc-reread-badge">既読一覧からの読み返し</div>}
            <div className="enc-story-content">{current.text}</div>
            <button className="enc-next-btn" onClick={isRereading ? handleCloseReread : handleNextMan}>
              {isRereading ? "図鑑に戻る" : (current.num===99 ? "物語の終わりへ" : "街に戻り、別の男とすれ違う")}
            </button>
          </div>
        )}
      </div>

      <div className="enc-progress">{viewedNums.length + (metEndingMan?1:0)} / {motokoStories.length} 人とすれ違った</div>

      <div className={`enc-blackout${blackout?" show":""}`} onClick={handleSkipBlackoutStage}>
        {blackoutStage==="silence" && (
          <div className="enc-absent-silence">
            <span className="enc-absent-open-sound">・・・</span>
          </div>
        )}

        {blackoutStage==="absent" && (
          <div className="enc-absent-wrap">
            <div className="enc-absent-num">NO.???</div>
            <h1 className="enc-absent-title">{ABSENT_MAN_TITLE}</h1>
            <div className="enc-absent-text">
              {ABSENT_MAN_PARAGRAPHS.map((p,i)=>(
                <p key={i} className={`enc-absent-para${i<=absentParaIdx?" show":""}`}>{p}</p>
              ))}
            </div>
          </div>
        )}

        {blackoutStage==="complete" && (
          <div className="enc-complete-wrap">
            <div className="enc-complete-count">
              <span className="enc-complete-num">100</span>
              <span className="enc-complete-slash">/</span>
              <span className="enc-complete-num">100</span>
            </div>
            <div className="enc-complete-label">記録は、完成した。</div>
            <h1 className="enc-complete-title">これは、あなたの物語</h1>
            <div className="enc-complete-body">
              九十九人の男たちの記録はここで途絶えている。<br/><br/>
              ここから先は、まだインクの乗っていない白紙の頁。<br/>
              街の喧騒に戻り、呼吸を整え、<br/>
              歩き出すあなたの足跡こそが、<br/>
              最後の一篇となる。
            </div>
            <div className="enc-complete-thanks">
              男たちの生き様を見届けた読者に、<br/>心からの敬意を。
            </div>
            <button className="enc-next-btn" style={{marginTop:"3.2rem"}} onClick={(e)=>{e.stopPropagation();handleRestart();}}>最初から歩き直す</button>
          </div>
        )}
      </div>

      {showArchive && (
        <EncounterArchiveModal
          stories={motokoStories}
          viewedNums={viewedNums}
          lastNewNum={lastNewNum}
          onClose={closeArchive}
          onReread={handleRereadMan}
        />
      )}
    </div>
  );
}

// 既読一覧（図鑑）モーダル：カテゴリ別に99人を「？」グリッドで表示し、
// 出会った男は名前を表示する。直近で新しく出会った男には「NEW」を付ける。
function EncounterArchiveModal({stories, viewedNums, lastNewNum, onClose, onReread}){
  const categories = useMemo(()=>{
    const order = [];
    const map = new Map();
    (stories||[]).forEach(s=>{
      if(s.num===99) return; // 「終わりの男」は図鑑には含めない
      if(!map.has(s.cat)){ map.set(s.cat,[]); order.push(s.cat); }
      map.get(s.cat).push(s);
    });
    return order.map(cat=>({cat, items:map.get(cat)}));
  },[stories]);

  const totalCount = (stories||[]).filter(s=>s.num!==99).length;
  const metCount = viewedNums.length;

  return (
    <div className="enc-archive-overlay" onClick={onClose}>
      <div className="enc-archive-panel" onClick={e=>e.stopPropagation()}>
        <div className="enc-archive-header">
          <div>
            <div className="enc-archive-title">すれ違った男たち</div>
            <div className="enc-archive-sub">街で出会った記録</div>
          </div>
          <button className="enc-archive-close" onClick={onClose}>✕</button>
        </div>
        <div className="enc-archive-count">
          <span>{metCount} 人と出会った</span>
          <span>残り {Math.max(0, totalCount-metCount)} 人</span>
        </div>
        <div className="enc-archive-scroll">
          {categories.map(({cat,items})=>(
            <div key={cat} className="enc-archive-cat-group">
              <div className="enc-archive-cat-label">{cat}</div>
              <div className="enc-archive-grid">
                {items.map(s=>{
                  const met = viewedNums.includes(s.num);
                  const isNew = met && lastNewNum===s.num;
                  return (
                    <div
                      key={s.num}
                      className={`enc-archive-card${met?" met":""}${met?" rereadable":""}`}
                      onClick={met ? ()=>onReread(s.num) : undefined}
                      title={met ? "タップして読み返す" : undefined}
                    >
                      {met
                        ? <span className="enc-archive-card-name">{s.title}</span>
                        : <span className="enc-archive-card-q">？</span>
                      }
                      {isNew && <span className="enc-archive-new">NEW</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════ PROFILE ═══════════════

    <>
      <div className="profile-wrap">
        <div className="profile-header rise d1">
          <div className="profile-avatar">
            {author.icon?<img src={author.icon} alt={author.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:author.name.charAt(0)}
          </div>
          <div>
            <div className="profile-name-en">{author.nameRoman}</div>
            <div className="profile-name-ja">{author.name}</div>
            <div className="profile-stats">
              <div><span className="profile-stat-num">{novels.length}</span><span className="profile-stat-lbl">作品</span></div>
              <div><span className="profile-stat-num">{author.since}</span><span className="profile-stat-lbl">創作開始</span></div>
            </div>
          </div>
        </div>
        {(author.links||[]).length>0&&(
          <div className="profile-section rise d2">
            <div className="profile-sec-title">Links</div>
            <div className="profile-links">
              {(author.links||[]).map((lk,i)=>(
                <a key={i} href={lk.url} target="_blank" rel="noopener noreferrer" className="profile-link-btn">
                  <span>{linkIcon(lk.url)}</span>{lk.label||lk.url}
                </a>
              ))}
            </div>
          </div>
        )}
        <div className="profile-section rise d3">
          <div className="profile-sec-title">Biography</div>
          <p className="profile-bio">{author.bio}</p>
        </div>
        {author.influences&&(
          <div className="profile-section rise d4">
            <div className="profile-sec-title">影響を受けた作品</div>
            <div className="profile-tags">{author.influences.split(",").map(s=>s.trim()).filter(Boolean).map(inf=><div key={inf} className="profile-tag">{inf}</div>)}</div>
          </div>
        )}
        <button className="btn btn-primary" style={{marginTop:8}} onClick={onToWorks}>作品一覧を見る →</button>
      </div>
      <div style={{maxWidth:800,margin:"0 auto",padding:"0 48px 80px"}}>
        <MessageForm target="author" targetLabel={`${author.name} へ`} onSend={onSendMessage}/>
      </div>
      <Footer site={site||{}}/>
    </>
  );
}

// ═══════════════ MURMUR EDIT LIST ═══════════════
function MurmurEditList({murmurs, onUpdate, onDelete}){
  const [editId, setEditId] = useState(null);
  const [editText, setEditText] = useState("");
  const [saving, setSaving] = useState(false);

  const startEdit = m => { setEditId(m.id); setEditText(m.text); };
  const cancelEdit = () => { setEditId(null); setEditText(""); };
  const saveEdit = async id => {
    setSaving(true);
    await onUpdate(id, editText);
    setSaving(false);
    setEditId(null);
  };

  if(murmurs.length===0) return <div style={{padding:"16px",color:"var(--txt3)",fontSize:13}}>まだ投稿がありません</div>;
  return(
    <div className="msg-list">
      {murmurs.map(m=>(
        <div key={m.id} className="msg-row" style={{cursor:"default"}}>
          {editId===m.id ? (
            <>
              <textarea className="form-textarea" value={editText} onChange={e=>setEditText(e.target.value)} rows={4} style={{marginBottom:8}}/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-primary" disabled={saving} onClick={()=>saveEdit(m.id)} style={{fontSize:12,padding:"4px 14px"}}>{saving?"保存中…":"保存"}</button>
                <button className="btn" onClick={cancelEdit} style={{fontSize:12,padding:"4px 14px"}}>キャンセル</button>
              </div>
            </>
          ) : (
            <div className="msg-body" style={{whiteSpace:"pre-wrap"}}>{m.text}</div>
          )}
          {(m.files||[]).length>0&&<div style={{display:"flex",gap:6,marginTop:8}}>
            {(m.files||[]).map((f,i)=>f.type==="image"
              ?<img key={i} src={f.data} alt="" style={{width:48,height:48,objectFit:"cover",border:"1px solid var(--border)",borderRadius:2}}/>
              :<span key={i} style={{fontSize:11,color:"var(--txt3)"}}>📎{f.name}</span>)}
          </div>}
          <div className="msg-acts">
            <span className="msg-date">{m.date}</span>
            <div style={{marginLeft:"auto",display:"flex",gap:6}}>
              {editId!==m.id&&<button className="icon-btn" style={{fontSize:11}} onClick={()=>startEdit(m)}>✏️ 編集</button>}
              <button className="icon-btn danger" style={{fontSize:11}} onClick={()=>onDelete(m.id)}>🗑 削除</button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ═══════════════ ADMIN ═══════════════

  const [murmurErr,setMurmurErr]=useState("");

    setSaving(true);

    {id:"motoko",label:"九十九人の男たち",icon:"🚶"},

        <nav className="admin-nav">
          <div className="admin-nav-group">
            <span className="admin-nav-label">設定</span>
            {sideItems.map(item=>(
              <button key={item.id} className={`admin-nav-item ${sec===item.id?"active":""}`}
                onClick={()=>selectSec(item.id)}>
                {item.icon} {item.label}{item.badge>0&&<span className="badge">{item.badge}</span>}
              </button>
            ))}
          </div>
          {editNid&&(
            <div className="admin-nav-group">
              <span className="admin-nav-label">編集中</span>
              <button className={`admin-nav-item ${sec==="novel_edit"?"active":""}`} onClick={()=>{ setSec("novel_edit"); setMenuSelected(true); }}>
                📝 {eNov?.title||"作品"}
              </button>
            </div>
          )}
          {editMotokoNum&&sec==="motoko"&&(
            <div className="admin-nav-group">
              <span className="admin-nav-label">編集中</span>
              <button className="admin-nav-item active" onClick={()=>setMenuSelected(true)}>
                🚶 {(motokoStories||[]).find(x=>x.num===editMotokoNum)?.title||"男"}
              </button>
            </div>
          )}
        </nav>
        <div className="admin-close"><button className="admin-close-btn" onClick={onClose}>← サイトに戻る</button></div>
      </div>

        {sec==="site"&&(
          <div className="fadein">

            <div className="form-row">
              <div className="form-group"><label className="form-label">サイト名</label><BufferedInput className="form-input" value={site.name} onCommit={v=>setSite(s=>({...s,name:v}))}/></div>

            </div>
            <div className="form-group"><label className="form-label">キャッチコピー（「、」で折り返し）</label><BufferedInput className="form-input" value={site.catchcopy} onCommit={v=>setSite(s=>({...s,catchcopy:v}))}/></div>
            <div className="form-group"><label className="form-label">サブコピー</label><BufferedTextarea className="form-textarea" value={site.description} onCommit={v=>setSite(s=>({...s,description:v}))} rows={4}/></div>
            <div className="form-group"><label className="form-label">フッターテキスト</label><BufferedInput className="form-input" value={site.footerText||""} onCommit={v=>setSite(s=>({...s,footerText:v}))}/></div>
            <button className="btn btn-primary" onClick={()=>flash()}>保存する</button><span style={{marginLeft:12,fontSize:12,color:"var(--accent)"}}>{saving?"⌛ 保存中…":saved?"✓ 保存しました":""}</span>

                  <div className="form-hint" style={{marginTop:6}}>JPG / PNG / GIF　選択後、拡大・縮小・位置を調整できます</div>
                </div>

            <div className="form-row">

// ═══════════════ BG TEXT LAYER ═══════════════
function BgTextLayer({novels}){
  const [cols, setCols] = useState([]);
  const poolRef = useRef([]);
  const usedRef = useRef([]);
  const colTimersRef = useRef({});

  const buildPool = useCallback((nvls)=>{
    const sentences = [];
    nvls.forEach(n=>{
      (n.chapters||[]).forEach(ch=>{
        const txt = (ch.content||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
        const dialogRe = /[「『]((?:[^「『」』]|(?:[「『][^「『」』]*[」』]))*)[」』]/g;
        let m;
        while((m=dialogRe.exec(txt))!==null){
          const s=m[0].trim(); if(s.length>=6) sentences.push(s);
        }
        const masked=txt.replace(/[「『]((?:[^「『」』]|(?:[「『][^「『」』]*[」』]))*)[」』]/g,s=>"　".repeat(s.length));
        masked.split(/(?<=。)/).forEach((_,i,arr)=>{
          let pos=0; for(let j=0;j<i;j++) pos+=arr[j].length;
          const s=txt.slice(pos,pos+arr[i].length).trim();
          const clean=s.replace(/[「『][^」』]*[」』]/g,"").trim();
          if(clean.length>=10 && !/^[「『]/.test(s)) sentences.push(s);
        });
      });
    });
    poolRef.current=[...sentences].sort(()=>Math.random()-.5);
    usedRef.current=[];
  },[]);

  const nextPhrase = useCallback(()=>{
    if(poolRef.current.length===0){
      if(usedRef.current.length===0) return null;
      poolRef.current=[...usedRef.current].sort(()=>Math.random()-.5);
      usedRef.current=[];
    }
    const phrase=poolRef.current.shift();
    usedRef.current.push(phrase);
    const toV=s=>s.replace(/…/g,"︙").replace(/‥/g,"︰");
    return toV(phrase);
  },[]);

  useEffect(()=>{
    if(!novels||novels.length===0) return;
    buildPool(novels);

    const SLOT_W=46, W=window.innerWidth;
    const maxSlots=Math.floor(W/SLOT_W);
    const slots=Array.from({length:maxSlots},(_,i)=>i).sort(()=>Math.random()-.5);

    const initial=slots.map((slot,i)=>{
      const dur=44+Math.random()*26;
      return {
        slot, key:i,
        text: nextPhrase()||"",
        left: slot*SLOT_W+8,
        goUp: Math.random()>.5,
        dur,
        delay: -(Math.random()*70),
        opacity: 0.042+Math.random()*0.028,
      };
    });
    setCols(initial);

    initial.forEach(col=>{
      const schedule=()=>{
        const remaining = col.dur*1000 - Math.abs(col.delay)*1000;
        const wait = remaining > 0 ? remaining : col.dur*1000;
        const timer=setTimeout(()=>{
          const phrase=nextPhrase();
          if(!phrase) return;
          setCols(prev=>prev.map(c=>
            c.key===col.key
              ? {...c, text:phrase, delay:0, goUp:Math.random()>.5, dur:44+Math.random()*26, opacity:0.042+Math.random()*0.028, key:c.key}
              : c
          ));
          colTimersRef.current[col.key]=setTimeout(function loop(){
            const p2=nextPhrase(); if(!p2) return;
            setCols(prev=>prev.map(c=>
              c.key===col.key
                ? {...c, text:p2, delay:0, goUp:Math.random()>.5, dur:44+Math.random()*26, opacity:0.042+Math.random()*0.028}
                : c
            ));
            colTimersRef.current[col.key]=setTimeout(loop,(44+Math.random()*26)*1000);
          },(44+Math.random()*26)*1000);
        },wait);
        colTimersRef.current[col.key]=timer;
      };
      schedule();
    });

    return ()=>{ Object.values(colTimersRef.current).forEach(clearTimeout); };
  },[novels.map(n=>n.id).join(",")]);

  if(cols.length===0) return null;
  return(
    <div className="bg-text-layer" aria-hidden="true">
      {cols.map(col=>(
        <div key={col.key}
          style={{
            position:"absolute",
            left:col.left,
            top:0,
            opacity:col.opacity,
            fontSize:"12px",
            color:"var(--txt)",
            writingMode:"vertical-rl",
            textOrientation:"mixed",
            fontFamily:"var(--serif)",
            letterSpacing:".06em",
            lineHeight:"1.8em",
            whiteSpace:"nowrap",
            animation:`${col.goUp?"driftUp":"driftDown"} ${col.dur}s ${col.delay}s linear infinite`,
          }}>
          {col.text}
        </div>
      ))}
    </div>
  );
}

  // 「すれ違い」タブが匿名認証を発行するため、匿名ユーザー(isAnonymous)は
  // 管理者ログインとして扱わないように区別する。
  useEffect(()=>{
    if(!auth) return;
    const unsub = auth.onAuthStateChanged(user=>{
      const isRealAdmin = !!user && !user.isAnonymous;
      setAuthed(isRealAdmin);
      if(!isRealAdmin) setAdminOpen(false);
    });
    return ()=>unsub();
  },[]);

  useEffect(()=>{
    const root = document.documentElement;
    if(lightMode){
      // ライトモード時の読書背景：サイト背景よりわずかに沈んだ、柔らかい紙のような色
      root.style.setProperty("--reading-bg", "color-mix(in srgb, var(--bg) 94%, #6b6358 6%)");
    } else {
      // ダークモード時の読書背景：従来より明るく、文字が読みやすい色に調整
      root.style.setProperty("--reading-bg", "color-mix(in srgb, var(--bg) 72%, #3a3a42 28%)");
    }
  },[lightMode, site.theme?.bg]);

  const TRANSITIONS=[
    (ov,done)=>{ov.style.cssText="position:fixed;inset:0;z-index:8000;pointer-events:none;background:var(--bg);opacity:0;clip-path:circle(0% at 50% 50%)";ov.style.transition="opacity 1s cubic-bezier(.4,0,.2,1),clip-path 1s cubic-bezier(.4,0,.2,1)";requestAnimationFrame(()=>requestAnimationFrame(()=>{ov.style.opacity="1";ov.style.clipPath="circle(120% at 50% 50%)"}));setTimeout(done,1050);},
    (ov,done)=>{ov.style.cssText="position:fixed;inset:0;z-index:8000;pointer-events:none;background:var(--bg);opacity:0;clip-path:circle(0% at 0% 0%)";ov.style.transition="opacity 1s cubic-bezier(.4,0,.2,1),clip-path 1s cubic-bezier(.4,0,.2,1)";requestAnimationFrame(()=>requestAnimationFrame(()=>{ov.style.opacity="1";ov.style.clipPath="circle(150% at 0% 0%)"}));setTimeout(done,1050);},

    (ov,done)=>{ov.style.cssText="position:fixed;inset:0;z-index:8000;pointer-events:none;background:var(--bg);clip-path:inset(100% 0 0 0)";ov.style.transition="clip-path 1s cubic-bezier(.77,0,.18,1)";requestAnimationFrame(()=>requestAnimationFrame(()=>{ov.style.clipPath="inset(0% 0 0 0)"}));setTimeout(done,1050);},
    (ov,done)=>{ov.style.cssText="position:fixed;inset:0;z-index:8000;pointer-events:none;background:var(--bg);clip-path:inset(0 0 100% 0)";ov.style.transition="clip-path 1s cubic-bezier(.77,0,.18,1)";requestAnimationFrame(()=>requestAnimationFrame(()=>{ov.style.clipPath="inset(0 0 0% 0)"}));setTimeout(done,1050);},
    (ov,done)=>{ov.style.cssText="position:fixed;inset:0;z-index:8000;pointer-events:none;background:var(--accent);opacity:0";ov.style.transition="opacity .18s ease";requestAnimationFrame(()=>requestAnimationFrame(()=>{ov.style.opacity="1"}));setTimeout(()=>{ov.style.background="var(--bg)";ov.style.transition="background .6s ease,opacity .6s ease";},200);setTimeout(done,900);},
    (ov,done)=>{ov.style.cssText="position:fixed;inset:0;z-index:8000;pointer-events:none;background:var(--bg);clip-path:polygon(49% 49%,51% 49%,51% 51%,49% 51%)";ov.style.transition="clip-path 1s cubic-bezier(.4,0,.2,1)";requestAnimationFrame(()=>requestAnimationFrame(()=>{ov.style.clipPath="polygon(0% 0%,100% 0%,100% 100%,0% 100%)"}));setTimeout(done,1050);},
    (ov,done)=>{ov.style.cssText="position:fixed;inset:0;z-index:8000;pointer-events:none;background:var(--bg);clip-path:inset(0 0 0 100%)";ov.style.transition="clip-path 1s cubic-bezier(.77,0,.18,1)";requestAnimationFrame(()=>requestAnimationFrame(()=>{ov.style.clipPath="inset(0 0 0 0%)"}));setTimeout(done,1050);},
  ];
  const OUTRO=[
    ov=>{ov.style.transition="opacity .7s cubic-bezier(.4,0,.6,1),clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.opacity="0";ov.style.clipPath="circle(0% at 50% 50%)"},
    ov=>{ov.style.transition="opacity .7s ease,clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.opacity="0";ov.style.clipPath="circle(0% at 0% 0%)"},
    ov=>{ov.style.transition="opacity .7s ease,clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.opacity="0";ov.style.clipPath="circle(0% at 100% 100%)"},
    ov=>{ov.style.transition="transform .8s cubic-bezier(.77,0,.18,1)";ov.style.transform="translateX(100%)"},
    ov=>{ov.style.transition="transform .8s cubic-bezier(.77,0,.18,1)";ov.style.transform="translateX(-100%)"},
    ov=>{ov.style.transition="transform .8s cubic-bezier(.77,0,.18,1)";ov.style.transform="translateY(100%)"},
    ov=>{ov.style.transition="transform .8s cubic-bezier(.77,0,.18,1)";ov.style.transform="translateY(-100%)"},
    ov=>{ov.style.transition="opacity .7s ease";ov.style.opacity="0"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="polygon(50% 50%,50% 50%,50% 50%,50% 50%)"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="inset(0 50% 0 50%)"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="inset(50% 0 50% 0)"},
    ov=>{ov.style.transition="opacity .7s ease,transform .7s ease";ov.style.opacity="0";ov.style.transform="scale(1.08)"},
    ov=>{ov.style.transition="opacity .7s ease,transform .7s ease";ov.style.opacity="0";ov.style.transform="scale(.94)"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="polygon(110% 110%,110% 110%,100% 100%,100% 100%)"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="polygon(-10% 110%,-10% 110%,0% 100%,0% 100%)"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="inset(100% 0 0 0)"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="inset(0 0 100% 0)"},
    ov=>{ov.style.transition="opacity .6s ease";ov.style.opacity="0"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="polygon(49% 49%,51% 49%,51% 51%,49% 51%)"},
    ov=>{ov.style.transition="clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.clipPath="inset(0 100% 0 0)"},
  ];

  const nav=dest=>{
    if(transiting||dest===visPage) return;
    setTransiting(true);
    let idx;
    if(dest==="detail"&&novel){
      const ni=(novels||[]).findIndex(n=>n.id===novel.id);
      idx=ni>=0?ni%TRANSITIONS.length:0;
    } else {
      idx=Math.floor(Math.random()*TRANSITIONS.length);
    }
    const ov=document.createElement("div");
    document.body.appendChild(ov);
    TRANSITIONS[idx](ov,()=>{
      window.scrollTo({top:0,behavior:'instant'});
      document.documentElement.scrollTop=0;
      setPage(dest);
      setVisPage(dest);
      setTimeout(()=>{
        OUTRO[idx](ov);
        setTimeout(()=>{ ov.remove(); setTransiting(false); },850);
      },40);
    });
  };

  const openNovel=n=>{ setNovel(n); nav("detail"); };
  const openChapter=id=>{ setChapterId(id); nav("reading"); };
  const liveNovel=novel?novels.find(n=>n.id===novel.id)||novel:null;

  const handleAdminClick = () => {
    if(authed) setAdminOpen(true);
    else setShowLogin(true);
  };

  const handleLogout = async () => {
    await auth.signOut();
  };

  // タブタイトル
  useEffect(()=>{
    const base=site.name||"文藻";
    if(page==="home") document.title=base;
    else if(page==="hitorigoto") document.title=`ひとりごと — ${base}`;
    else if(page==="encounter") document.title=`九十九人の男たち — ${base}`;
    else if(page==="profile") document.title=`著者プロフィール — ${base}`;
    else if(page==="detail"&&liveNovel) document.title=`${liveNovel.title} — ${base}`;
    else if(page==="reading"&&liveNovel){
      const ch=(liveNovel.chapters||[]).find(c=>c.id===chapterId);
      document.title=ch?`${ch.title} — ${liveNovel.title}`:`${liveNovel.title} — ${base}`;
    }
  },[page,liveNovel,chapterId,site.name]);

  // ファビコン
  useEffect(()=>{
    let href;
    if(author.icon){ href=author.icon; }
    else{
      const l=(site.name||"文").charAt(0);
      const a=site.theme?.accent||"#c8a86a"; const b=site.theme?.bg||"#07070f";
      const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="${b}"/><text x="32" y="46" font-size="36" text-anchor="middle" fill="${a}" font-family="serif">${l}</text></svg>`;
      href=`data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }
    let link=document.querySelector("link[rel~='icon']");
    if(!link){ link=document.createElement("link"); link.rel="icon"; document.head.appendChild(link); }
    link.href=href;
  },[author.icon,site.name,site.theme?.accent,site.theme?.bg]);

  return(
    <>
      <Styles site={site} lightMode={lightMode}/>
      <div className="app">
        <BgTextLayer novels={novels}/>
        {loading&&(
          <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9000,gap:20}}>
            <div style={{fontFamily:"var(--serif)",fontSize:32,color:"var(--accent)",letterSpacing:"0.12em"}}>{site.name||"文藻"}</div>
            <div style={{width:40,height:2,background:"var(--border)",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:"var(--accent)",animation:"loadbar 1.2s ease infinite"}}/>
            </div>
            <style>{`@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}`}</style>
          </div>
        )}

          <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9000,gap:16,padding:40}}>
            <div style={{fontSize:32}}>🔥</div>
            <div style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--txt)"}}>Firebase接続エラー</div>
            <div style={{fontSize:13,color:"var(--txt3)",maxWidth:480,textAlign:"center",lineHeight:1.9}}>{dbError}</div>
            <div style={{fontSize:12,color:"var(--txt3)",maxWidth:480,textAlign:"center",lineHeight:2,marginTop:8,border:"1px solid var(--border)",padding:"16px 20px",borderRadius:3}}>
              <b style={{color:"var(--txt2)"}}>設定手順：</b><br/>
              1. <a href="https://console.firebase.google.com/" target="_blank" style={{color:"var(--accent)"}}>Firebase Console</a> でプロジェクトを作成<br/>
              2. Firestore Database を有効化（テストモードで開始）<br/>
              3. Storage を有効化<br/>
              4. Authentication を有効化<br/>
              5. プロジェクト設定 → ウェブアプリを追加 → 設定値をコピー<br/>
              6. このHTMLの <code style={{background:"var(--surface)",padding:"1px 5px"}}>FIREBASE_CONFIG</code> を書き換えて保存
            </div>
          </div>
        )}
        {!loading&&!dbError&&!adminOpen&&page!=="reading"&&page!=="encounter"&&(
          <Nav
            page={page} onNav={nav} site={site}
            lightMode={lightMode} onToggleLight={()=>setLightMode(m=>!m)}
            authed={authed}
            onAdminClick={handleAdminClick}
            onLogout={handleLogout}
          />
        )}
        {!loading&&!dbError&&!adminOpen&&page==="home"&&<HomePage site={site} novels={novels} onOpen={openNovel}/>}
        {!loading&&!dbError&&!adminOpen&&page==="hitorigoto"&&<HitorigotoPage author={author}/>}
        {!loading&&!dbError&&!adminOpen&&page==="encounter"&&<EncounterPage onExit={()=>nav("home")} stories={store.motokoStories}/>}
        {!loading&&!dbError&&!adminOpen&&page==="detail"&&liveNovel&&<DetailPage novel={liveNovel} onBack={()=>nav("home")} onRead={openChapter} onSendMessage={addMessage}/>}
        {!loading&&!dbError&&!adminOpen&&page==="reading"&&liveNovel&&chapterId&&<ReadingPage novel={liveNovel} chapterId={chapterId} onBack={()=>nav("detail")} onChapter={setChapterId} lightMode={lightMode} onToggleLight={()=>setLightMode(m=>!m)}/>}
        {!loading&&!dbError&&!adminOpen&&page==="profile"&&<ProfilePage author={author} novels={novels} onToWorks={()=>nav("home")} site={site} onSendMessage={addMessage}/>}
        {!loading&&!dbError&&adminOpen&&<AdminPanel store={store} onClose={()=>setAdminOpen(false)}/>}
        {showLogin&&(
          <AuthLoginModal
            onSuccess={()=>{ setShowLogin(false); setAdminOpen(true); }}
            onCancel={()=>setShowLogin(false)}
          />
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
