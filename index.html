// ═══════════════ キャラクター相関図エディタ（作品編集タブ） ═══════════════
// 著者がキャラクターをドラッグして自由に配置し、人物間に関係線（ラベル付き）を引ける本格エディタ。
// 座標はキャラクターの x,y フィールドにそのまま保存され、読者側 CharacterGraph はこの座標を読み取って描画する。
function CharacterGraphEditor({novel, selectedCharId, onSelectChar, onMoveChar, onAddRelation, onUpdateRelation, onDeleteRelation, onAddGroup, onUpdateGroup, onDeleteGroup, onToggleGroupMember}){
  const characters = novel.characters||[];
  const relations = novel.charRelations||[];
  const groups = novel.charGroups||[];
  const stageRef = useRef(null); // 実際の配置キャンバス（スクロール内側の大きな領域）への参照
  const dragRef = useRef(null); // {charId, offsetX, offsetY}
  const [dragging, setDragging] = useState(null);
  // ドラッグ中は座標をローカルstateだけで動かし、ドラッグ終了時に一度だけFirestoreへ保存する。
  // （毎mousemoveごとに保存すると、非同期の書き込みが追い越し合って古い座標で上書きされ、
  //   再読み込みすると変更前の位置に戻ってしまう不具合の原因だったため）
  const [localPos, setLocalPos] = useState({});
  // 相関図エディタ専用の保存状態インジケーター。これまでは保存中かどうかが画面上に
  // まったく表示されず、書き込みが完了する前にユーザーがページを再読み込みしてしまい、
  // 通信中の保存がキャンセルされて変更が失われる、という事態が起きていた可能性が高いため追加。
  const [saveStatus, setSaveStatus] = useState("idle"); // idle | saving | saved | error
  const byId = useMemo(()=>{
    const map = Object.fromEntries(characters.map(c=>[c.id,c]));
    Object.keys(localPos).forEach(id=>{ if(map[id]) map[id] = {...map[id], x:localPos[id].x, y:localPos[id].y}; });
    return map;
  }, [characters, localPos]);
  const GROUP_COLORS = ["#c8a86a","#8b5cf6","#f59e0b","#38bdf8","#f87171","#4ade80"];
  const NODE_R = 23; // .char-editor-node-circle の半径（46px円の半分）

  // 登場人物が画面外にこぼれず、かつ多い場合はスクロールで辿れるよう、
  // 実際の配置座標に応じてキャンバス自体のサイズを動的に広げる
  const canvasW = Math.max(900, ...Object.values(byId).map(c=>(c.x??100)+170), 900);
  const canvasH = Math.max(560, ...Object.values(byId).map(c=>(c.y??100)+170), 560);

  // Firestoreから確定した座標がpropsに反映されたら、ローカルの仮置き座標は不要になるので消す
  useEffect(()=>{
    setLocalPos(p=>{
      let changed=false;
      const next={...p};
      Object.keys(p).forEach(id=>{
        const c = characters.find(ch=>ch.id===id);
        if(c && c.x===p[id].x && c.y===p[id].y){ delete next[id]; changed=true; }
      });
      return changed?next:p;
    });
  },[characters]);

  const getStageRect = () => stageRef.current?.getBoundingClientRect();

  const startDrag = (e, charId) => {
    e.preventDefault();
    const rect = getStageRect();
    const c = byId[charId];
    if(!rect||!c) return;
    const clientX = e.touches?e.touches[0].clientX:e.clientX;
    const clientY = e.touches?e.touches[0].clientY:e.clientY;
    dragRef.current = { charId, startX:clientX, startY:clientY, origX:c.x??100, origY:c.y??100, rectW:rect.width, rectH:rect.height };
    setDragging(charId);
    onSelectChar(charId);
  };

  useEffect(()=>{
    if(!dragging) return;
    const move = (e) => {
      const d = dragRef.current;
      if(!d) return;
      e.preventDefault();
      const clientX = e.touches?e.touches[0].clientX:e.clientX;
      const clientY = e.touches?e.touches[0].clientY:e.clientY;
      const dx = clientX - d.startX, dy = clientY - d.startY;
      const nx = Math.max(24, Math.min(d.rectW-24, d.origX + dx));
      const ny = Math.max(24, Math.min(d.rectH-24, d.origY + dy));
      const rx = Math.round(nx), ry = Math.round(ny);
      d.lastX = rx; d.lastY = ry;
      setLocalPos(p => ({...p, [d.charId]: {x:rx, y:ry}}));
    };
    const end = () => {
      const d = dragRef.current;
      if(d && d.lastX!=null){
        // ドラッグ終了時の最終座標だけをFirestoreへ一度だけ保存する。
        // 完了を待ってから状態表示を更新し、保存中に再読み込みされても分かるようにする。
        setSaveStatus("saving");
        let settled = false;
        const timeoutId = setTimeout(()=>{
          if(!settled) setSaveStatus("timeout"); // 8秒応答がなければネットワーク疑いを表示
        }, 8000);
        Promise.resolve(onMoveChar(d.charId, d.lastX, d.lastY))
          .then(()=>{
            settled = true; clearTimeout(timeoutId);
            setSaveStatus("saved"); setTimeout(()=>setSaveStatus(s=>s==="saved"?"idle":s), 2000);
          })
          .catch(()=>{ settled = true; clearTimeout(timeoutId); setSaveStatus("error"); });
      }
      dragRef.current=null; setDragging(null);
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    window.addEventListener("touchmove", move, {passive:false});
    window.addEventListener("touchend", end);
    return ()=>{
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", end);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("touchend", end);
    };
  },[dragging, onMoveChar]);

  // 保存（Firestoreへの書き込み）が完了する前にページを閉じる／再読み込みされると、
  // 通信中のリクエストがキャンセルされ変更が失われるため、その間は離脱確認を出す。
  useEffect(()=>{
    if(saveStatus!=="saving") return; // timeoutに切り替わったら離脱確認は不要（待っても無駄なため）
    const handler = (e) => { e.preventDefault(); e.returnValue = ""; return ""; };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  },[saveStatus]);

  // 編集キャンバス上でのグループの背景枠（メンバーの現在位置を囲む矩形）を計算
  const groupBoxes = useMemo(()=>groups.map(g=>{
    const members = (g.memberIds||[]).map(id=>byId[id]).filter(Boolean);
    if(members.length===0) return null;
    const xs = members.map(c=>c.x??100), ys = members.map(c=>c.y??100);
    const margin = 44;
    const x = Math.min(...xs)-margin, y = Math.min(...ys)-margin;
    const width = Math.max(...xs)-Math.min(...xs)+margin*2;
    const height = Math.max(...ys)-Math.min(...ys)+margin*2;
    return { ...g, x, y, width, height };
  }).filter(Boolean), [groups, byId]);

  if(characters.length<2){
    return(
      <div>
        <div className="char-editor-hint">相関図を作るには、まず「登場人物」タブで2人以上のキャラクターを登録してください。</div>
        <div className="char-editor-viewport">
          <div className="char-editor-empty">登場人物を2人以上登録すると、ここでドラッグして相関図を配置できるようになります。</div>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div className="char-editor-hint">人物アイコンをドラッグして自由に配置できます。並べた位置関係はそのまま保たれた状態で、読者側では常に画面中央に大きく表示されます。登場人物が多い場合はキャンバスが自動的に広がるので、枠内をスクロールして配置してください。下の「関係を追加」で人物同士を線で結び（矢印にも変更できます）、「グループを追加」で所属先（クラス・家族など）の括りを作れます。</div>
      {saveStatus!=="idle" && (
        <div style={{fontSize:12, marginBottom:10, color: (saveStatus==="error"||saveStatus==="timeout")?"#f87171":"var(--accent)"}}>
          {saveStatus==="saving" && "⌛ 位置を保存中…（保存が終わるまでページを再読み込みしないでください）"}
          {saveStatus==="saved" && "✓ 位置を保存しました"}
          {saveStatus==="error" && "⚠ 位置の保存に失敗しました。もう一度動かしてみてください"}
          {saveStatus==="timeout" && "⚠ サーバーから応答がありません。インターネット接続、またはFirestoreへの通信がブロックされていないかご確認ください（このまま待ち続けても保存されない可能性があります）"}
        </div>
      )}
      <div className="char-editor-viewport">
        <div className="char-editor-stage" ref={stageRef} style={{width:canvasW, height:canvasH}}>
          <svg className="char-editor-svg" width={canvasW} height={canvasH}>
            {groupBoxes.map(g=>(
              <g key={g.id}>
                <rect x={g.x} y={g.y} width={g.width} height={g.height} rx="16"
                  fill={g.color||"#c8a86a"} fillOpacity="0.08" stroke={g.color||"#c8a86a"} strokeOpacity="0.5" strokeDasharray="3 4"/>
                {g.name&&<text x={g.x+14} y={g.y-6} fontSize="11" fill={g.color||"#c8a86a"} fontFamily="var(--body)">{g.name}</text>}
              </g>
            ))}
            {relations.map(r=>{
              const a=byId[r.fromId], b=byId[r.toId];
              if(!a||!b) return null;
              const x1=a.x??100, y1=a.y??100, x2=b.x??100, y2=b.y??100;
              const mx=(x1+x2)/2, my=(y1+y2)/2;
              const geo=arrowGeometry(x1,y1,x2,y2,r.arrowType||"none",NODE_R,8);
              return(
                <g key={r.id}>
                  <line x1={geo.lx1} y1={geo.ly1} x2={geo.lx2} y2={geo.ly2} stroke={r.color||"#c8a86a"} strokeWidth="1.5" opacity="0.6"/>
                  {geo.endArrowPoints&&<polygon points={geo.endArrowPoints} fill={r.color||"#c8a86a"} opacity="0.85"/>}
                  {geo.startArrowPoints&&<polygon points={geo.startArrowPoints} fill={r.color||"#c8a86a"} opacity="0.85"/>}
                  {r.label&&(
                    <text x={mx} y={my-6} fontSize="10" fill="var(--txt2)" textAnchor="middle" fontFamily="var(--body)">{r.label}</text>
                  )}
                </g>
              );
            })}
          </svg>
          {characters.map(c0=>{ const c = byId[c0.id]||c0; return (
            <div key={c.id}
              className={`char-editor-node ${dragging===c.id?"dragging":""} ${selectedCharId===c.id?"selected":""}`}
              style={{left:c.x??100, top:c.y??100}}
              onMouseDown={e=>startDrag(e,c.id)}
              onTouchStart={e=>startDrag(e,c.id)}
            >
              <div className="char-editor-node-circle" style={{background:c.color||"#c8a86a"}}>{(c.name||"?").charAt(0)}</div>
              <div className="char-editor-node-name">{c.name||"（無名）"}</div>
            </div>
          );})}
        </div>
      </div>

      <div style={{marginTop:28}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span className="form-label" style={{margin:0}}>関係一覧 ({relations.length})</span>
          <button className="btn btn-primary" style={{padding:"7px 16px",fontSize:11}} onClick={onAddRelation}>＋ 関係を追加</button>
        </div>
        {relations.length===0
          ? <div style={{padding:"16px 0",color:"var(--txt3)",fontSize:12}}>まだ関係が登録されていません</div>
          : relations.map(r=>(
              <div key={r.id} className="char-rel-row">
                <select className="char-rel-select" value={r.fromId} onChange={e=>onUpdateRelation(r.id,{fromId:e.target.value})}>
                  {characters.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                <span className="char-rel-arrow">{r.arrowType==="both"?"⇄":r.arrowType==="end"?"→":"─"}</span>
                <select className="char-rel-select" value={r.toId} onChange={e=>onUpdateRelation(r.id,{toId:e.target.value})}>
                  {characters.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                <select className="char-rel-select" value={r.arrowType||"none"} onChange={e=>onUpdateRelation(r.id,{arrowType:e.target.value})}>
                  <option value="none">─ 線のみ</option>
                  <option value="end">→ 矢印（一方向）</option>
                  <option value="both">⇄ 矢印（双方向）</option>
                </select>
                <BufferedInput key={r.id+":label"} className="form-input" style={{flex:1,minWidth:120}} value={r.label||""} onCommit={v=>onUpdateRelation(r.id,{label:v})} placeholder="関係性（例：幼馴染、対立 など）"/>
                <button className="icon-btn danger" onClick={()=>onDeleteRelation(r.id)}>🗑</button>
              </div>
            ))
        }
      </div>

      <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span className="form-label" style={{margin:0}}>所属先（グループ） ({groups.length})</span>
          <button className="btn btn-primary" style={{padding:"7px 16px",fontSize:11}} onClick={onAddGroup}>＋ グループを追加</button>
        </div>
        <div className="char-editor-hint" style={{marginBottom:14}}>クラスメイト・家族・組織など、複数の人物が属する括りを作成できます。相関図上では、所属する人物たちを囲む枠として表示されます。</div>
        {groups.length===0
          ? <div style={{padding:"16px 0",color:"var(--txt3)",fontSize:12}}>まだグループが登録されていません</div>
          : groups.map(g=>(
              <div key={g.id} className="char-group-row">
                <div className="char-group-row-top">
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    {GROUP_COLORS.map(col=>(
                      <button key={col} className="char-color-dot" style={{background:col, boxShadow:(g.color||"#c8a86a")===col?"0 0 0 2px var(--bg),0 0 0 4px "+col:"none"}} onClick={()=>onUpdateGroup(g.id,{color:col})}/>
                    ))}
                  </div>
                  <BufferedInput key={g.id+":name"} className="form-input" style={{flex:1,minWidth:140}} value={g.name||""} onCommit={v=>onUpdateGroup(g.id,{name:v})} placeholder="グループ名（例：3年A組）"/>
                  <button className="icon-btn danger" onClick={()=>onDeleteGroup(g.id)}>🗑</button>
                </div>
                <div className="char-group-members">
                  {characters.map(c=>{
                    const checked=(g.memberIds||[]).includes(c.id);
                    return(
                      <label key={c.id} className={`char-group-chip ${checked?"checked":""}`}>
                        <input type="checkbox" checked={checked} onChange={()=>onToggleGroupMember(g.id,c.id)}/>
                        {c.name||"（無名）"}
                      </label>
                    );
                  })}
                </div>
              </div>
            ))
        }
      </div>
    </div>
  );
}

// ═══════════════ 作品マップ 管理エディタ ═══════════════
// 「四象限マップ」「特徴レーダー」「フローチャート」の3つを、タブで切り替えて編集する。
// 各エディタは novels（投稿済み作品の一覧）を参照し、著者は項目（軸・質問・位置）を
// 自由に記述・操作・配置できる。
function WorksMapAdmin({store}){
  const [tab,setTab]=useState("quadrant"); // quadrant | radar | flow | ranking
  const {novels, worksMap,
    updateQuadrant, setQuadrantPoint, removeQuadrantPoint,
    updateRadar, addRadarAxis, updateRadarAxis, deleteRadarAxis, toggleRadarNovel, setRadarValue,
    updateFlowchart, addFlowNode, updateFlowNode, deleteFlowNode, moveFlowNode, addFlowEdge, updateFlowEdge, deleteFlowEdge, moveFlowEdge,
    updateRanking, addRanking, deleteRanking, addRankingItem, removeRankingItem, setRankingReason, moveRankingItem,
    toggleMapSection,
  } = store;
  const sectionsEnabled = worksMap.sectionsEnabled || { quadrant:true, radar:true, flow:true, ranking:true };
  const sectionLabels = { quadrant:"四象限マップ", radar:"特徴レーダー", flow:"フローチャート", ranking:"ランキング" };
  const rankings = worksMap.rankings||[];
  const [activeRankingId, setActiveRankingId] = useState(rankings[0]?.id || null);
  useEffect(()=>{
    if (rankings.length && !rankings.some(r=>r.id===activeRankingId)) setActiveRankingId(rankings[0].id);

  const activeRanking = rankings.find(r=>r.id===activeRankingId) || null;

    <div>
      <div className="admin-title">作品マップ</div>
      <div className="wmap-admin-hint">作品一覧ページの「🗺 作品マップ」から読者が見られる、4種類の可視化を編集できます。ここでの変更は保存後すぐに公開ページへ反映されます。</div>
      <div className="wmap-admin-tabs">
        <button className={`wmap-admin-tab ${tab==="quadrant"?"active":""}`} onClick={()=>setTab("quadrant")}>四象限マップ</button>
        <button className={`wmap-admin-tab ${tab==="radar"?"active":""}`} onClick={()=>setTab("radar")}>特徴レーダー</button>
        <button className={`wmap-admin-tab ${tab==="flow"?"active":""}`} onClick={()=>setTab("flow")}>フローチャート</button>
        <button className={`wmap-admin-tab ${tab==="ranking"?"active":""}`} onClick={()=>setTab("ranking")}>ランキング</button>
      </div>
      <div style={{background:"color-mix(in srgb,var(--bg) 92%,#888 8%)",border:"1px solid var(--border-hi)",borderRadius:3,padding:"4px 16px",marginBottom:24}}>
        <div className="toggle-row">
          <div><div className="toggle-label">👁 「{sectionLabels[tab]}」を公開</div><div className="toggle-desc">OFFにすると読者向けの作品マップでは「制作中」とだけ表示され、内容（{sectionLabels[tab]}の中身）は非表示になります（編集は引き続き可能です）</div></div>
          <label className="toggle-switch"><input type="checkbox" checked={sectionsEnabled[tab]!==false} onChange={()=>toggleMapSection(tab)}/><span className="toggle-slider"/></label>
        </div>
      </div>
      {tab==="quadrant" && (
        <QuadrantEditor
          novels={novels} data={worksMap.quadrant}
          onUpdate={updateQuadrant} onSetPoint={setQuadrantPoint} onRemovePoint={removeQuadrantPoint}
        />
      )}
      {tab==="radar" && (
        <RadarEditor
          novels={novels} data={worksMap.radar}
          onUpdate={updateRadar} onAddAxis={addRadarAxis} onUpdateAxis={updateRadarAxis} onDeleteAxis={deleteRadarAxis}
          onToggleNovel={toggleRadarNovel} onSetValue={setRadarValue}
        />
      )}
      {tab==="flow" && (
        <FlowchartEditor
          novels={novels} data={worksMap.flowchart}
          onUpdate={updateFlowchart} onAddNode={addFlowNode} onUpdateNode={updateFlowNode} onDeleteNode={deleteFlowNode} onMoveNode={moveFlowNode}
          onAddEdge={addFlowEdge} onUpdateEdge={updateFlowEdge} onDeleteEdge={deleteFlowEdge} onMoveEdge={moveFlowEdge}
        />
      )}
      {tab==="ranking" && (
        <div>
          <div className="wmap-admin-hint">テーマごとにランキングを複数作成できます。例えば「初めて読むならコレ」「衝撃のラストベスト5」のように、いくつかの観点から作品を順位づけしてみてください。</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
            {rankings.map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:4}}>
                <button
                  className={`wmap-admin-tab ${r.id===activeRankingId?"active":""}`}
                  onClick={()=>setActiveRankingId(r.id)}
                >{r.title||"（無題）"}</button>
                {rankings.length>1 && (
                  <button className="icon-btn danger" title="このランキングを削除" onClick={()=>handleDeleteRanking(r.id)}>🗑</button>
                )}
              </div>
            ))}
            <button className="btn btn-primary" style={{padding:"7px 16px",fontSize:11}} onClick={handleAddRanking}>＋ 新しいランキングを追加</button>
          </div>
          {activeRanking ? (
            <RankingEditor
              key={activeRanking.id}
              novels={novels} data={activeRanking}
              onUpdate={(patch)=>updateRanking(activeRanking.id, patch)}
              onAddItem={(novelId)=>addRankingItem(activeRanking.id, novelId)}
              onRemoveItem={(itemId)=>removeRankingItem(activeRanking.id, itemId)}
              onSetReason={(itemId, reason)=>setRankingReason(activeRanking.id, itemId, reason)}
              onMoveItem={(itemId, dir)=>moveRankingItem(activeRanking.id, itemId, dir)}

      )}
    </div>
  );
}

// ───────── 四象限マップ エディタ ─────────
function QuadrantEditor({novels, data, onUpdate, onSetPoint, onRemovePoint}){
  const stageRef=useRef(null);
  const dragRef=useRef(null);
  const [dragging,setDragging]=useState(null);
  const points=data.points||[];
  const placedIds=new Set(points.map(p=>p.novelId));
  const unplaced=novels.filter(n=>!placedIds.has(n.id));
  const byId=useMemo(()=>Object.fromEntries(novels.map(n=>[n.id,n])), [novels]);

  const getStageRect=()=>stageRef.current?.getBoundingClientRect();

  const startDrag=(e,novelId)=>{
    e.preventDefault();
    const rect=getStageRect();
    if(!rect) return;
    const p=points.find(pt=>pt.novelId===novelId);
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    dragRef.current={ novelId, startX:clientX, startY:clientY, origX:p?.x??50, origY:p?.y??50, rectW:rect.width, rectH:rect.height };
    setDragging(novelId);
  };

  useEffect(()=>{
    if(!dragging) return;
    const move=(e)=>{
      const d=dragRef.current;
      if(!d) return;
      e.preventDefault();
      const clientX=e.touches?e.touches[0].clientX:e.clientX;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      const dx=clientX-d.startX, dy=clientY-d.startY;
      const nx=Math.max(0,Math.min(100, d.origX + (dx/d.rectW)*100));
      // 画面上は「上が高い数値」になるよう、Y方向は反転して保存する
      const ny=Math.max(0,Math.min(100, d.origY - (dy/d.rectH)*100));
      onSetPoint(d.novelId, Math.round(nx), Math.round(ny));
    };
    const end=()=>{ dragRef.current=null; setDragging(null); };
    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",end);
    window.addEventListener("touchmove",move,{passive:false});
    window.addEventListener("touchend",end);
    return ()=>{
      window.removeEventListener("mousemove",move);
      window.removeEventListener("mouseup",end);
      window.removeEventListener("touchmove",move);
      window.removeEventListener("touchend",end);
    };
  },[dragging,onSetPoint]);

  // 画面上のpx位置（左上原点）⇄ 保存用の0-100座標（Y反転）の相互変換
  const toPct=(x,y,rect)=>({ left:`${x}%`, top:`${100-y}%` });

  return(
    <div>
      <div className="wmap-admin-hint">2つの軸（左右・上下）の意味を自由に記述してください。下の枠内で作品のドットをドラッグすると、位置がそのまま保存されます。</div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">セクションタイトル</label><BufferedInput className="form-input" value={data.title||""} onCommit={v=>onUpdate({title:v})}/></div>
        <div className="form-group"><label className="form-label">補足説明</label><BufferedInput className="form-input" value={data.desc||""} onCommit={v=>onUpdate({desc:v})}/></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">横軸：左側のラベル</label><BufferedInput className="form-input" value={data.xLeftLabel||""} onCommit={v=>onUpdate({xLeftLabel:v})} placeholder="例：軽い"/></div>
        <div className="form-group"><label className="form-label">横軸：右側のラベル</label><BufferedInput className="form-input" value={data.xRightLabel||""} onCommit={v=>onUpdate({xRightLabel:v})} placeholder="例：重い"/></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">縦軸：上側のラベル</label><BufferedInput className="form-input" value={data.yTopLabel||""} onCommit={v=>onUpdate({yTopLabel:v})} placeholder="例：動"/></div>
        <div className="form-group"><label className="form-label">縦軸：下側のラベル</label><BufferedInput className="form-input" value={data.yBottomLabel||""} onCommit={v=>onUpdate({yBottomLabel:v})} placeholder="例：静"/></div>
      </div>

      <div className="wmap-admin-subhead"><span className="form-label" style={{margin:0}}>配置エリア</span></div>
      <div className="wmap-quad-editor-canvas" ref={stageRef}>
        <div className="wmap-quad-editor-axislabel" style={{top:6,left:"50%",transform:"translateX(-50%)"}}>{data.yTopLabel||"上"}</div>
        <div className="wmap-quad-editor-axislabel" style={{bottom:6,left:"50%",transform:"translateX(-50%)"}}>{data.yBottomLabel||"下"}</div>
        <div className="wmap-quad-editor-axislabel" style={{left:6,top:"50%",transform:"translateY(-50%)"}}>{data.xLeftLabel||"左"}</div>
        <div className="wmap-quad-editor-axislabel" style={{right:6,top:"50%",transform:"translateY(-50%)"}}>{data.xRightLabel||"右"}</div>
        {points.map(p=>{
          const novel=byId[p.novelId];
          if(!novel) return null;
          const pos=toPct(p.x??50,p.y??50);
          return(
            <div key={p.novelId} className={`wmap-quad-node ${dragging===p.novelId?"dragging":""}`}
              style={{left:pos.left, top:pos.top}}
              onMouseDown={e=>startDrag(e,p.novelId)} onTouchStart={e=>startDrag(e,p.novelId)}>
              <div className="wmap-quad-node-dot" style={{background:novel.accent||"#c8a86a"}}/>
              <div className="wmap-quad-node-label">{novel.title}</div>
            </div>
          );
        })}
        {points.length===0 && <div className="char-editor-empty">下の「作品を追加」から、配置したい作品を選んでください。</div>}
      </div>

      <div style={{marginTop:20}}>
        <div className="wmap-admin-subhead"><span className="form-label" style={{margin:0}}>配置済みの作品 ({points.length})</span></div>
        {points.length===0
          ? <div style={{padding:"10px 0",color:"var(--txt3)",fontSize:12}}>まだ配置された作品がありません</div>
          : points.map(p=>{
            const novel=byId[p.novelId];
            if(!novel) return null;
            return(
              <div key={p.novelId} className="char-rel-row">
                <span style={{flex:1,fontSize:13,color:"var(--txt)"}}>{novel.title}</span>
                <span style={{fontSize:11,color:"var(--txt3)"}}>x:{p.x??50} / y:{p.y??50}</span>
                <button className="icon-btn danger" onClick={()=>onRemovePoint(p.novelId)}>🗑</button>
              </div>
            );
          })
        }
      </div>

      {unplaced.length>0 && (
        <div style={{marginTop:20,paddingTop:20,borderTop:"1px solid var(--border)"}}>
          <div className="wmap-admin-subhead"><span className="form-label" style={{margin:0}}>作品を追加</span></div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {unplaced.map(n=>(
              <button key={n.id} className="btn" onClick={()=>onSetPoint(n.id,50,50)}>＋ {n.title}</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ───────── 特徴レーダー エディタ ─────────
function RadarEditor({novels, data, onUpdate, onAddAxis, onUpdateAxis, onDeleteAxis, onToggleNovel, onSetValue}){
  const axes=data.axes||[];
  const selectedIds=data.novelIds||[];
  const values=data.values||{};
  const byId=useMemo(()=>Object.fromEntries(novels.map(n=>[n.id,n])), [novels]);

  return(
    <div>
      <div className="wmap-admin-hint">テーマ軸（質問項目）を3つ以上登録し、表示したい作品を選んだうえで、各軸ごとの数値（0〜100）をスライダーで設定してください。</div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">セクションタイトル</label><BufferedInput className="form-input" value={data.title||""} onCommit={v=>onUpdate({title:v})}/></div>
        <div className="form-group"><label className="form-label">補足説明</label><BufferedInput className="form-input" value={data.desc||""} onCommit={v=>onUpdate({desc:v})}/></div>
      </div>

      <div className="wmap-admin-subhead">
        <span className="form-label" style={{margin:0}}>テーマ軸（質問項目） ({axes.length})</span>
        <button className="btn btn-primary" style={{padding:"7px 16px",fontSize:11}} onClick={onAddAxis}>＋ 軸を追加</button>
      </div>
      {axes.length===0
        ? <div style={{padding:"16px 0",color:"var(--txt3)",fontSize:12}}>まだ軸が登録されていません（3つ以上を推奨）</div>
        : axes.map(ax=>(
          <div key={ax.id} className="wmap-radar-axis-row">
            <BufferedInput key={ax.id+":label"} className="form-input" style={{flex:1,minWidth:140}} value={ax.label||""} onCommit={v=>onUpdateAxis(ax.id,{label:v})} placeholder="軸の名前（例：心理描写）"/>
            <button className="icon-btn danger" onClick={()=>onDeleteAxis(ax.id)}>🗑</button>
          </div>
        ))
      }

      <div style={{marginTop:28,paddingTop:20,borderTop:"1px solid var(--border)"}}>
        <div className="wmap-admin-subhead"><span className="form-label" style={{margin:0}}>表示する作品 ({selectedIds.length})</span></div>
        <div className="wmap-admin-hint" style={{marginBottom:10}}>多くなりすぎると重なって見づらくなるため、5作品前後がおすすめです。</div>
        {novels.length===0
          ? <div style={{padding:"10px 0",color:"var(--txt3)",fontSize:12}}>作品がありません</div>
          : novels.map(n=>{
            const checked=selectedIds.includes(n.id);
            return(
              <div key={n.id} className="wmap-novel-pick-row">
                <label className={`char-group-chip ${checked?"checked":""}`} style={{cursor:"pointer"}}>
                  <input type="checkbox" checked={checked} onChange={()=>onToggleNovel(n.id)}/>
                  {n.title}
                </label>
              </div>
            );
          })
        }
      </div>

      {selectedIds.length>0 && axes.length>0 && (
        <div style={{marginTop:28,paddingTop:20,borderTop:"1px solid var(--border)",overflowX:"auto"}}>
          <div className="wmap-admin-subhead"><span className="form-label" style={{margin:0}}>各作品の数値（0〜100）</span></div>
          <table className="wmap-value-table">
            <thead>
              <tr>
                <th>作品</th>
                {axes.map(ax=><th key={ax.id}>{ax.label||"軸"}</th>)}
              </tr>
            </thead>
            <tbody>
              {selectedIds.map(nid=>{
                const novel=byId[nid];
                if(!novel) return null;
                const v=values[nid]||{};
                return(
                  <tr key={nid}>
                    <td style={{color:"var(--txt)",fontSize:12,whiteSpace:"nowrap"}}>{novel.title}</td>
                    {axes.map(ax=>(
                      <td key={ax.id} style={{minWidth:120}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <input type="range" min="0" max="100" value={v[ax.id]??50}
                            onChange={e=>onSetValue(nid,ax.id,Number(e.target.value))}/>
                          <span className="wmap-value-num">{v[ax.id]??50}</span>
                        </div>
                      </td>
                    ))}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ───────── フローチャート エディタ ─────────
// 質問ノード・結果ノードをドラッグで自由配置し、矢印（分岐）でつなぐ。
// 構造はキャラクター相関図エディタと同様の考え方。
function FlowchartEditor({novels, data, onUpdate, onAddNode, onUpdateNode, onDeleteNode, onMoveNode, onAddEdge, onUpdateEdge, onDeleteEdge, onMoveEdge}){
  const nodes=data.nodes||[];
  const edges=data.edges||[];
  const [selectedId,setSelectedId]=useState(null);
  const stageRef=useRef(null);
  const dragRef=useRef(null);
  const [dragging,setDragging]=useState(null);
  const byId=useMemo(()=>Object.fromEntries(nodes.map(n=>[n.id,n])), [nodes]);
  const novelById=useMemo(()=>Object.fromEntries(novels.map(n=>[n.id,n])), [novels]);

  const canvasW=Math.max(900, ...nodes.map(n=>(n.x??100)+170), 900);
  const canvasH=Math.max(520, ...nodes.map(n=>(n.y??100)+170), 520);

  const getStageRect=()=>stageRef.current?.getBoundingClientRect();

  const startDrag=(e,nodeId)=>{
    e.preventDefault();
    const rect=getStageRect();
    const n=byId[nodeId];
    if(!rect||!n) return;
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    dragRef.current={ nodeId, startX:clientX, startY:clientY, origX:n.x??100, origY:n.y??100 };
    setDragging(nodeId);
    setSelectedId(nodeId);
  };

  useEffect(()=>{
    if(!dragging) return;
    const move=(e)=>{
      const d=dragRef.current;
      if(!d) return;
      e.preventDefault();
      const clientX=e.touches?e.touches[0].clientX:e.clientX;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      const dx=clientX-d.startX, dy=clientY-d.startY;
      const nx=Math.max(50, d.origX+dx);
      const ny=Math.max(50, d.origY+dy);
      onUpdateNode(d.nodeId, {x:Math.round(nx), y:Math.round(ny)});
    };
    const end=()=>{ dragRef.current=null; setDragging(null); };
    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",end);
    window.addEventListener("touchmove",move,{passive:false});
    window.addEventListener("touchend",end);
    return ()=>{
      window.removeEventListener("mousemove",move);
      window.removeEventListener("mouseup",end);
      window.removeEventListener("touchmove",move);
      window.removeEventListener("touchend",end);
    };
  },[dragging,onUpdateNode]);

  return(
    <div>
      <div className="wmap-admin-hint">質問ノード（四角）と結果ノード（円）をドラッグで配置し、下の「分岐を追加」で質問から次の質問・結果へ矢印をつなげます。最初に追加したノードが開始地点になります。</div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">セクションタイトル</label><BufferedInput className="form-input" value={data.title||""} onCommit={v=>onUpdate({title:v})}/></div>
        <div className="form-group"><label className="form-label">補足説明</label><BufferedInput className="form-input" value={data.desc||""} onCommit={v=>onUpdate({desc:v})}/></div>
      </div>

      <div className="wmap-admin-subhead">
        <span className="form-label" style={{margin:0}}>キャンバス</span>
        <div style={{display:"flex",gap:8}}>
          <button className="btn" onClick={async()=>{ const id=await onAddNode("question"); setSelectedId(id); }}>＋ 質問ノード</button>
          <button className="btn btn-primary" onClick={async()=>{ const id=await onAddNode("result"); setSelectedId(id); }}>＋ 結果ノード</button>
        </div>
      </div>

      {nodes.length===0
        ? <div className="char-editor-viewport"><div className="char-editor-empty">上のボタンから、質問ノードや結果ノードを追加してください。</div></div>
        : (
          <div className="wmap-flow-editor-viewport">
            <div className="wmap-flow-editor-stage" ref={stageRef} style={{width:canvasW,height:canvasH}}>
              <svg className="wmap-flow-editor-svg" width={canvasW} height={canvasH}>
                {edges.map(e=>{
                  const a=byId[e.fromId], b=byId[e.toId];
                  if(!a||!b) return null;
                  const x1=a.x??100, y1=a.y??100, x2=b.x??100, y2=b.y??100;
                  const geo=arrowGeometry(x1,y1,x2,y2,"end",50,9);
                  const mx=(x1+x2)/2, my=(y1+y2)/2;
                  return(
                    <g key={e.id}>
                      <line x1={geo.lx1} y1={geo.ly1} x2={geo.lx2} y2={geo.ly2} stroke="var(--accent)" strokeWidth="1.5" opacity="0.65"/>
                      {geo.endArrowPoints && <polygon points={geo.endArrowPoints} fill="var(--accent)" opacity="0.85"/>}
                      {e.label && <text x={mx} y={my-6} fontSize="10" fill="var(--txt2)" textAnchor="middle" fontFamily="var(--body)">{e.label}</text>}
                    </g>
                  );
                })}
              </svg>
              {nodes.map(n=>{
                const isResult=n.kind==="result";
                const novel=isResult?novelById[n.novelId]:null;
                return(
                  <div key={n.id}
                    className={`wmap-flow-editor-node ${isResult?"result":"q"} ${dragging===n.id?"dragging":""} ${selectedId===n.id?"selected":""}`}
                    style={{left:n.x??100, top:n.y??100}}
                    onMouseDown={e=>startDrag(e,n.id)} onTouchStart={e=>startDrag(e,n.id)}
                    onClick={()=>setSelectedId(n.id)}>
                    {isResult ? (novel?novel.title:(n.text||"結果")) : (n.text||"質問")}
                  </div>
                );
              })}
            </div>
          </div>
        )
      }

      <div style={{marginTop:24}}>
        <div className="wmap-admin-subhead"><span className="form-label" style={{margin:0}}>ノード一覧 ({nodes.length})</span></div>
        {nodes.length===0
          ? <div style={{padding:"10px 0",color:"var(--txt3)",fontSize:12}}>まだノードがありません</div>
          : nodes.map((n,i)=>{
            const isResult=n.kind==="result";
            return(
              <div key={n.id} className="wmap-flow-node-row">
                <span className="wmap-flow-node-kind-badge">{isResult?"結果":"質問"}{i===0?"・開始":""}</span>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  <button className="icon-btn" onClick={()=>onMoveNode(n.id,"up")} disabled={i===0} title="順番を上げる">↑</button>
                  <button className="icon-btn" onClick={()=>onMoveNode(n.id,"down")} disabled={i===nodes.length-1} title="順番を下げる">↓</button>
                </div>
                <div style={{flex:1,minWidth:180}}>
                  {isResult ? (
                    <select className="char-rel-select" style={{width:"100%"}} value={n.novelId||""} onChange={e=>onUpdateNode(n.id,{novelId:e.target.value})}>
                      <option value="">（作品を選択せず文章のみ表示）</option>
                      {novels.map(nv=><option key={nv.id} value={nv.id}>{nv.title}</option>)}
                    </select>
                  ) : (
                    <BufferedTextarea key={n.id+":text"} className="form-textarea" style={{minHeight:60}} value={n.text||""} onCommit={v=>onUpdateNode(n.id,{text:v})} rows={2} placeholder="質問文を入力（例：今夜は静かな気分？）"/>
                  )}
                  {isResult && (
                    <BufferedInput key={n.id+":text2"} className="form-input" style={{marginTop:8}} value={n.text||""} onCommit={v=>onUpdateNode(n.id,{text:v})} placeholder="作品を選ばない場合に表示する文章（任意）"/>
                  )}
                </div>
                <button className="icon-btn danger" onClick={()=>onDeleteNode(n.id)}>🗑</button>
              </div>
            );
          })
        }
      </div>

      {nodes.length>=2 && (
        <div style={{marginTop:28,paddingTop:20,borderTop:"1px solid var(--border)"}}>
          <div className="wmap-admin-subhead">
            <span className="form-label" style={{margin:0}}>分岐（矢印） ({edges.length})</span>
            <button className="btn btn-primary" style={{padding:"7px 16px",fontSize:11}} onClick={()=>onAddEdge(nodes[0].id, nodes[1].id)}>＋ 分岐を追加</button>
          </div>
          {edges.length===0
            ? <div style={{padding:"10px 0",color:"var(--txt3)",fontSize:12}}>まだ分岐がありません</div>
            : edges.map((e,ei)=>(
              <div key={e.id} className="wmap-flow-edge-row">
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  <button className="icon-btn" onClick={()=>onMoveEdge(e.id,"up")} disabled={ei===0} title="順番を上げる">↑</button>
                  <button className="icon-btn" onClick={()=>onMoveEdge(e.id,"down")} disabled={ei===edges.length-1} title="順番を下げる">↓</button>
                </div>
                <select className="char-rel-select" value={e.fromId} onChange={ev=>onUpdateEdge(e.id,{fromId:ev.target.value})}>
                  {nodes.map(n=><option key={n.id} value={n.id}>{n.kind==="result"?"🔵":"⬜"} {(n.text||(n.kind==="result"?"結果":"質問")).slice(0,16)}</option>)}
                </select>
                <span className="char-rel-arrow">→</span>
                <select className="char-rel-select" value={e.toId} onChange={ev=>onUpdateEdge(e.id,{toId:ev.target.value})}>
                  {nodes.map(n=><option key={n.id} value={n.id}>{n.kind==="result"?"🔵":"⬜"} {(n.text||(n.kind==="result"?"結果":"質問")).slice(0,16)}</option>)}
                </select>
                <BufferedInput key={e.id+":label"} className="form-input" style={{flex:1,minWidth:120}} value={e.label||""} onCommit={v=>onUpdateEdge(e.id,{label:v})} placeholder="選択肢の文言（例：はい）"/>
                <button className="icon-btn danger" onClick={()=>onDeleteEdge(e.id)}>🗑</button>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

// ───────── ランキング エディタ ─────────
function RankingEditor({novels, data, onUpdate, onAddItem, onRemoveItem, onSetReason, onMoveItem}){
  const items=data.items||[];
  const byId=useMemo(()=>Object.fromEntries(novels.map(n=>[n.id,n])), [novels]);
  const usedIds=new Set(items.map(it=>it.novelId));
  const [pickId,setPickId]=useState("");
  const available=novels.filter(n=>!usedIds.has(n.id));

  const handleAdd = () => {
    if(!pickId) return;
    onAddItem(pickId);
    setPickId("");
  };

  return(
    <div>
      <div className="wmap-admin-hint">テーマを決めて、作品を順位づけしてください。並び順がそのまま順位（一番上が1位）になります。各作品の選出理由も書き添えられます。</div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">ランキングテーマ（タイトル）</label><BufferedInput className="form-input" value={data.title||""} onCommit={v=>onUpdate({title:v})} placeholder="例：今読むべき一篇 ベスト5"/></div>
        <div className="form-group"><label className="form-label">補足説明</label><BufferedInput className="form-input" value={data.desc||""} onCommit={v=>onUpdate({desc:v})}/></div>
      </div>

      <div className="wmap-admin-subhead">
        <span className="form-label" style={{margin:0}}>ランクイン作品 ({items.length})</span>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        <select className="form-input" style={{flex:1,minWidth:180}} value={pickId} onChange={e=>setPickId(e.target.value)}>
          <option value="">作品を選択...</option>
          {available.map(n=><option key={n.id} value={n.id}>{n.title}</option>)}
        </select>
        <button className="btn btn-primary" style={{padding:"7px 16px",fontSize:11}} onClick={handleAdd} disabled={!pickId}>＋ ランキングに追加</button>
      </div>

      {items.length===0
        ? <div style={{padding:"16px 0",color:"var(--txt3)",fontSize:12}}>まだ作品が追加されていません</div>
        : items.map((it,i)=>{
          const novel=byId[it.novelId];
          return (
            <div key={it.id} className="wmap-rank-edit-row">
              <div className="wmap-rank-edit-top">
                <div className="wmap-rank-edit-num">{i+1}</div>
                <div className="wmap-rank-edit-title">{novel ? novel.title : "（削除された作品）"}</div>
                <div className="wmap-rank-edit-actions">
                  <button className="icon-btn" onClick={()=>onMoveItem(it.id,"up")} disabled={i===0} title="順位を上げる">↑</button>
                  <button className="icon-btn" onClick={()=>onMoveItem(it.id,"down")} disabled={i===items.length-1} title="順位を下げる">↓</button>
                  <button className="icon-btn danger" onClick={()=>onRemoveItem(it.id)}>🗑</button>
                </div>
              </div>
              <BufferedTextarea className="form-input" rows={2} value={it.reason||""}
                onCommit={v=>onSetReason(it.id,v)} placeholder="選出理由を簡単に（任意）"/>
            </div>
          );
        })
      }
    </div>
  );
}

    motokoStories,updateMotokoStory,addMotokoStory,deleteMotokoStory}=store;

  const [editCh,setEditCh]=useState(null);
  const [novelEditTab,setNovelEditTab]=useState("info"); // 作品編集内タブ: info | characters | graph
  const [selectedCharId,setSelectedCharId]=useState(null); // 相関図エディタ上で選択中の人物
  const [editMotokoNum,setEditMotokoNum]=useState(null); // すれ違い：編集中の男のnum
  const [motokoFilter,setMotokoFilter]=useState(""); // すれ違い管理：検索フィルタ

  const [saved,setSaved]=useState(false);
  const [murmurErr,setMurmurErr]=useState("");
  const [newMurmur,setNewMurmur]=useState("");
  const [newFiles,setNewFiles]=useState([]);
  const [newLL,setNewLL]=useState(""); const [newLU,setNewLU]=useState("");
  const fileRef=useRef();
  const [cropSrc,setCropSrc]=useState(null); // 著者アイコン編集中の元画像(data URI)

  const [saving,setSaving]=useState(false);
  const flash=async (fn) => {
    setSaving(true);

    setSaved(true); setSaving(false);

  const eNov=novels.find(n=>n.id===editNid);

  const handleFiles=e=>{
    const files=Array.from(e.target.files);
    Promise.all(files.map(f=>new Promise(res=>{
      const r=new FileReader();
      r.onload=ev=>res({name:f.name,data:ev.target.result,type:f.type.startsWith("image/")?"image":"file"});
      r.readAsDataURL(f);
    }))).then(rs=>setNewFiles(p=>[...p,...rs]));
    e.target.value="";
  };

  const sideItems=[
    {id:"site",label:"サイト設定",icon:"🏠"},
    {id:"author",label:"著者プロフィール",icon:"✍️"},
    {id:"links",label:"SNS・リンク",icon:"🔗"},
    {id:"hitorigoto",label:"ひとりごと管理",icon:"💬"},
    {id:"motoko",label:"九十九人の男たち",icon:"🚶"},
    {id:"messages",label:"受信メッセージ",icon:"✉️",badge:unread},
    {id:"theme",label:"デザイン・テーマ",icon:"🎨"},
    {id:"novels",label:"作品管理",icon:"📚"},
    {id:"worksmap",label:"作品マップ",icon:"🗺"},

  const [menuSelected, setMenuSelected] = useState(false);
  const adminMainRef = useRef(null);

  const scrollAdminTop = () => {
    const doScroll = () => {
      // デスクトップ：admin-main が独立スクロールコンテナ
      if(adminMainRef.current) {
        adminMainRef.current.scrollTop = 0;
      }
      // モバイル：display:block 時はウィンドウ全体がスクロール
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
    };
    requestAnimationFrame(() => requestAnimationFrame(doScroll));
  };

  const selectSec = (id) => {
    setSec(id); setEditNid(null); setEditCh(null); setEditMotokoNum(null); setNovelEditTab("info");
    setMenuSelected(true);
    scrollAdminTop();

  const goBackToMenu = () => setMenuSelected(false);

    <div className={`admin-overlay fadein${menuSelected?" menu-selected":""}`}>
      <div className="admin-sidebar">
        <div className="admin-logo" onClick={onClose} style={{cursor:"pointer"}} title="閲覧ページに戻る"><div className="admin-logo-txt">管理パネル</div><div className="admin-logo-sub" style={{letterSpacing:".2em"}}>← tap to exit</div></div>
        <nav className="admin-nav">
          <div className="admin-nav-group">
            <span className="admin-nav-label">設定</span>
            {sideItems.map(item=>(
              <button key={item.id} className={`admin-nav-item ${sec===item.id?"active":""}`}
                onClick={()=>selectSec(item.id)}>
                {item.icon} {item.label}{item.badge>0&&<span className="badge">{item.badge}</span>}
              </button>
            ))}
          </div>
          {editNid&&(
            <div className="admin-nav-group">
              <span className="admin-nav-label">編集中</span>
              <button className={`admin-nav-item ${sec==="novel_edit"?"active":""}`} onClick={()=>{ setSec("novel_edit"); setMenuSelected(true); scrollAdminTop(); }}>
                📝 {eNov?.title||"作品"}

            </div>

          {editMotokoNum&&sec==="motoko"&&(
            <div className="admin-nav-group">
              <span className="admin-nav-label">編集中</span>
              <button className="admin-nav-item active" onClick={()=>setMenuSelected(true)}>

              </button>
            </div>
          )}
        </nav>
        <div className="admin-close"><button className="admin-close-btn" onClick={onClose}>← サイトに戻る</button></div>
      </div>

      <div className="admin-main" ref={adminMainRef}>
        <button className="mobile-back-btn" onClick={goBackToMenu}>← メニューへ</button>

        {sec==="site"&&(
          <div className="fadein">
            <div className="admin-title">サイト設定</div>

              <div className="form-group"><label className="form-label">サイト名</label><BufferedInput className="form-input" value={site.name} onCommit={v=>setSite(s=>({...s,name:v}))}/></div>
              <div className="form-group"><label className="form-label">ローマ字</label><BufferedInput className="form-input" value={site.nameRoman} onCommit={v=>setSite(s=>({...s,nameRoman:v}))}/></div>

            <div className="form-group"><label className="form-label">サブコピー</label><BufferedTextarea className="form-textarea" value={site.description} onCommit={v=>setSite(s=>({...s,description:v}))} rows={4}/></div>

        })()}
      </div>

      <div className="save-bar"><div className="save-status" style={{color:"var(--txt2)"}}>{saving?"⌛ 保存中…":saved?"✓ 変更を保存しました":"データはFirestoreに自動保存されます"}</div></div>

      {delConfirm&&(
        <div className="modal-bg">
          <div className="modal fadein">

              <button className="btn btn-danger" onClick={()=>{
                if(delConfirm.type==="novel"){ deleteNovel(delConfirm.id); setSec("novels"); setEditNid(null); setMenuSelected(true); scrollAdminTop(); }
                if(delConfirm.type==="chapter"){ deleteChapter(delConfirm.nid,delConfirm.id); setSec("novel_edit"); scrollAdminTop(); }
                if(delConfirm.type==="character"){ deleteCharacter(delConfirm.nid,delConfirm.id); }
                if(delConfirm.type==="motoko"){ deleteMotokoStory(delConfirm.num); setEditMotokoNum(null); }
                setDelConfirm(null);
              }}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {cropSrc&&(
        <ImageCropModal
          src={cropSrc}
          onCancel={()=>setCropSrc(null)}
          onConfirm={dataUrl=>{ setAuthor(a=>({...a,icon:dataUrl})); setCropSrc(null); }}
        />
      )}
    </div>
  );
}

// ═══════════════ BG TEXT LAYER ═══════════════
function BgTextLayer({novels}){
  const [cols, setCols] = React.useState([]);
  const poolRef = React.useRef([]);
  const usedRef = React.useRef([]);
  const colTimersRef = React.useRef({});

  const buildPool = React.useCallback((nvls)=>{
    const sentences = [];
    nvls.forEach(n=>{
      (n.chapters||[]).forEach(ch=>{
        const txt = (ch.content||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
        const dialogRe = /[「『]((?:[^「『」』]|(?:[「『][^「『」』]*[」』]))*)[」』]/g;
        let m;
        while((m=dialogRe.exec(txt))!==null){
          const s=m[0].trim(); if(s.length>=6) sentences.push(s);
        }
        const masked=txt.replace(/[「『]((?:[^「『」』]|(?:[「『][^「『」』]*[」』]))*)[」』]/g,s=>"　".repeat(s.length));
        masked.split(/(?<=。)/).forEach((_,i,arr)=>{
          let pos=0; for(let j=0;j<i;j++) pos+=arr[j].length;
          const s=txt.slice(pos,pos+arr[i].length).trim();
          const clean=s.replace(/[「『][^」』]*[」』]/g,"").trim();
          if(clean.length>=10 && !/^[「『]/.test(s)) sentences.push(s);
        });
      });
    });
    poolRef.current=[...sentences].sort(()=>Math.random()-.5);
    usedRef.current=[];
  },[]);

  const nextPhrase = React.useCallback(()=>{
    if(poolRef.current.length===0){
      if(usedRef.current.length===0) return null;
      poolRef.current=[...usedRef.current].sort(()=>Math.random()-.5);
      usedRef.current=[];
    }
    const phrase=poolRef.current.shift();
    usedRef.current.push(phrase);
    const toV=s=>s.replace(/…/g,"︙").replace(/‥/g,"︰");
    return toV(phrase);
  },[]);

  React.useEffect(()=>{
    if(!novels||novels.length===0) return;
    buildPool(novels);

    const SLOT_W=46, W=window.innerWidth;
    const maxSlots=Math.floor(W/SLOT_W);
    const slots=Array.from({length:maxSlots},(_,i)=>i).sort(()=>Math.random()-.5);

    const initial=slots.map((slot,i)=>{
      const dur=44+Math.random()*26;
      return {
        slot, key:i,
        text: nextPhrase()||"",
        left: slot*SLOT_W+8,
        goUp: Math.random()>.5,
        dur,
        delay: -(Math.random()*70),
        opacity: 0.042+Math.random()*0.028,
      };
    });
    setCols(initial);

    initial.forEach(col=>{
      const schedule=()=>{
        const remaining = col.dur*1000 - Math.abs(col.delay)*1000;
        const wait = remaining > 0 ? remaining : col.dur*1000;
        const timer=setTimeout(()=>{
          const phrase=nextPhrase();
          if(!phrase) return;
          setCols(prev=>prev.map(c=>
            c.key===col.key
              ? {...c, text:phrase, delay:0, goUp:Math.random()>.5, dur:44+Math.random()*26, opacity:0.042+Math.random()*0.028, key:c.key}
              : c
          ));
          colTimersRef.current[col.key]=setTimeout(function loop(){
            const p2=nextPhrase(); if(!p2) return;
            setCols(prev=>prev.map(c=>
              c.key===col.key
                ? {...c, text:p2, delay:0, goUp:Math.random()>.5, dur:44+Math.random()*26, opacity:0.042+Math.random()*0.028}
                : c
            ));
            colTimersRef.current[col.key]=setTimeout(loop,(44+Math.random()*26)*1000);
          },(44+Math.random()*26)*1000);
        },wait);
        colTimersRef.current[col.key]=timer;
      };
      schedule();
    });

    return ()=>{ Object.values(colTimersRef.current).forEach(clearTimeout); };
  },[novels.map(n=>n.id).join(",")]);

  if(cols.length===0) return null;
  return(
    <div className="bg-text-layer" aria-hidden="true">
      {cols.map(col=>(
        <div key={col.key}
          style={{
            position:"absolute",
            left:col.left,
            top:0,
            opacity:col.opacity,
            fontSize:"12px",
            color:"var(--txt)",
            writingMode:"vertical-rl",
            textOrientation:"mixed",
            fontFamily:"var(--serif)",
            letterSpacing:".06em",
            lineHeight:"1.8em",
            whiteSpace:"nowrap",
            animation:`${col.goUp?"driftUp":"driftDown"} ${col.dur}s ${col.delay}s linear infinite`,
          }}>
          {col.text}
        </div>
      ))}
    </div>
  );
}

  ];
  const OUTRO=[
    ov=>{ov.style.transition="opacity .7s cubic-bezier(.4,0,.6,1),clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.opacity="0";ov.style.clipPath="circle(0% at 50% 50%)"},

    ov=>{ov.style.transition="opacity .7s ease,clip-path .7s cubic-bezier(.4,0,.6,1)";ov.style.opacity="0";ov.style.clipPath="circle(0% at 100% 100%)"},

  ];

  const nav=dest=>{
    if(transiting||dest===visPage) return;
    setTransiting(true);
    let idx;
    if(dest==="detail"&&novel){
      const ni=(novels||[]).findIndex(n=>n.id===novel.id);
      idx=ni>=0?ni%TRANSITIONS.length:0;
    } else {
      idx=Math.floor(Math.random()*TRANSITIONS.length);
    }
    const ov=document.createElement("div");
    document.body.appendChild(ov);
    TRANSITIONS[idx](ov,()=>{
      window.scrollTo({top:0,behavior:'instant'});
      document.documentElement.scrollTop=0;
      document.body.scrollTop=0;
      setPage(dest);
      setVisPage(dest);
      requestAnimationFrame(()=>{
        window.scrollTo({top:0,behavior:'instant'});
        document.documentElement.scrollTop=0;
        document.body.scrollTop=0;
      });
      setTimeout(()=>{
        OUTRO[idx](ov);
        setTimeout(()=>{ ov.remove(); setTransiting(false); },850);
      },40);
    });
  };

  const openNovel=n=>{ setNovel(n); nav("detail"); };
  const openNovelById=id=>{ const n=novels.find(x=>x.id===id); if(n) openNovel(n); };

  useEffect(()=>{
    let vp=document.querySelector('meta[name="viewport"]');
    if(!vp){
      vp=document.createElement("meta");
      vp.name="viewport";
      document.head.appendChild(vp);
    }
    if(page==="reading"){
      vp.setAttribute("content","width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes");
    } else {
      vp.setAttribute("content","width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
    }

    // iOS Safari等は、読み込み後にviewportのuser-scalableを変更しても
    // 反映されない場合があるため、reading画面以外ではピンチズーム／
    // ダブルタップズームのジェスチャー自体をJSで直接ブロックする。
    const blockPinch = e=>{ if(e.touches&&e.touches.length>1) e.preventDefault(); };
    const blockGesture = e=>{ e.preventDefault(); };
    let lastTouchEnd=0;
    const blockDoubleTap = e=>{
      const now=Date.now();
      if(now-lastTouchEnd<=300) e.preventDefault();
      lastTouchEnd=now;
    };
    if(page!=="reading"){
      document.addEventListener("touchmove",blockPinch,{passive:false});
      document.addEventListener("gesturestart",blockGesture,{passive:false});
      document.addEventListener("touchend",blockDoubleTap,{passive:false});
    }
    return ()=>{
      document.removeEventListener("touchmove",blockPinch);
      document.removeEventListener("gesturestart",blockGesture);
      document.removeEventListener("touchend",blockDoubleTap);
    };
  },[page]);
  const liveNovel=novel?novels.find(n=>n.id===novel.id)||novel:null;

  const handleAdminClick = () => {
    if(authed) setAdminOpen(true);
    else setShowLogin(true);
  };

  const handleLogout = async () => {
    await auth.signOut();
  };

  // タブタイトル
  useEffect(()=>{
    const base=site.name||"文藻";
    if(page==="home") document.title=base;
    else if(page==="hitorigoto") document.title=`ひとりごと — ${base}`;
    else if(page==="encounter") document.title=`九十九人の男たち — ${base}`;
    else if(page==="tensen") document.title=`台詞・地の文 — ${base}`;
    else if(page==="map") document.title=`作品マップ — ${base}`;
    else if(page==="profile") document.title=`著者プロフィール — ${base}`;
    else if(page==="detail"&&liveNovel) document.title=`${liveNovel.title} — ${base}`;
    else if(page==="reading"&&liveNovel){
      const ch=(liveNovel.chapters||[]).find(c=>c.id===chapterId);

  return(
    <>
      <Styles site={site} lightMode={lightMode}/>
      <div className="app">
        <BgTextLayer novels={publicNovels}/>
        {loading&&(
          <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9000,gap:20}}>
            <div style={{fontFamily:"var(--serif)",fontSize:32,color:"var(--accent)",letterSpacing:"0.12em"}}>{site.name||"文藻"}</div>
            <div style={{width:40,height:2,background:"var(--border)",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:"var(--accent)",animation:"loadbar 1.2s ease infinite"}}/>
            </div>
            <style>{`@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}`}</style>
          </div>
        )}
        {!loading&&dbError&&(
          <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9000,gap:16,padding:40}}>
            <div style={{fontSize:32}}>🔥</div>
            <div style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--txt)"}}>Firebase接続エラー</div>
            <div style={{fontSize:13,color:"var(--txt3)",maxWidth:480,textAlign:"center",lineHeight:1.9}}>{dbError}</div>
            <div style={{fontSize:12,color:"var(--txt3)",maxWidth:480,textAlign:"center",lineHeight:2,marginTop:8,border:"1px solid var(--border)",padding:"16px 20px",borderRadius:3}}>
              <b style={{color:"var(--txt2)"}}>設定手順：</b><br/>
              1. <a href="https://console.firebase.google.com/" target="_blank" style={{color:"var(--accent)"}}>Firebase Console</a> でプロジェクトを作成<br/>
              2. Firestore Database を有効化（テストモードで開始）<br/>
              3. Storage を有効化<br/>
              4. Authentication を有効化<br/>
              5. プロジェクト設定 → ウェブアプリを追加 → 設定値をコピー<br/>
              6. このHTMLの <code style={{background:"var(--surface)",padding:"1px 5px"}}>FIREBASE_CONFIG</code> を書き換えて保存
            </div>
          </div>
        )}
        {!loading&&!dbError&&!adminOpen&&page!=="reading"&&page!=="encounter"&&(
          <Nav
            page={page} onNav={nav} site={site}
            lightMode={lightMode} onToggleLight={()=>setLightMode(m=>!m)}
            authed={authed}
            onAdminClick={handleAdminClick}
            onLogout={handleLogout}
          />
        )}
        {!loading&&!dbError&&!adminOpen&&page==="home"&&<HomePage site={site} novels={publicNovels} onOpen={openNovel} onOpenMap={()=>nav("tensen")}/>}
        {!loading&&!dbError&&!adminOpen&&page==="hitorigoto"&&<HitorigotoPage author={author}/>}
        {!loading&&!dbError&&!adminOpen&&page==="encounter"&&<EncounterPage onExit={()=>nav("home")} stories={store.motokoStories}/>}
        {!loading&&!dbError&&!adminOpen&&page==="tensen"&&<TenSenPage novels={publicNovels} onOpenNovel={openNovelById}/>}
        {!loading&&!dbError&&!adminOpen&&page==="map"&&<WorksMapPage worksMap={store.worksMap} novels={publicNovels} onOpenNovel={openNovelById} onBack={()=>nav("home")}/>}
        {!loading&&!dbError&&!adminOpen&&page==="detail"&&liveNovel&&liveNovel.published!==false&&<DetailPage novel={liveNovel} onBack={()=>nav("home")} onRead={openChapter} onSendMessage={addMessage}/>}
        {!loading&&!dbError&&!adminOpen&&page==="reading"&&liveNovel&&liveNovel.published!==false&&chapterId&&<ReadingPage novel={liveNovel} chapterId={chapterId} onBack={()=>nav("detail")} onChapter={setChapterId} lightMode={lightMode} onToggleLight={()=>setLightMode(m=>!m)}/>}
        {!loading&&!dbError&&!adminOpen&&page==="profile"&&<ProfilePage author={author} novels={publicNovels} onToWorks={()=>nav("home")} site={site} onSendMessage={addMessage}/>}
        {!loading&&!dbError&&adminOpen&&<AdminPanel store={store} onClose={()=>setAdminOpen(false)}/>}
        {showLogin&&(
          <AuthLoginModal
            onSuccess={()=>{ setShowLogin(false); setAdminOpen(true); }}
            onCancel={()=>setShowLogin(false)}
          />
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
