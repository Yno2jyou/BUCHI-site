    @keyframes driftUp{0%{transform:translateY(110vh)}100%{transform:translateY(-120px)}}
    .bg-text-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .bg-text-col{position:absolute;top:0;display:flex;flex-direction:column;gap:2.2em;writing-mode:vertical-rl;text-orientation:mixed;font-family:var(--serif);white-space:nowrap;will-change:transform}
    .rise{animation:rise .6s ease forwards;opacity:0}.d1{animation-delay:.04s}.d2{animation-delay:.14s}.d3{animation-delay:.26s}.d4{animation-delay:.38s}
    @keyframes fadein{from{opacity:0}to{opacity:1}}.fadein{animation:fadein .3s ease forwards}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-hi)}

    /* ═══ 登場人物解説ボタン・モーダル ═══ */
    .char-btn-row{display:flex;justify-content:flex-end;margin-bottom:14px}
    .char-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);font-family:var(--body);font-size:11px;letter-spacing:.16em;padding:9px 18px;border-radius:2px;cursor:pointer;transition:all .2s}
    .char-btn:hover{background:color-mix(in srgb,var(--accent) 22%,transparent)}
    .char-btn-icon{font-size:13px}
    .char-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:960;display:flex;align-items:flex-start;justify-content:center;padding:60px 24px;overflow-y:auto}
    .char-modal{width:100%;max-width:760px;background:var(--bg);border:1px solid var(--border-hi);border-radius:3px;padding:36px 40px 44px;position:relative;margin-bottom:60px}
    .char-modal-close{position:absolute;top:18px;right:18px;background:none;border:none;color:var(--txt3);font-size:22px;cursor:pointer;line-height:1;padding:4px;transition:color .2s}
    .char-modal-close:hover{color:var(--txt)}
    .char-modal-title{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--txt);letter-spacing:.1em;margin-bottom:6px}
    .char-modal-sub{font-size:11px;color:var(--txt3);letter-spacing:.1em;margin-bottom:30px}
    .char-modal-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px}
    .char-modal-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 4px;margin-right:28px;cursor:pointer;font-family:var(--body);font-size:11px;letter-spacing:.16em;color:var(--txt3);transition:all .2s}
    .char-modal-tab.active{border-bottom-color:var(--accent);color:var(--accent)}
    .char-list{display:flex;flex-direction:column;gap:22px}
    .char-card{display:flex;gap:18px;padding-bottom:22px;border-bottom:1px solid var(--border)}
    .char-card:last-child{border-bottom:none;padding-bottom:0}
    .char-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:7px;box-shadow:0 0 8px currentColor}
    .char-card-name{font-family:var(--serif);font-size:16px;color:var(--txt);letter-spacing:.06em;margin-bottom:3px}
    .char-card-role{font-size:11px;color:var(--accent);letter-spacing:.08em;margin-bottom:10px}
    .char-card-desc{font-size:13px;color:var(--txt2);line-height:1.9;white-space:pre-wrap}
    .char-empty{padding:40px 0;text-align:center;color:var(--txt3);font-size:13px;line-height:1.9}
    .char-card-groups{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .char-card-group-tag{font-size:10px;color:var(--txt3);letter-spacing:.05em;border:1px solid var(--border-hi);border-radius:10px;padding:2px 9px}

    /* ═══ キャラクター相関図（閲覧用） ═══ */
    .char-graph-wrap{width:100%;overflow:auto;border:1px solid var(--border);border-radius:2px;background:color-mix(in srgb,var(--bg) 94%,#fff 1%);margin-bottom:8px}
    .char-graph-svg{display:block}
    .char-node-circle{stroke-width:1.5;fill-opacity:.16}
    .char-node-label{font-family:var(--serif);font-size:12px;fill:var(--txt);text-anchor:middle;pointer-events:none}
    .char-edge-label{font-family:var(--body);font-size:10px;fill:var(--txt2);text-anchor:middle;pointer-events:none;letter-spacing:.02em}
    .char-edge-label-bg{fill:var(--bg);opacity:.88}
    .char-group-label{font-family:var(--body);font-size:11px;letter-spacing:.04em}

    /* ═══ キャラクター相関図エディタ（管理画面） ═══ */
    .char-editor-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
    /* 外側：見える範囲は固定サイズで、内側キャンバスが大きい場合はスクロールして辿れる */
    .char-editor-viewport{position:relative;width:100%;height:480px;border:1px solid var(--border-hi);border-radius:2px;overflow:auto;background:color-mix(in srgb,var(--bg) 96%,#fff 1%)}
    /* 内側：実際にキャラクターを配置するキャンバス。登場人物の座標に応じて動的に拡大する */
    .char-editor-stage{position:relative;min-width:100%;min-height:100%;background:
      linear-gradient(var(--border) 1px,transparent 1px) 0 0/24px 24px,
      linear-gradient(90deg,var(--border) 1px,transparent 1px) 0 0/24px 24px;
      }
    .char-editor-svg{position:absolute;inset:0;pointer-events:none}
    .char-editor-node{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:grab;user-select:none;transform:translate(-50%,-50%)}
    .char-editor-node.dragging{cursor:grabbing;z-index:5}
    .char-editor-node.selected .char-editor-node-circle{box-shadow:0 0 0 3px var(--accent)}
    .char-editor-node-circle{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:13px;color:var(--bg);border:2px solid var(--bg);box-shadow:0 2px 10px rgba(0,0,0,.4);touch-action:none}
    .char-editor-node-name{font-size:10px;color:var(--txt2);letter-spacing:.04em;white-space:nowrap;background:var(--bg);padding:1px 6px;border-radius:8px}
    .char-editor-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:13px;text-align:center;padding:0 30px;line-height:1.9}
    .char-editor-hint{font-size:11px;color:var(--txt3);margin-bottom:14px;line-height:1.8}
    .char-rel-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .char-rel-row:last-child{border-bottom:none}
    .char-rel-select{background:var(--surface);border:1px solid var(--border);color:var(--txt);font-family:var(--body);font-size:12px;padding:7px 10px;border-radius:2px}
    .char-rel-arrow{color:var(--txt3);font-size:13px}
    .char-color-dot{width:18px;height:18px;border-radius:50%;border:1px solid var(--border-hi);cursor:pointer;flex-shrink:0;padding:0}

    /* ═══ 所属先（グループ）管理 ═══ */
    .char-group-row{padding:14px 0;border-bottom:1px solid var(--border)}
    .char-group-row:last-child{border-bottom:none}
    .char-group-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .char-group-members{display:flex;gap:8px;flex-wrap:wrap}
    .char-group-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--txt3);border:1px solid var(--border-hi);border-radius:14px;padding:4px 12px 4px 8px;cursor:pointer;transition:all .2s;user-select:none}
    .char-group-chip input{accent-color:var(--accent);cursor:pointer}
    .char-group-chip.checked{color:var(--txt);border-color:var(--accent);background:var(--accent-dim)}

    /* ═══ 10選（地の文・セリフ） ═══ */
    .tensen-wrap{max-width:760px;margin:0 auto;padding:calc(var(--nav-h) + 50px) 48px 90px}
    .tensen-eyebrow{font-family:var(--serif);font-size:13px;color:var(--txt3);letter-spacing:.2em;margin-bottom:10px}
    .tensen-title{font-family:var(--serif);font-size:30px;font-weight:300;color:var(--txt);letter-spacing:.1em;margin-bottom:8px}
    .tensen-desc{font-size:12.5px;color:var(--txt3);line-height:1.9;margin-bottom:36px;max-width:520px}
    .tensen-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:8px}
    .tensen-tab{background:none;border:none;border-bottom:2px solid transparent;padding:11px 4px;margin-right:32px;cursor:pointer;font-family:var(--body);font-size:12px;letter-spacing:.18em;color:var(--txt3);transition:all .2s}
    .tensen-tab.active{border-bottom-color:var(--accent);color:var(--accent)}
    .tensen-reroll-row{display:flex;justify-content:flex-end;margin:18px 0 28px}
    .tensen-reroll-btn{display:inline-flex;align-items:center;gap:8px;background:none;border:1px solid var(--border-hi);color:var(--txt2);font-family:var(--body);font-size:11px;letter-spacing:.14em;padding:8px 16px;border-radius:20px;cursor:pointer;transition:all .2s}
    .tensen-reroll-btn:hover{border-color:var(--accent);color:var(--accent)}
    .tensen-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
    .tensen-item{background:var(--bg);padding:24px 26px;display:flex;flex-direction:column;gap:10px;transition:background .2s}
    .tensen-item:hover{background:color-mix(in srgb,var(--bg) 92%,#fff 4%)}
    .tensen-item-num{font-family:var(--serif);font-size:11px;color:var(--accent);letter-spacing:.1em}
    .tensen-item-text{font-family:var(--serif);font-size:15px;color:var(--txt);line-height:1.95;letter-spacing:.02em}
    .tensen-item.is-dialogue .tensen-item-text{font-style:italic}
    .tensen-item-source{font-size:10.5px;color:var(--txt3);letter-spacing:.06em;cursor:pointer;transition:color .2s;align-self:flex-start}
    .tensen-item-source:hover{color:var(--accent)}
    .tensen-empty{padding:60px 0;text-align:center;color:var(--txt3);font-size:13px;line-height:2}

    /* ═══ 作品マップ（閲覧用） ═══ */
    .wmap-wrap{max-width:920px;margin:0 auto;padding:calc(var(--nav-h) + 50px) 48px 100px}
    .wmap-eyebrow{font-family:var(--serif);font-size:13px;color:var(--txt3);letter-spacing:.2em;margin-bottom:10px}
    .wmap-title{font-family:var(--serif);font-size:30px;font-weight:300;color:var(--txt);letter-spacing:.1em;margin-bottom:8px}
    .wmap-desc{font-size:12.5px;color:var(--txt3);line-height:1.9;margin-bottom:36px;max-width:560px}
    .wmap-section{margin-top:8px}
    .wmap-section-head{margin-bottom:24px}
    .wmap-section-title{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--txt);letter-spacing:.06em;margin-bottom:6px}
    .wmap-section-desc{font-size:12px;color:var(--txt3);line-height:1.8}
    .wmap-empty{padding:60px 20px;text-align:center;color:var(--txt3);font-size:13px;line-height:2;border:1px dashed var(--border-hi);border-radius:3px}

    .wmap-quadrant-wrap{display:flex;flex-direction:column;gap:20px}
    .wmap-quadrant-svg{width:100%;height:auto;overflow:visible}
    .wmap-axis-line{stroke:var(--border-hi);stroke-width:1;stroke-dasharray:3 4}
    .wmap-axis-box{fill:none;stroke:var(--border);stroke-width:1}
    .wmap-axis-label{font-family:var(--body);font-size:11px;letter-spacing:.1em;fill:var(--txt2)}
    .wmap-point-g{cursor:pointer}
    .wmap-point-dot{stroke:var(--bg);stroke-width:2;transition:r .15s}
    .wmap-point-tag-bg{fill:var(--bg);stroke:var(--border-hi);stroke-width:1}
    .wmap-point-tag-text{font-family:var(--body);font-size:11px;fill:var(--txt);letter-spacing:.02em}

    .wmap-legend{display:flex;flex-wrap:wrap;gap:8px 18px}
    .wmap-legend-item{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--txt2);cursor:pointer;background:none;border:none;font-family:var(--body);padding:4px 0;letter-spacing:.03em;transition:color .2s}
    .wmap-legend-item:hover{color:var(--accent)}
    .wmap-legend-item.active{color:var(--accent)}
    .wmap-legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

    .wmap-radar-wrap{display:flex;flex-direction:column;gap:20px;align-items:center}
    .wmap-radar-svg{width:100%;max-width:560px;height:auto;overflow:visible}
    .wmap-radar-ring{fill:none;stroke:var(--border);stroke-width:1}
    .wmap-radar-spoke{stroke:var(--border-hi);stroke-width:1}
    .wmap-radar-axis-label{font-family:var(--body);font-size:11px;letter-spacing:.06em;fill:var(--txt2)}

    .wmap-flow-wrap{display:flex;flex-direction:column;gap:28px}
    .wmap-flow-overview{width:100%;overflow:auto;border:1px solid var(--border);border-radius:2px;background:color-mix(in srgb,var(--bg) 94%,#fff 1%);padding:8px}
    .wmap-flow-svg{display:block;min-width:640px}
    .wmap-flow-edge{stroke:var(--border-hi);stroke-width:1.4}
    .wmap-flow-edge-bg{fill:var(--bg);opacity:.9}
    .wmap-flow-edge-label{font-family:var(--body);font-size:9px;fill:var(--txt3);letter-spacing:.02em}
    .wmap-flow-node-q{fill:var(--surface);stroke:var(--border-hi);stroke-width:1.3;transition:stroke .2s,fill .2s}
    .wmap-flow-node-q.current{stroke:var(--accent);fill:var(--accent-dim)}
    .wmap-flow-node-result{fill:var(--accent-dim);stroke:var(--accent);stroke-width:1.6}
    .wmap-flow-node-result.current{fill:var(--accent);fill-opacity:.3}
    .wmap-flow-node-text{font-family:var(--body);font-size:10.5px;fill:var(--txt);letter-spacing:.02em;pointer-events:none}
    .wmap-flow-interactive{border:1px solid var(--border-hi);border-radius:3px;padding:32px 30px;background:color-mix(in srgb,var(--bg) 92%,#888 8%);min-height:160px;display:flex;align-items:center}
    .wmap-flow-question{width:100%}
    .wmap-flow-question-text{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--txt);letter-spacing:.06em;line-height:1.7;margin-bottom:22px}
    .wmap-flow-options{display:flex;flex-direction:column;gap:10px}
    .wmap-flow-option-btn{background:none;border:1px solid var(--border-hi);color:var(--txt2);font-family:var(--body);font-size:13px;letter-spacing:.04em;padding:13px 18px;text-align:left;cursor:pointer;border-radius:2px;transition:all .2s}
    .wmap-flow-option-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
    .wmap-flow-result{width:100%;text-align:center}
    .wmap-flow-result-label{font-size:9px;letter-spacing:.32em;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
    .wmap-flow-result-title{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--txt);letter-spacing:.06em;margin-bottom:8px}
    .wmap-flow-result-sub{font-size:12px;color:var(--txt3);font-style:italic;margin-bottom:24px}
    .wmap-flow-result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

    .wmap-rank-wrap{display:flex;flex-direction:column;gap:2px}
    .wmap-rank-row{display:flex;align-items:flex-start;gap:18px;padding:18px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s}
    .wmap-rank-row:hover{background:color-mix(in srgb,var(--bg) 92%,#fff 2%)}
    .wmap-rank-row:last-child{border-bottom:none}
    .wmap-rank-num{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--accent);width:40px;flex-shrink:0;text-align:center}
    .wmap-rank-body{flex:1;min-width:0}
    .wmap-rank-title{font-family:var(--serif);font-size:17px;font-weight:400;letter-spacing:.04em;margin-bottom:4px}
    .wmap-rank-sub{font-size:11px;color:var(--txt3);font-style:italic;margin-bottom:8px}
    .wmap-rank-reason{font-size:12.5px;color:var(--txt2);line-height:1.85}

    .wmap-rank-edit-row{padding:14px 0;border-bottom:1px solid var(--border)}
    .wmap-rank-edit-row:last-child{border-bottom:none}
    .wmap-rank-edit-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .wmap-rank-edit-num{font-family:var(--serif);font-size:16px;color:var(--accent);width:24px;flex-shrink:0;text-align:center}
    .wmap-rank-edit-title{flex:1;font-size:13px;color:var(--txt)}
    .wmap-rank-edit-actions{display:flex;gap:4px;flex-shrink:0}
    .wmap-rank-edit-actions .icon-btn:disabled{opacity:.3;cursor:default}

    /* ═══ 作品マップ（管理パネル：編集用） ═══ */
    .wmap-admin-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap}
    .wmap-admin-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 4px;margin-right:28px;cursor:pointer;font-family:var(--body);font-size:11px;letter-spacing:.16em;color:var(--txt3);transition:all .2s}
    .wmap-admin-tab.active{border-bottom-color:var(--accent);color:var(--accent)}
    .wmap-admin-hint{font-size:11px;color:var(--txt3);margin-bottom:18px;line-height:1.8}
    .wmap-admin-subhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;flex-wrap:wrap}

    .wmap-quad-editor-canvas{position:relative;width:100%;height:420px;border:1px solid var(--border-hi);border-radius:2px;background:
      linear-gradient(var(--border) 1px,transparent 1px) 0 0/10% 10%,
      linear-gradient(90deg,var(--border) 1px,transparent 1px) 0 0/10% 10%;
      overflow:hidden}
    .wmap-quad-editor-cross{position:absolute;inset:0;pointer-events:none}
    .wmap-quad-editor-axislabel{position:absolute;font-size:10px;letter-spacing:.1em;color:var(--txt3);pointer-events:none}
    .wmap-quad-node{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:grab;user-select:none;transform:translate(-50%,-50%);touch-action:none}
    .wmap-quad-node.dragging{cursor:grabbing;z-index:5}
    .wmap-quad-node-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--bg);box-shadow:0 2px 8px rgba(0,0,0,.4)}
    .wmap-quad-node-label{font-size:10px;color:var(--txt2);letter-spacing:.02em;white-space:nowrap;background:var(--bg);padding:1px 6px;border-radius:8px;max-width:120px;overflow:hidden;text-overflow:ellipsis}

    .wmap-radar-axis-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .wmap-radar-axis-row:last-child{border-bottom:none}
    .wmap-novel-pick-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .wmap-novel-pick-row:last-child{border-bottom:none}
    .wmap-value-table{width:100%;border-collapse:collapse;margin-top:6px}
    .wmap-value-table th{font-size:9px;letter-spacing:.1em;color:var(--txt3);text-transform:uppercase;text-align:left;padding:8px 8px;border-bottom:1px solid var(--border-hi);white-space:nowrap}
    .wmap-value-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
    .wmap-value-table input[type=range]{width:100%;accent-color:var(--accent)}
    .wmap-value-num{font-size:11px;color:var(--txt3);width:32px;display:inline-block;text-align:right}

    .wmap-flow-editor-viewport{position:relative;width:100%;height:420px;border:1px solid var(--border-hi);border-radius:2px;overflow:auto;background:color-mix(in srgb,var(--bg) 96%,#fff 1%)}
    .wmap-flow-editor-stage{position:relative;min-width:100%;min-height:100%;background:
      linear-gradient(var(--border) 1px,transparent 1px) 0 0/24px 24px,
      linear-gradient(90deg,var(--border) 1px,transparent 1px) 0 0/24px 24px}
    .wmap-flow-editor-svg{position:absolute;inset:0;pointer-events:none}
    .wmap-flow-editor-node{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;cursor:grab;user-select:none;transform:translate(-50%,-50%);touch-action:none;padding:6px 10px;font-size:10.5px;line-height:1.5;color:var(--txt);border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.35);white-space:pre-wrap}
    .wmap-flow-editor-node.dragging{cursor:grabbing;z-index:5}
    .wmap-flow-editor-node.q{width:116px;height:60px;background:var(--surface);border:1.5px solid var(--border-hi)}
    .wmap-flow-editor-node.result{width:92px;height:92px;border-radius:50%;background:var(--accent-dim);border:1.5px solid var(--accent)}
    .wmap-flow-editor-node.selected{box-shadow:0 0 0 3px var(--accent)}
    .wmap-flow-node-row{display:flex;align-items:flex-start;gap:10px;padding:14px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .wmap-flow-node-row:last-child{border-bottom:none}
    .wmap-flow-node-kind-badge{font-size:9px;letter-spacing:.08em;color:var(--accent);border:1px solid var(--accent);border-radius:10px;padding:3px 9px;white-space:nowrap;flex-shrink:0;margin-top:2px}
    .wmap-flow-edge-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .wmap-flow-edge-row:last-child{border-bottom:none}

    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-hi)}

// 入力欄の値を即座にFirestoreへ保存→onSnapshotで戻り値が画面に
// 反映される、という従来の仕組みでは、日本語入力（IME）の変換中に
// 値が外側から上書きされてしまい、変換中の文字が壊れる場合があった。
// このフックは「入力中はローカルの状態だけを更新し、入力が止まった時・
// フォーカスが外れた時にだけ実際の保存処理(onCommit)を呼ぶ」ことで、
// IME入力を中断させずに保存できるようにする。
function useBufferedValue(value, onCommit, debounceMs){
  const [local, setLocal] = useState(value);
  const focusedRef = useRef(false);
  const timerRef   = useRef(null);
  const localRef   = useRef(local);
  const dirtyRef   = useRef(false);
  localRef.current = local;

  // 外部の値（Firestoreからの反映など）は、入力中でなければ取り込む
  useEffect(()=>{
    if(!focusedRef.current) setLocal(value);
  },[value]);

  useEffect(()=>()=>{ if(timerRef.current) clearTimeout(timerRef.current); },[]);

  const commitNow = () => {
    if(timerRef.current){ clearTimeout(timerRef.current); timerRef.current=null; }
    if(dirtyRef.current){ dirtyRef.current=false; onCommit(localRef.current); }
  };

  const handleChange = v => {
    setLocal(v);
    dirtyRef.current = true;
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(commitNow, debounceMs);
  };
  const handleFocus = () => { focusedRef.current = true; };
  const handleBlur  = () => { focusedRef.current = false; commitNow(); };

  return { local, handleChange, handleFocus, handleBlur };
}

function BufferedInput({value, onCommit, debounceMs=700, ...props}){
  const {local, handleChange, handleFocus, handleBlur} = useBufferedValue(value, onCommit, debounceMs);
  return (
    <input
      {...props}
      value={local}
      onChange={e=>handleChange(e.target.value)}
      onFocus={handleFocus}
      onBlur={handleBlur}
    />
  );
}

function BufferedTextarea({value, onCommit, debounceMs=700, ...props}){
  const {local, handleChange, handleFocus, handleBlur} = useBufferedValue(value, onCommit, debounceMs);
  return (
    <textarea
      {...props}
      value={local}
      onChange={e=>handleChange(e.target.value)}
      onFocus={handleFocus}
      onBlur={handleBlur}
    />
  );
}

// ═══════════════ IMAGE CROP MODAL ═══════════════
// 画像をアップロードした際に、円形のアイコン枠に合わせて
// 自由に拡大・縮小・移動（トリミング）できる編集モーダル。
function ImageCropModal({src, onConfirm, onCancel, outputSize=480}){
  const stageRef = useRef(null);
  const imgRef   = useRef(null);
  const [natural, setNatural] = useState(null); // 元画像の幅と高さ
  const [zoom, setZoom]       = useState(1);     // 1 = ステージにフィットする最小ズーム
  const [pos, setPos]         = useState({x:0,y:0}); // 画像中心のオフセット
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef(null);
  const pinchStart = useRef(null);

  // 画像読み込み → 初期フィット
  useEffect(()=>{
    const img = new Image();
    img.onload = () => {
      setNatural({w: img.naturalWidth, h: img.naturalHeight});
      setZoom(1);
      setPos({x:0,y:0});
    };
    img.src = src;
  },[src]);

  if(!natural) {
    return (
      <div className="modal-bg fadein" onClick={onCancel}>
        <div className="modal crop-modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-title">画像を読み込み中…</div>
        </div>
      </div>
    );
  }

  const STAGE = 320; // 表示上のステージサイズ(px、CSSのaspect-ratioで実際は可変だが計算基準として使用)
  const baseScale = Math.max(STAGE/natural.w, STAGE/natural.h); // ステージを覆う最小スケール
  const scale = baseScale * zoom;
  const dispW = natural.w * scale;
  const dispH = natural.h * scale;

  // 画像がステージ範囲を覆うよう、移動量をクランプ
  const clampPos = (x,y,curScale) => {
    const w = natural.w*curScale, h = natural.h*curScale;
    const maxX = Math.max(0,(w-STAGE)/2);
    const maxY = Math.max(0,(h-STAGE)/2);
    return { x: Math.min(maxX,Math.max(-maxX,x)), y: Math.min(maxY,Math.max(-maxY,y)) };
  };

  const onPointerDown = e => {
    e.preventDefault();
    setDragging(true);
    const p = e.touches ? e.touches[0] : e;
    dragStart.current = { x:p.clientX, y:p.clientY, ox:pos.x, oy:pos.y };
  };
  const onPointerMove = e => {
    if(!dragging || !dragStart.current) return;
    e.preventDefault();
    const p = e.touches ? e.touches[0] : e;
    const dx = p.clientX - dragStart.current.x;
    const dy = p.clientY - dragStart.current.y;
    setPos(clampPos(dragStart.current.ox+dx, dragStart.current.oy+dy, scale));
  };
  const onPointerUp = () => { setDragging(false); dragStart.current=null; pinchStart.current=null; };

  const dist = (a,b) => Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
  const onTouchStartCapture = e => {
    if(e.touches.length===2){
      pinchStart.current = { d: dist(e.touches[0],e.touches[1]), zoom };
      setDragging(false);
    }
  };
  const onTouchMoveCapture = e => {
    if(e.touches.length===2 && pinchStart.current){
      e.preventDefault();
      const d = dist(e.touches[0],e.touches[1]);
      const next = Math.min(4, Math.max(1, pinchStart.current.zoom * (d/pinchStart.current.d)));
      setZoom(next);
      setPos(p=>clampPos(p.x,p.y, baseScale*next));
    }
  };

  const onWheel = e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.06 : 0.06;
    setZoom(z=>{
      const next = Math.min(4, Math.max(1, z+delta));
      setPos(p=>clampPos(p.x,p.y, baseScale*next));
      return next;
    });
  };

  const onZoomSlider = e => {
    const next = parseFloat(e.target.value);
    setZoom(next);
    setPos(p=>clampPos(p.x,p.y, baseScale*next));
  };

  const reset = () => { setZoom(1); setPos({x:0,y:0}); };

  const confirm = () => {
    // 表示上の座標系(STAGE基準)から、実画像ピクセル座標系のクロップ範囲を逆算
    const cropSizeOnImg = STAGE/scale;               // ステージ1辺に対応する元画像上のサイズ
    const centerXOnImg = natural.w/2 - pos.x/scale;
    const centerYOnImg = natural.h/2 - pos.y/scale;
    const sx = centerXOnImg - cropSizeOnImg/2;
    const sy = centerYOnImg - cropSizeOnImg/2;

    const canvas = document.createElement("canvas");
    canvas.width = outputSize; canvas.height = outputSize;
    const ctx = canvas.getContext("2d");
    const img = imgRef.current;
    ctx.drawImage(img, sx, sy, cropSizeOnImg, cropSizeOnImg, 0, 0, outputSize, outputSize);
    onConfirm(canvas.toDataURL("image/jpeg", 0.85));
  };

  return (
    <div className="modal-bg fadein" onClick={onCancel}>
      <div className="modal crop-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">アイコン画像を編集</div>
        <div
          ref={stageRef}
          className={`crop-stage${dragging?" dragging":""}`}
          onMouseDown={onPointerDown}
          onMouseMove={onPointerMove}
          onMouseUp={onPointerUp}
          onMouseLeave={onPointerUp}
          onTouchStart={e=>{ onTouchStartCapture(e); onPointerDown(e); }}
          onTouchMove={e=>{ onTouchMoveCapture(e); onPointerMove(e); }}
          onTouchEnd={onPointerUp}
          onWheel={onWheel}
        >
          <img
            ref={imgRef}
            src={src}
            alt=""
            style={{
              width: dispW, height: dispH,
              transform: `translate(${STAGE/2 - dispW/2 + pos.x}px, ${STAGE/2 - dispH/2 + pos.y}px)`,
            }}
          />
          <div className="crop-mask"/>
        </div>
        <div className="crop-controls">
          <span className="crop-zoom-label">🔍 拡大</span>
          <input type="range" min="1" max="4" step="0.01" value={zoom} onChange={onZoomSlider} className="crop-zoom-slider"/>
          <button className="crop-reset-btn" onClick={reset}>リセット</button>
        </div>
        <div className="crop-hint">ドラッグで位置を移動・スライダーやホイールで拡大縮小できます</div>
        <div className="modal-actions">
          <button className="btn" onClick={onCancel}>キャンセル</button>
          <button className="btn btn-primary" onClick={confirm}>適用する</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ AUTH LOGIN MODAL ═══════════════
function AuthLoginModal({onSuccess, onCancel}){
  const [tab, setTab]       = useState("email");
  const [email, setEmail]   = useState("");
  const [pass, setPass]     = useState("");
  const [err, setErr]       = useState("");
  const [loading, setLoading] = useState(false);
  const emailRef = useRef();

  useEffect(()=>{ if(tab==="email") emailRef.current?.focus(); },[tab]);

  const clearErr = () => setErr("");

  const loginEmail = async () => {
    if(!email.trim()||!pass.trim()){ setErr("メールとパスワードを入力してください"); return; }
    setLoading(true); setErr("");
    try {
      await auth.signInWithEmailAndPassword(email.trim(), pass);
      onSuccess();
    } catch(e) {
      const msg = {
        "auth/user-not-found":    "このメールアドレスは登録されていません",
        "auth/wrong-password":    "パスワードが違います",
        "auth/invalid-email":     "メールアドレスの形式が正しくありません",
        "auth/too-many-requests": "試行回数が多すぎます。しばらく待ってください",
        "auth/invalid-credential":"メールアドレスまたはパスワードが違います",
      }[e.code] || `ログインに失敗しました（${e.code}）`;
      setErr(msg);
    }
    setLoading(false);
  };

  const loginGoogle = async () => {
    setLoading(true); setErr("");
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
      onSuccess();
    } catch(e) {
      if(e.code !== "auth/popup-closed-by-user") setErr("Googleログインに失敗しました");
    }
    setLoading(false);
  };

  return(
    <div className="modal-bg fadein" onClick={onCancel}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:400}}>
        <div className="modal-title">管理者ログイン</div>

        <div className="auth-tab-bar">
          {[["email","✉️ メール"],["google","G　Google"]].map(([k,l])=>(
            <button key={k} className={`auth-tab ${tab===k?"active":""}`}
              onClick={()=>{ setTab(k); clearErr(); }}>
              {l}
            </button>
          ))}
        </div>

        {tab==="email"&&(
          <>
            <div className="form-group">
              <label className="form-label">メールアドレス</label>
              <input ref={emailRef} type="email" className="form-input" value={email}
                onChange={e=>{ setEmail(e.target.value); clearErr(); }}
                onKeyDown={e=>e.key==="Enter"&&loginEmail()}
                placeholder="admin@example.com"/>
            </div>
            <div className="form-group">
              <label className="form-label">パスワード</label>
              <input type="password" className="form-input" value={pass}
                onChange={e=>{ setPass(e.target.value); clearErr(); }}
                onKeyDown={e=>e.key==="Enter"&&loginEmail()}
                placeholder="••••••••"/>
            </div>
            {err&&<div style={{color:"#ef4444",fontSize:12,marginBottom:12,letterSpacing:".04em"}}>{err}</div>}
            <div className="modal-actions">
              <button className="btn" onClick={onCancel}>キャンセル</button>
              <button className="btn btn-primary" onClick={loginEmail} disabled={loading}>
                {loading?"ログイン中…":"ログイン"}
              </button>
            </div>
          </>
        )}

        {tab==="google"&&(
          <>
            <p style={{color:"var(--txt2)",fontSize:13,lineHeight:1.9,marginBottom:24,letterSpacing:".04em"}}>
              管理者として登録済みのGoogleアカウントでログインします。
            </p>
            {err&&<div style={{color:"#ef4444",fontSize:12,marginBottom:12,letterSpacing:".04em"}}>{err}</div>}
            <div className="modal-actions">
              <button className="btn" onClick={onCancel}>キャンセル</button>
              <button className="btn btn-primary" onClick={loginGoogle} disabled={loading}
                style={{display:"flex",alignItems:"center",gap:8}}>
                {loading
                  ? "接続中…"
                  : <><span style={{fontWeight:700,fontFamily:"sans-serif",fontSize:15,letterSpacing:0}}>G</span>　Googleでログイン</>
                }
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function useReadingProgress(){
  const [p,setP]=useState(0);
  useEffect(()=>{
    const fn=()=>{ const el=document.documentElement; const h=el.scrollHeight-el.clientHeight; setP(h>0?(el.scrollTop/h)*100:0); };
    window.addEventListener("scroll",fn); return()=>window.removeEventListener("scroll",fn);
  },[]);
  return p;
}

function Nav({page, onNav, site, lightMode, onToggleLight, authed, onAdminClick, onLogout}){
  const navRef = useRef(null);

  // ナビの実際の高さ（モバイルでは2段に折り返ったり、ログイン状態でボタン数が
  // 変わって高さが変動する）をCSS変数 --nav-h に反映し、各ページ側はこの
  // 変数を基準に上部の余白を取ることで、ナビとの重なり・見切れを防ぐ。
  useEffect(()=>{
    const el = navRef.current;
    if(!el) return;
    const apply = () => {
      document.documentElement.style.setProperty("--nav-h", `${el.offsetHeight}px`);
    };
    apply();
    const ro = new ResizeObserver(apply);
    ro.observe(el);
    window.addEventListener("resize", apply);
    return () => { ro.disconnect(); window.removeEventListener("resize", apply); };
  },[authed]);

  return(

// ═══════════════ 10選（地の文・セリフ） ═══════════════
// 投稿されているすべての作品から、開くたび・更新を押すたびに新しくランダムで
// 地の文10件／セリフ10件を選び直す。novelsが変われば（新作投稿時など）
// 抽出元のプール自体も自動的に更新される。
function TenSenPage({novels,onOpenNovel}){
  const [tab,setTab]=useState("dialogue"); // dialogue | narration ※最初に開いた時は「台詞」を表示
  const pool=useMemo(()=>extractTenSenPool(novels),[novels]);
  const [picks,setPicks]=useState({narration:[],dialogue:[]});

  const reroll=useCallback((which)=>{
    setPicks(p=>({...p, [which]: sampleN(which==="narration"?pool.narration:pool.dialogue, 10)}));
  },[pool]);

  // 作品が増減した（≒投稿・更新があった）たびに、両方のプールを新しく選び直す
  useEffect(()=>{
    setPicks({ narration: sampleN(pool.narration,10), dialogue: sampleN(pool.dialogue,10) });
  },[pool]);

  const list = tab==="narration" ? picks.narration : picks.dialogue;

  return(
    <div className="tensen-wrap">
      <div className="tensen-eyebrow rise d1">RANDOM SELECTION</div>
      <h1 className="tensen-title rise d2">台詞・地の文</h1>
      <p className="tensen-desc rise d3">投稿されているすべての作品の中から、台詞・地の文をそれぞれ10件、ランダムに選んでお届けします。</p>
      <div className="tensen-tabs rise d4">
        <button className={`tensen-tab ${tab==="dialogue"?"active":""}`} onClick={()=>setTab("dialogue")}>台詞 10選</button>
        <button className={`tensen-tab ${tab==="narration"?"active":""}`} onClick={()=>setTab("narration")}>地の文 10選</button>
      </div>
      <div className="tensen-reroll-row">
        <button className="tensen-reroll-btn" onClick={()=>reroll(tab)}>⟲ もう一度選び直す</button>
      </div>
      {list.length===0
        ? <div className="tensen-empty">{pool.narration.length+pool.dialogue.length===0
            ? "まだ抜き出せる文章がありません。作品が投稿されると、ここに自動で表示されます。"
            : "該当する文章が見つかりませんでした。"}</div>
        : <div className="tensen-list">
            {list.map((item,i)=>(
              <div key={i} className={`tensen-item fadein ${tab==="dialogue"?"is-dialogue":""}`}>
                <div className="tensen-item-num">NO.{String(i+1).padStart(2,"0")}</div>
                <div className="tensen-item-text">{item.text}</div>
                <div className="tensen-item-source" onClick={()=>onOpenNovel&&onOpenNovel(item.novelId)}>『{item.novelTitle}』より →</div>
              </div>
            ))}
          </div>
      }
    </div>
  );
}

// ═══════════════ 作品マップ（四象限・レーダー・フローチャート） ═══════════════
// novelsから「色」「タイトル」などの最新情報を引きつつ、worksMap側に保存された
// 位置・数値・ノード文言を重ねて表示する。worksMap自体は管理パネルで自由に編集できる。
function WorksMapPage({worksMap, novels, onOpenNovel, onBack}){
  const [tab,setTab]=useState("quadrant"); // quadrant | radar | flow
  const novelById = useMemo(()=>Object.fromEntries(novels.map(n=>[n.id,n])), [novels]);
  const sectionsEnabled = worksMap.sectionsEnabled || { quadrant:true, radar:true, flow:true, ranking:true };
  const InProgress = () => (
    <div className="wmap-empty">🚧 制作中</div>
  );

  return (
    <div className="wmap-wrap">
      <div className="wmap-eyebrow rise d1">WORKS MAP</div>
      <h1 className="wmap-title rise d2">作品マップ</h1>
      <p className="wmap-desc rise d3">投稿されたすべての作品を、いくつかの視点から見渡すページです。気になる点を押すと、その作品のページへ移動します。</p>
      {onBack && <button className="back-link" onClick={onBack} style={{marginBottom:"24px",display:"inline-block"}}>← 作品一覧へ</button>}
      <div className="tensen-tabs rise d4" style={{flexWrap:"wrap"}}>
        <button className={`tensen-tab ${tab==="quadrant"?"active":""}`} onClick={()=>setTab("quadrant")}>四象限マップ</button>
        <button className={`tensen-tab ${tab==="radar"?"active":""}`} onClick={()=>setTab("radar")}>特徴レーダー</button>
        <button className={`tensen-tab ${tab==="flow"?"active":""}`} onClick={()=>setTab("flow")}>フローチャート</button>
        <button className={`tensen-tab ${tab==="ranking"?"active":""}`} onClick={()=>setTab("ranking")}>ランキング</button>
      </div>

      {tab==="quadrant" && (
        <div className="wmap-section fadein">
          <div className="wmap-section-head">
            <div className="wmap-section-title">{worksMap.quadrant.title||"四象限マップ"}</div>
            {worksMap.quadrant.desc && <div className="wmap-section-desc">{worksMap.quadrant.desc}</div>}
          </div>
          {sectionsEnabled.quadrant!==false ? (
            <QuadrantChart data={worksMap.quadrant} novelById={novelById} onOpenNovel={onOpenNovel}/>
          ) : <InProgress/>}
        </div>
      )}

      {tab==="radar" && (
        <div className="wmap-section fadein">
          <div className="wmap-section-head">
            <div className="wmap-section-title">{worksMap.radar.title||"特徴レーダー"}</div>
            {worksMap.radar.desc && <div className="wmap-section-desc">{worksMap.radar.desc}</div>}
          </div>
          {sectionsEnabled.radar!==false ? (
            <RadarChart data={worksMap.radar} novelById={novelById} onOpenNovel={onOpenNovel}/>
          ) : <InProgress/>}
        </div>
      )}

      {tab==="flow" && (
        <div className="wmap-section fadein">
          <div className="wmap-section-head">
            <div className="wmap-section-title">{worksMap.flowchart.title||"フローチャート"}</div>
            {worksMap.flowchart.desc && <div className="wmap-section-desc">{worksMap.flowchart.desc}</div>}
          </div>
          {sectionsEnabled.flow!==false ? (
            <FlowchartView data={worksMap.flowchart} novelById={novelById} onOpenNovel={onOpenNovel}/>
          ) : <InProgress/>}
        </div>
      )}

      {tab==="ranking" && (
        sectionsEnabled.ranking!==false ? (
          <RankingTabView rankings={worksMap.rankings||[]} novelById={novelById} onOpenNovel={onOpenNovel}/>
        ) : (
          <div className="wmap-section fadein"><InProgress/></div>
        )
      )}
    </div>
  );
}

// ───────── ランキング（複数テーマ・閲覧用） ─────────
function RankingTabView({rankings, novelById, onOpenNovel}){
  const [activeId, setActiveId] = useState(rankings[0]?.id || null);
  const active = rankings.find(r=>r.id===activeId) || rankings[0];

  useEffect(()=>{
    if (rankings.length && !rankings.some(r=>r.id===activeId)) setActiveId(rankings[0].id);
  }, [rankings, activeId]);

  if (!rankings.length || !active) {
    return <div className="wmap-empty">まだランキングが作られていません。管理パネルの「作品マップ」から登録できます。</div>;
  }

  return (
    <div className="wmap-section fadein">
      {rankings.length > 1 && (
        <div className="tensen-tabs" style={{flexWrap:"wrap", marginBottom:18}}>
          {rankings.map(r=>(
            <button key={r.id} className={`tensen-tab ${r.id===active.id?"active":""}`} onClick={()=>setActiveId(r.id)}>
              {r.title||"ランキング"}
            </button>
          ))}
        </div>
      )}
      <div className="wmap-section-head">
        <div className="wmap-section-title">{active.title||"作品ランキング"}</div>
        {active.desc && <div className="wmap-section-desc">{active.desc}</div>}
      </div>
      <RankingView data={active} novelById={novelById} onOpenNovel={onOpenNovel}/>
    </div>
  );
}

// ───────── 四象限マトリクス（閲覧用） ─────────
function QuadrantChart({data, novelById, onOpenNovel}){
  const points=(data.points||[]).map(p=>({...p, novel:novelById[p.novelId]})).filter(p=>p.novel);
  const [hoverId,setHoverId]=useState(null);
  const W=720, H=560, pad=56;
  const px = x => pad + (Math.max(0,Math.min(100,x??50))/100)*(W-pad*2);
  const py = y => (H-pad) - (Math.max(0,Math.min(100,y??50))/100)*(H-pad*2);

  if(points.length===0){
    return <div className="wmap-empty">まだ配置された作品がありません。管理パネルの「作品マップ」から登録できます。</div>;
  }

  return (
    <div className="wmap-quadrant-wrap">
      <svg className="wmap-quadrant-svg" viewBox={`0 0 ${W} ${H}`} width="100%">
        {/* 背景グリッドと中心線 */}
        <line x1={pad} y1={H/2} x2={W-pad} y2={H/2} className="wmap-axis-line"/>
        <line x1={W/2} y1={pad} x2={W/2} y2={H-pad} className="wmap-axis-line"/>
        <rect x={pad} y={pad} width={W-pad*2} height={H-pad*2} className="wmap-axis-box"/>
        {/* 軸ラベル */}
        <text x={W-pad+8} y={H/2+4} className="wmap-axis-label" textAnchor="start">{data.xRightLabel||"右"}</text>
        <text x={pad-8} y={H/2+4} className="wmap-axis-label" textAnchor="end">{data.xLeftLabel||"左"}</text>
        <text x={W/2} y={pad-16} className="wmap-axis-label" textAnchor="middle">{data.yTopLabel||"上"}</text>
        <text x={W/2} y={H-pad+28} className="wmap-axis-label" textAnchor="middle">{data.yBottomLabel||"下"}</text>
        {points.map(p=>{
          const cx=px(p.x), cy=py(p.y);
          const hovered=hoverId===p.novelId;
          return (
            <g key={p.novelId} className="wmap-point-g" onClick={()=>onOpenNovel&&onOpenNovel(p.novelId)}
              onMouseEnter={()=>setHoverId(p.novelId)} onMouseLeave={()=>setHoverId(null)}
              onTouchStart={()=>setHoverId(p.novelId)}>
              <circle cx={cx} cy={cy} r={hovered?10:7} fill={p.novel.accent||"var(--accent)"} className="wmap-point-dot"/>
              {hovered && (() => {
                const label = p.novel.title || "";
                // タイトルの長さに応じて枠を可変にし、それでも収まらない場合は
                // textLength で文字間隔を詰めて必ず枠内に収める。
                const estW = label.length * 12.5 + 28;
                const tagW = Math.min(320, Math.max(140, estW));
                const fits = estW <= tagW;
                return (
                  <>
                    <rect x={cx-tagW/2} y={cy-38} width={tagW} height="24" rx="3" className="wmap-point-tag-bg"/>
                    <text x={cx} y={cy-21} className="wmap-point-tag-text" textAnchor="middle"
                      textLength={fits?undefined:tagW-16} lengthAdjust={fits?undefined:"spacingAndGlyphs"}>{label}</text>
                  </>
                );
              })()}
            </g>
          );
        })}
      </svg>
      <div className="wmap-legend">
        {points.map(p=>(
          <div key={p.novelId} className="wmap-legend-item" onClick={()=>onOpenNovel&&onOpenNovel(p.novelId)}>
            <span className="wmap-legend-dot" style={{background:p.novel.accent||"var(--accent)"}}/>{p.novel.title}
          </div>
        ))}
      </div>
    </div>
  );
}

// ───────── レーダーチャート（閲覧用） ─────────
function RadarChart({data, novelById, onOpenNovel}){
  const axes=data.axes||[];
  const novelIds=(data.novelIds||[]).filter(id=>novelById[id]);
  const [activeId,setActiveId]=useState(null);
  const visibleIds = activeId ? [activeId] : novelIds;

  if(axes.length<3 || novelIds.length===0){
    return <div className="wmap-empty">レーダーチャートを表示するには、管理パネルで軸（3つ以上）と作品を登録してください。</div>;
  }

  const W=560, H=560, cx=W/2, cy=H/2, R=Math.min(W,H)/2-72;
  const angleFor = i => -Math.PI/2 + i*(2*Math.PI/axes.length);
  const ptFor = (i, val) => {
    const r = (Math.max(0,Math.min(100,val??0))/100)*R;
    const a = angleFor(i);
    return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  };
  const RINGS=[0.25,0.5,0.75,1];
  const PALETTE=["#c8a86a","#8b5cf6","#f59e0b","#38bdf8","#f87171","#4ade80","#f472b6"];

  return (
    <div className="wmap-radar-wrap">
      <svg className="wmap-radar-svg" viewBox={`0 0 ${W} ${H}`} width="100%">
        {RINGS.map(r=>{
          const poly=axes.map((_,i)=>{ const a=angleFor(i); return `${cx+R*r*Math.cos(a)},${cy+R*r*Math.sin(a)}`; }).join(" ");
          return <polygon key={r} points={poly} className="wmap-radar-ring"/>;
        })}
        {axes.map((ax,i)=>{
          const a=angleFor(i);
          const lx=cx+(R+24)*Math.cos(a), ly=cy+(R+24)*Math.sin(a);
          return (
            <g key={ax.id}>
              <line x1={cx} y1={cy} x2={cx+R*Math.cos(a)} y2={cy+R*Math.sin(a)} className="wmap-radar-spoke"/>
              <text x={lx} y={ly} className="wmap-radar-axis-label" textAnchor="middle">{ax.label}</text>
            </g>
          );
        })}
        {visibleIds.map((nid,si)=>{
          const novel=novelById[nid];
          if(!novel) return null;
          const vals=(data.values||{})[nid]||{};
          const color = novel.accent || PALETTE[si%PALETTE.length];
          const poly=axes.map((ax,i)=>ptFor(i, vals[ax.id]).join(",")).join(" ");
          return (
            <polygon key={nid} points={poly} fill={color} fillOpacity={activeId?0.22:0.12}
              stroke={color} strokeWidth={activeId?2.2:1.4} style={{cursor:"pointer",transition:"all .2s"}}
              onClick={()=>onOpenNovel&&onOpenNovel(nid)}/>
          );
        })}
      </svg>
      <div className="wmap-legend">
        <button className={`wmap-legend-item ${!activeId?"active":""}`} onClick={()=>setActiveId(null)}>
          <span className="wmap-legend-dot" style={{background:"var(--txt3)"}}/>すべて重ねて表示
        </button>
        {novelIds.map((nid,si)=>{
          const novel=novelById[nid];
          const color = novel.accent || PALETTE[si%PALETTE.length];
          return (
            <button key={nid} className={`wmap-legend-item ${activeId===nid?"active":""}`} onClick={()=>setActiveId(activeId===nid?null:nid)}>
              <span className="wmap-legend-dot" style={{background:color}}/>{novel.title}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ───────── フローチャート（閲覧用・質問に沿って進む） ─────────
function FlowchartView({data, novelById, onOpenNovel}){
  const nodes=data.nodes||[];
  const edges=data.edges||[];
  const startId = nodes.length>0 ? nodes[0].id : null;
  const [currentId,setCurrentId]=useState(startId);
  useEffect(()=>{ setCurrentId(startId); }, [startId]);

  const byId = useMemo(()=>Object.fromEntries(nodes.map(n=>[n.id,n])), [nodes]);
  const current = byId[currentId];
  const outgoing = useMemo(()=>edges.filter(e=>e.fromId===currentId), [edges, currentId]);
  // ノード座標の実範囲からviewBoxを動的計算
  const pad=60;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{
    const x=n.x??100, y=n.y??100;
    const hw=n.kind==="result"?46:58, hh=n.kind==="result"?46:30;
    minX=Math.min(minX,x-hw); maxX=Math.max(maxX,x+hw);
    minY=Math.min(minY,y-hh); maxY=Math.max(maxY,y+hh);
  });
  if(!isFinite(minX)){minX=0;minY=0;maxX=900;maxY=560;}
  const vx=minX-pad, vy=minY-pad, vw=maxX-minX+pad*2, vh=maxY-minY+pad*2;
  const W=vw, H=vh;

  if(nodes.length===0){
    return <div className="wmap-empty">フローチャートがまだ作られていません。管理パネルで質問・結果ノードを追加してください。</div>;
  }

  const restart = () => setCurrentId(startId);

  return (
    <div className="wmap-flow-wrap">
      <div className="wmap-flow-interactive">
        {!current ? (
          <div className="wmap-empty">開始ノードが見つかりません。</div>
        ) : current.kind==="result" ? (
          <div className="wmap-flow-result">
            <div className="wmap-flow-result-label">あなたへのおすすめ</div>
            <div className="wmap-flow-result-title">{novelById[current.novelId]?.title || current.text || "結果"}</div>
            {novelById[current.novelId]?.subtitle && <div className="wmap-flow-result-sub">{novelById[current.novelId].subtitle}</div>}
            <div className="wmap-flow-result-actions">
              {novelById[current.novelId] && <button className="btn btn-primary" onClick={()=>onOpenNovel&&onOpenNovel(current.novelId)}>作品を見る →</button>}
              <button className="btn" onClick={restart}>はじめからやり直す</button>
            </div>
          </div>
        ) : (
          <div className="wmap-flow-question">
            <div className="wmap-flow-question-text">{current.text}</div>
            <div className="wmap-flow-options">
              {outgoing.length===0
                ? <div className="wmap-empty" style={{padding:"24px 0"}}>この質問から先の分岐がまだ設定されていません。</div>
                : outgoing.map(e=>(
                  <button key={e.id} className="wmap-flow-option-btn" onClick={()=>setCurrentId(e.toId)}>
                    {e.label || "次へ"} →
                  </button>
                ))
              }
            </div>
          </div>
        )}
      </div>

      <div className="wmap-flow-overview">
        <svg className="wmap-flow-svg" viewBox={`${vx} ${vy} ${vw} ${vh}`} width="100%">
          {edges.map(e=>{
            const a=byId[e.fromId], b=byId[e.toId];
            if(!a||!b) return null;
            const x1=a.x??100, y1=a.y??100, x2=b.x??100, y2=b.y??100;
            const mx=(x1+x2)/2, my=(y1+y2)/2;
            const dim = currentId!==e.fromId;
            return (
              <g key={e.id} opacity={dim?0.28:1}>
                <line x1={x1} y1={y1} x2={x2} y2={y2} className="wmap-flow-edge"/>
                {e.label && <>
                  <rect x={mx-32} y={my-9} width="64" height="16" className="wmap-flow-edge-bg" rx="2"/>
                  <text x={mx} y={my+3} className="wmap-flow-edge-label" textAnchor="middle">{e.label}</text>
                </>}
              </g>
            );
          })}
          {nodes.map(n=>{
            const isResult=n.kind==="result";
            const isCurrent=n.id===currentId;
            const isRevealed=isResult && isCurrent; // おすすめ確定時だけ開示
            const novel = isResult ? novelById[n.novelId] : null;
            const label = isResult ? (novel?novel.title:n.text||"結果") : (n.text||"質問");
            // ノードの枠からラベルがはみ出さないよう、文字数に応じて改行する。
            // 質問ノードは矩形の幅、結果ノードは円の直径を基準に、
            // 1行あたりの最大文字数を決めて折り返し、最大3行まで表示する。
            const qW = 132;
            const rDia = 92;
            const maxCharsPerLine = Math.max(4, Math.floor(((isResult?rDia*0.72:qW-20)) / (isResult?11:10.5)));
            const maxLines = 3;
            const wrapLabel = (text, maxChars, maxL) => {
              // ユーザーが入力した改行はそのまま活かし、
              // 1行が長すぎる場合だけ追加で折り返す。
              const rawLines = String(text).split("\n");
              const lines=[];
              for(const raw of rawLines){
                let rest=raw;
                if(rest.length===0){ lines.push(""); continue; }
                while(rest.length>0 && lines.length<maxL){
                  if(rest.length<=maxChars || lines.length===maxL-1){
                    let chunk=rest.slice(0,maxChars);
                    if(lines.length===maxL-1 && rest.length>maxChars) chunk=chunk.slice(0,-1)+"…";
                    lines.push(chunk);
                    rest=rest.slice(chunk.length);
                  } else {
                    lines.push(rest.slice(0,maxChars));
                    rest=rest.slice(maxChars);
                  }
                }
                if(lines.length>=maxL) break;
              }
              return lines.length?lines.slice(0,maxL):[""];
            };
            const lines = wrapLabel(label, maxCharsPerLine, maxLines);
            const lineHeight = isResult?13:14;
            const qH = Math.max(60, lines.length*lineHeight+30);
            const rR = Math.max(46, rDia/2, lines.length>1?(lines.length*lineHeight+34)/2:46);
            const nx = n.x??100, ny = n.y??100;
            const startY = ny - (lines.length-1)*lineHeight/2;
            return (
              <g key={n.id} opacity={isCurrent?1:0.42} style={{cursor:"default"}}>
                {isResult
                  ? <circle cx={nx} cy={ny} r={rR}
                      className={`wmap-flow-node-result ${isCurrent?"current":""}`}
                      style={isRevealed ? {} : {fill:"var(--surface)",fillOpacity:1}}/>
                  : <rect x={nx-qW/2} y={ny-qH/2} width={qW} height={qH} rx="8" className={`wmap-flow-node-q ${isCurrent?"current":""}`}/>
                }
                {(!isResult || isRevealed) && (
                  <text x={nx} y={startY+4} className="wmap-flow-node-text" textAnchor="middle">
                    {lines.map((ln,i)=>(
                      <tspan key={i} x={nx} y={startY+4+i*lineHeight}>{ln}</tspan>
                    ))}
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      </div>

    </div>
  );
}

// ───────── ランキング（閲覧用） ─────────
function RankingView({data, novelById, onOpenNovel}){
  const items=(data.items||[]).map(it=>({...it, novel:novelById[it.novelId]})).filter(it=>it.novel);

  if(items.length===0){
    return <div className="wmap-empty">まだランキングが作られていません。管理パネルの「作品マップ」から登録できます。</div>;
  }

  return (
    <div className="wmap-rank-wrap">
      {items.map((it,i)=>(
        <div key={it.id} className="wmap-rank-row" onClick={()=>onOpenNovel&&onOpenNovel(it.novelId)}>
          <div className="wmap-rank-num">{i+1}</div>
          <div className="wmap-rank-body">

function countChars(novel) {
  return (novel.chapters||[]).reduce((s,ch)=>s+(ch.content||"").replace(/\s/g,"").length, 0);
}
function fmtCount(n) {
  if(n===0) return "0字";
  if(n>=10000) return `${(n/10000).toFixed(1)}万字`;
  return `${n.toLocaleString()}字`;
}

// 読者向け：admin側でドラッグ配置した相対的な位置関係を保ったまま、
// 表示エリアの中央に大きく収まるように再計算して描画する読み取り専用の相関図。
// 編集時にどれだけ大きい/偏ったキャンバスで配置しても、ここで毎回
// 「実際のキャラクター座標の範囲」だけを基準に正規化するため、必ず中央に表示される。
// 名前ラベル・関係線ラベルは layoutGraphLabels による衝突回避を経て配置されるため、
// 文字どうし・文字とアイコンが重ならないようになっている。
function CharacterGraph({characters,relations,groups}){
  if(characters.length===0) return null;
  // 登場人物が多いほどキャンバスを広げ、ラベルが重なりにくいよう余裕を持たせる
  const extra = Math.max(0, characters.length-6);
  const W = Math.min(680 + extra*70, 1300);
  const H = Math.min(440 + extra*46, 860);
  const byId=Object.fromEntries(characters.map(c=>[c.id,c]));
  const xs=characters.map(c=>c.x??100);
  const ys=characters.map(c=>c.y??100);
  const minX=Math.min(...xs), maxX=Math.max(...xs);
  const minY=Math.min(...ys), maxY=Math.max(...ys);
  const pad=70;
  const spanX=Math.max(maxX-minX,1), spanY=Math.max(maxY-minY,1);
  const scaleX=(W-pad*2)/spanX, scaleY=(H-pad*2)/spanY;
  const scale=Math.min(scaleX,scaleY,1.4);
  // scaleX/scaleYのうち小さい方が採用されるため、もう一方の軸には余白(slack)が残る。
  // その余白を中央寄せに使うことで、描画内容が常にviewBoxの中心に来るようにする。
  const usedW=spanX*scale, usedH=spanY*scale;
  const offsetX=(W-usedW)/2, offsetY=(H-usedH)/2;
  const px=x=>offsetX+((x??100)-minX)*scale;
  const py=y=>offsetY+((y??100)-minY)*scale;

  const groupBoxes=(groups||[]).map(g=>{
    const members=(g.memberIds||[]).map(id=>byId[id]).filter(Boolean);
    if(members.length===0) return null;
    const gx=members.map(c=>px(c.x)), gy=members.map(c=>py(c.y));
    const margin=40;
    const x=Math.min(...gx)-margin, y=Math.min(...gy)-margin;
    const width=Math.max(...gx)-Math.min(...gx)+margin*2;
    const height=Math.max(...gy)-Math.min(...gy)+margin*2;
    return { ...g, x, y, width, height };
  }).filter(Boolean);

  const { nodeRender, edgeRender } = layoutGraphLabels({characters, relations, px, py, nodeRadius:24});
  const nodeById = Object.fromEntries(nodeRender.map(n=>[n.id,n]));

  return(
    <div className="char-graph-wrap">
      <svg className="char-graph-svg" viewBox={`0 0 ${W} ${H}`} width="100%" style={{minHeight:300}}>
        {groupBoxes.map(g=>(
          <g key={g.id}>
            <rect x={g.x} y={g.y} width={g.width} height={g.height} rx="16"
              fill={g.color||"#c8a86a"} fillOpacity="0.08" stroke={g.color||"#c8a86a"} strokeOpacity="0.45" strokeDasharray="3 4"/>
            {g.name&&<text x={g.x+10} y={g.y-6} className="char-group-label" fill={g.color||"#c8a86a"}>{g.name}</text>}
          </g>
        ))}
        {edgeRender.map(r=>{
          if(!r.show) return null;
          const geo=arrowGeometry(r.x1,r.y1,r.x2,r.y2,r.arrowType||"none",24,9);
          return(
            <g key={r.id}>
              <line x1={geo.lx1} y1={geo.ly1} x2={geo.lx2} y2={geo.ly2} stroke={r.color||"var(--accent)"} strokeWidth="1.3" opacity="0.55"/>
              {geo.endArrowPoints&&<polygon points={geo.endArrowPoints} fill={r.color||"var(--accent)"} opacity="0.8"/>}
              {geo.startArrowPoints&&<polygon points={geo.startArrowPoints} fill={r.color||"var(--accent)"} opacity="0.8"/>}
              {r.hasLabel&&(
                <>
                  <rect x={r.labelCx-r.labelW/2} y={r.labelCy-r.labelH/2} width={r.labelW} height={r.labelH} className="char-edge-label-bg"/>
                  <text x={r.labelCx} y={r.labelCy+3} className="char-edge-label">{r.label}</text>
                </>
              )}
            </g>
          );
        })}
        {nodeRender.map(n=>{
          const c=byId[n.id];
          return(
            <g key={n.id}>
              <circle cx={n.cx} cy={n.cy} r="24" className="char-node-circle" stroke={c.color||"var(--accent)"} fill={c.color||"var(--accent)"}/>
              <text x={n.labelCx} y={n.labelCy} className="char-node-label">{c.name}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function renderBody(content, indent=true) {
  const lines = content.split("\n");
  const result = [];
  lines.forEach((line, i) => {
    if (line.trim() === "") {
      result.push(<div key={`blank-${i}`} style={{height:"1.4em"}}/>);
    } else {
      result.push(<p key={`p-${i}`} style={{textIndent: indent ? "1em" : "0"}}>{line}</p>);
    }
  });
  return result;
}

// ═══════════════ ENCOUNTER (九十九人の男たち) ═══════════════
// 元の「九十九人の男たち」サイトを「淵」内のタブとして移植したもの。
// 進捗（すれ違った男のID一覧）はFirebase Authの匿名認証でユーザーごとに
// 区別し、Firestoreの encounterProgress コレクションに永続化する。
// デザインは「淵」全体のテーマ変数には依存せず、独立した黒背景の世界観を保つ。

function useAnonAuthUid(){
  const [uid, setUid] = useState(null);
  useEffect(()=>{
    let unsub;
    unsub = auth.onAuthStateChanged(user=>{
      if(user){ setUid(user.uid); }
      else {
        // すでにログイン中（管理者）であればそのUIDをそのまま使う。
        // 未ログインなら匿名認証でこの端末用のUIDを発行する。
        auth.signInAnonymously().catch(e=>console.error("anon auth failed",e));
      }
    });
    return ()=>unsub&&unsub();
  },[]);
  return uid;
}

// 端末（ブラウザ）に直接保存する進捗キー。
// Firebase匿名認証のUIDはブラウザ／タブ／シークレットモードによって
// 再発行されることがあり、その場合は「別人」としてFirestore上の進捗が
// 引き継がれない（＝閲覧者には「リセットされた」ように見える）。
// そのためUIDの永続性に依存せず、まずlocalStorageを正とし、
// Firestoreは複数端末間の同期・バックアップとして併用する。
const ENCOUNTER_LS_KEY = "encounterProgress_v1";

function loadEncounterProgressLocal(){
  try{
    const raw = localStorage.getItem(ENCOUNTER_LS_KEY);
    if(!raw) return { viewedNums: [], metEndingMan: false };
    const data = JSON.parse(raw);
    return {
      viewedNums: Array.isArray(data.viewedNums) ? data.viewedNums : [],
      metEndingMan: data.metEndingMan === true,
    };
  }catch(e){
    console.error("encounter progress local load failed", e);
    return { viewedNums: [], metEndingMan: false };
  }
}

function saveEncounterProgressLocal(viewedNums, metEndingMan){
  try{
    localStorage.setItem(ENCOUNTER_LS_KEY, JSON.stringify({ viewedNums, metEndingMan }));
  }catch(e){
    console.error("encounter progress local save failed", e);
  }
}

// 「不在の男」— 九十九人目を見届けたあと、闇の中に浮かび上がる幻の百人目の物語。
// 句点や読点の連なりで自然な間（息継ぎ）の単位に分割し、一節ずつ浮かび上がらせる。
const ABSENT_MAN_TITLE = "不在の男";
const ABSENT_MAN_PARAGRAPHS = [
  "百人目の男は、いなかった。",
  "いや、厳密にはそこにいるべき場所に、誰ひとりとして立っていなかった。九十九人の男たちの物語がすべて終わり、九十九人目の男が最後の頁を閉じたとき、舞台の上には静寂だけが残された。街の灯は消え、世界は深淵なる暗闇に包まれた。しかし、その漆黒の暗闇の中で、ふと何かが「開く」音がした。",
  "百人目の男は、登場人物ではない。彼は物語の輪郭の外側にいた。彼は物語を読み、それを見届け、そして最後にはこうして振り返っている「あなた」の近くにいる。朝の通勤電車の窓ガラスに映るぼんやりとした輪郭として。深夜、誰にも言えない秘密を反芻する瞬間の吐息として。あるいは、九十九人の男たちの誰にも感情移入できず、ただ彼らを冷ややかに、あるいは痛ましく見守っていたはずの、あなたの視線そのものとして。",
  "「世界は一つの本になった」と九十九人目の男は言った。ならば、その本を今、開いて読んでいるのは誰なのか。",
  "百人目の男は、何もしない。彼は物語に介入しない。ただ、読み終えた本の表紙をなぞり、そこに刻まれた九十九の傷跡——いや、九十九の「生」の重みを、自分の記憶の一部として引き受ける。",
  "物語の中の男たちは消えた。しかしその物語を読み終えてしまったという事実は、あなたの心に小さな、けれど決して消えることのない棘となって残る。",
  "物語は終わった。\nしかし本を閉じた後の世界は、閉じる前と同じままではないはずだ。",
  "あなたは閉じた本の表紙に自分の指紋を残した。その瞬間から、あなたもまた、この都市の物語の一部となる。百人目の男——それは、九十九人の断片をすべて飲み込み、それでもなお「明日」という新しい頁をめくり続ける、現実の此方にいるあなただ。",
  "本は閉じた。\nさあ、顔を上げてほしい。\n街の灯は、あなたが目を覚ますのを待っている。",
];

function EncounterPage({onExit, stories}){
  const uid = useAnonAuthUid();
  const motokoStories = stories && stories.length>0 ? stories : MOTOKO_STORIES;
  // 初期値はlocalStorageから即時読み込む（タブやブラウザを閉じても消えないようにするため）。
  // Firestore側の進捗（uid取得後に読み込まれる）はこれより後に到着し、より新しい場合のみ反映する。
  const initialLocalProgress = useMemo(()=>loadEncounterProgressLocal(),[]);
  const [viewedNums, setViewedNums] = useState(initialLocalProgress.viewedNums); // すれ違った男のnum一覧（99は除く）
  const [current, setCurrent] = useState(null);
  const [showStory, setShowStory] = useState(false);
  const [cityShift, setCityShift] = useState(0);
  const [cityHidden, setCityHidden] = useState(false);
  const [blackout, setBlackout] = useState(false);
  const [metEndingMan, setMetEndingMan] = useState(initialLocalProgress.metEndingMan); // 99人目「終わりの男」を読み終えたか（進捗表示用。viewedNums/pickNextのロジックには影響しない）
  // blackoutStage: "silence"（無音の暗闇）→ "absent"（不在の男、本文が浮かび上がる）→ "complete"（記録のコンプリートと敬意）
  const [blackoutStage, setBlackoutStage] = useState("silence");
  const [absentParaIdx, setAbsentParaIdx] = useState(-1); // 浮かび上がった段落数（-1=まだ何も）
  const blackoutTimersRef = useRef([]);
  const [fadeOut, setFadeOut] = useState(false); // encounter-view / story-view の表示切替アニメ用
  const [showArchive, setShowArchive] = useState(false); // 既読一覧（図鑑）モーダルの表示状態
  const [lastNewNum, setLastNewNum] = useState(null); // 直近で新しく出会った男のnum（図鑑を閉じるとクリアされる）
  const [isRereading, setIsRereading] = useState(false); // 図鑑から既読の男を選んで読み返している最中か
  const initializedRef = useRef(false);
  const viewedNumsRef = useRef([]); // 進捗読み込みが遅れても、その間に出会った男を見失わないようにするための最新値参照
  viewedNumsRef.current = viewedNums;

  const pickNext = useCallback((nums)=>{
    const usedNums = nums!==undefined ? nums : viewedNumsRef.current;
    if(usedNums.length >= motokoStories.filter(s=>s.num!==99).length){
      return motokoStories.find(s=>s.num===99) || motokoStories[motokoStories.length-1];
    }
    const pool = motokoStories.filter(s=>s.num<99 && !usedNums.includes(s.num));
    const usable = pool.length>0 ? pool : motokoStories.filter(s=>s.num<99);
    return usable[Math.floor(Math.random()*usable.length)];
  },[motokoStories]);

  // localStorageへの保存は常に行う（タブ・ブラウザを閉じても消えないようにする本体の保存先）。
  // Firestoreへの保存はuidが取得できている場合のみ（複数端末間の同期・バックアップ用途）。
  // endingMan が undefined の場合は現在のmetEndingManを引き継ぐ。
  const saveProgress = useCallback((nums, endingMan)=>{
    const resolvedEnding = endingMan !== undefined ? endingMan : metEndingMan;
    saveEncounterProgressLocal(nums, resolvedEnding);
    if(!uid) return; // 認証が済んでいない/失敗していても、ローカル保存は済んでいるので進捗は失われない。
    const payload = {
      viewedNums: nums,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    if(endingMan !== undefined) payload.metEndingMan = endingMan;
    db.collection("encounterProgress").doc(uid).set(payload, { merge: true }).catch(e=>console.error(e));
  },[uid, metEndingMan]);

  const saveProgressRef = useRef(saveProgress);
  saveProgressRef.current = saveProgress;

  // 認証や進捗の読み込みを待たず、画面が開いた瞬間に最初の男をすぐ表示する。
  // 認証(uid取得)に時間がかかったり失敗したりしても、体験自体は止めない。
  // localStorageに既読進捗があれば、それを踏まえて「まだ読んでいない男」から選ぶ。
  useEffect(()=>{
    if(initializedRef.current) return;
    initializedRef.current = true;
    setCurrent(pickNext(initialLocalProgress.viewedNums));
    setCityShift(Math.floor(Math.random()*12)*25);
  },[pickNext]);

  // uidが取得できたら（多くは即時〜数百ms後）、Firestoreの進捗を読み込んで反映する。
  // すでに画面には最初の男が表示済みなので、ここでは進捗(viewedNums/metEndingMan)だけを追いつかせる。
  // 注意：Firestore側のUIDはブラウザ環境によって再発行されることがあるため、
  // 「Firestoreの方がローカルより進捗が少ない（＝別人として扱われ空だった）」場合は
  // ローカルの記録を消さない。常に「より読んでいる方」を採用する。
  useEffect(()=>{
    if(!uid) return;
    let mounted = true;
    db.collection("encounterProgress").doc(uid).get().then(snap=>{
      if(!mounted) return;
      const localNow = loadEncounterProgressLocal();
      if(snap.exists){
        const data = snap.data();
        const remoteNums = Array.isArray(data.viewedNums) ? data.viewedNums : [];
        const remoteEnding = data.metEndingMan === true;
        if(remoteNums.length > localNow.viewedNums.length){
          // Firestore側がローカルより進んでいる（別端末等で進めた場合）→ こちらを採用しローカルにも反映
          setViewedNums(remoteNums);
          if(remoteEnding) setMetEndingMan(true);
          saveEncounterProgressLocal(remoteNums, remoteEnding || localNow.metEndingMan);
        } else if(localNow.viewedNums.length > remoteNums.length){
          // ローカルの方が進んでいる（このUIDが別人として再発行された等）→ Firestore側を追いつかせる
          saveProgressRef.current && saveProgressRef.current(localNow.viewedNums, localNow.metEndingMan);
        }
      } else if(localNow.viewedNums.length > 0){
        // Firestoreにまだ記録がない（このUIDは初回）が、ローカルには進捗がある → Firestoreへ書き込んで同期
        saveProgressRef.current && saveProgressRef.current(localNow.viewedNums, localNow.metEndingMan);
      }
    }).catch(e=>console.error(e));
    return ()=>{ mounted=false; };
  },[uid]);

  const handleShowStory = () => {
    if(!current) return;
    setCityHidden(true);
    setFadeOut(true);
    setTimeout(()=>{
      setShowStory(true);
      setFadeOut(false);
      if(current.num < 99 && !viewedNums.includes(current.num)){
        const next = [...new Set([...viewedNums, current.num])];
        setViewedNums(next);
        saveProgress(next, false);
        setLastNewNum(current.num); // 今回新しく出会った男としてマーク（図鑑を閉じるまでNEW表示）
      }
      if(current.num === 99){
        setMetEndingMan(true); // 99人目（終わりの男）に到達 → 進捗表示を99/99にするためのフラグ
        saveProgress(viewedNumsRef.current, true); // 99人目到達をFirestoreに永続化
      }
    },600);
  };

  const clearBlackoutTimers = () => {
    blackoutTimersRef.current.forEach(t=>clearTimeout(t));
    blackoutTimersRef.current = [];
  };

  // 各段落の文字数に応じて表示間隔を可変にする（短い一文はすぐ、長い段落はじっくり）。
  const ABSENT_MAN_DELAYS = useMemo(()=>{
    const delays = [];
    let acc = 0;
    ABSENT_MAN_PARAGRAPHS.forEach((p)=>{
      delays.push(acc);
      const dwell = Math.min(7200, Math.max(2400, p.length*55));
      acc += dwell;
    });
    return { delays, total: acc };
  },[]);

  const handleNextMan = () => {
    if(current && current.num===99){
      // 最後の男 → ブラックアウト演出（無音の暗闇 → 不在の男 → コンプリート）
      setFadeOut(true);
      setTimeout(()=>{
        setShowStory(false);
        setBlackoutStage("silence");
        setAbsentParaIdx(-1);
        setBlackout(true);

        clearBlackoutTimers();
        // しばらく無音の暗闇が続いた後、本文が一節ずつ静かに浮かび上がる。
        const t0 = setTimeout(()=>{
          setBlackoutStage("absent");
          ABSENT_MAN_DELAYS.delays.forEach((d, i)=>{
            const t = setTimeout(()=> setAbsentParaIdx(i), d);
            blackoutTimersRef.current.push(t);
          });
          const tEnd = setTimeout(()=>{
            setBlackoutStage("complete");
          }, ABSENT_MAN_DELAYS.total + 3200);
          blackoutTimersRef.current.push(tEnd);
        }, 3200);
        blackoutTimersRef.current.push(t0);
      },1000);
      return;
    }
    setFadeOut(true);
    setTimeout(()=>{
      setShowStory(false);
      setCityHidden(false);
      setCityShift(Math.floor(Math.random()*12)*25);
      setCurrent(pickNext());
      setFadeOut(false);
    },500);
  };

  const handleSkipBlackoutStage = () => {
    // 演出を急ぎたい人のための簡易スキップ：今のステージを即座に終端まで進める。
    if(blackoutStage==="silence"){
      clearBlackoutTimers();
      setBlackoutStage("absent");
      setAbsentParaIdx(ABSENT_MAN_PARAGRAPHS.length-1);
      const tEnd = setTimeout(()=> setBlackoutStage("complete"), 1800);
      blackoutTimersRef.current.push(tEnd);
    } else if(blackoutStage==="absent" && absentParaIdx < ABSENT_MAN_PARAGRAPHS.length-1){
      clearBlackoutTimers();
      setAbsentParaIdx(ABSENT_MAN_PARAGRAPHS.length-1);
      const tEnd = setTimeout(()=> setBlackoutStage("complete"), 1800);
      blackoutTimersRef.current.push(tEnd);
    }
  };

  useEffect(()=>{
    return ()=> clearBlackoutTimers();
  },[]);

  const handleRestart = () => {
    clearBlackoutTimers();
    setBlackout(false);
    setBlackoutStage("silence");
    setAbsentParaIdx(-1);
    setFadeOut(false); // ブラックアウト演出中にtrueになったままだったのを戻す（街だけ見えて男が表示されない不具合の修正）
    setViewedNums([]);
    setMetEndingMan(false);
    saveProgress([], false);
    setLastNewNum(null);
    setCurrent(pickNext([]));
    setCityHidden(false);
    setCityShift(Math.floor(Math.random()*12)*25);
  };

  const closeArchive = () => {
    setShowArchive(false);
    setLastNewNum(null); // 図鑑を閉じたらNEW表示はクリアする
    setFadeOut(false); // 図鑑を閉じたら、背後の場面（街 or 物語）をゆっくりフェードインで見せる
  };

  // 図鑑（既読一覧）で出会った男の名前をタップ → その物語を直接開いて読み返す。
  // 通常の「すれ違い」フローとは独立しており、viewedNums/進捗/ブラックアウト演出には一切影響しない。
  // 読み返しを終えたときに元の状態（街 or 物語）へ戻せるよう、開始前の表示状態を退避しておく。
  const preRereadStateRef = useRef(null);
  const handleRereadMan = (num) => {
    const target = motokoStories.find(s=>s.num===num);
    if(!target) return;
    if(!isRereading){
      // すでに読み返し中の別の男から、図鑑経由でさらに別の男へ移る場合は、
      // 一番最初に読み返しに入る直前の状態を保持し続ける（上書きしない）。
      preRereadStateRef.current = { current, showStory, cityHidden };
    }
    setLastNewNum(null);
    setIsRereading(true);
    setFadeOut(true); // 背後のコンテンツを見えない状態にしてから切り替える（唐突な切り替わりを防ぐ）
    setTimeout(()=>{
      setCityHidden(true);
      setCurrent(target);
      setShowStory(true);
      setShowArchive(false); // この時点ではまだ見えない状態なので、図鑑を閉じてもフラッシュしない
      // 「非表示状態」が一度ブラウザに描画されたことを確実に待ってからフェードインを始める。
      // 固定時間のsetTimeoutだと描画タイミングによってカクついて見えることがあるため、
      // 二重のrequestAnimationFrameで「次の描画が完了した直後」を確実に捉える
      // （図鑑に戻るときのcloseArchiveと同じ、単発のフェードイン指示にするための仕組み）。
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          setFadeOut(false); // ここから、図鑑に戻るときと同じ仕組みでゆっくりフェードインする
        });
      });
    }, 280);
  };

  // 読み返しを終えて、図鑑（既読一覧）モーダルに戻る。
  const handleCloseReread = () => {
    setFadeOut(true); // 読み返していた物語をゆっくりフェードアウト
    setTimeout(()=>{
      const prev = preRereadStateRef.current;
      setIsRereading(false);
      if(prev){
        setCurrent(prev.current);
        setShowStory(prev.showStory);
        setCityHidden(prev.cityHidden);
      }
      preRereadStateRef.current = null;
      // fadeOutはtrueのまま保つ＝背後のコンテンツは見えない状態。
      // ここで見える状態に戻すと、図鑑モーダルがフェードインする裏で
      // 読み返し前の男の背景が一瞬透けて見えてしまう（フラッシュバック）。
      // 見える状態への復帰は、図鑑が実際に閉じられるとき（closeArchive）に行う。
      setShowArchive(true); // 読み返し前にいた図鑑ページへ戻る
    },700);
  };

  return (
    <div className="enc-root">
      <div className="enc-noise"/>
      <button className="enc-archive-btn" onClick={()=>setShowArchive(true)}>
        既読一覧
        {lastNewNum!==null && <span className="enc-archive-btn-dot"/>}
      </button>
      <button className="enc-exit-btn" onClick={onExit}>← 淵に戻る</button>

      <div className={`enc-city-container${cityHidden?" enc-city-hidden":""}`}
        style={{transform:`translateX(-${cityShift}%)`}}>
        <div className="enc-city-silhouette"/>
      </div>

      <div className="enc-container">
        {!showStory && current && (
          <div className="enc-view" onClick={handleShowStory} style={{opacity:fadeOut?0:1}}>
            <span className="enc-label">すれ違った男</span>
            <h1 className="enc-man-title">{current.title}</h1>
            <p className="enc-hint">— 立ち止まり、物語を覗く —</p>
          </div>
        )}

        {showStory && current && (
          <div className={`enc-story-view${!fadeOut?" show":""}`} style={{opacity:fadeOut?0:undefined}}>
            <div className="enc-story-header">
              <div>
                <span className="enc-story-num">NO.{String(current.num).padStart(2,"0")}</span>
                <h2 className="enc-story-title">{current.title}</h2>
              </div>
              <span className="enc-story-cat">{current.cat}</span>
            </div>
            {isRereading && <div className="enc-reread-badge">既読一覧からの読み返し</div>}
            <div className="enc-story-content">{current.text}</div>
            <button className="enc-next-btn" onClick={isRereading ? handleCloseReread : handleNextMan}>
              {isRereading ? "図鑑に戻る" : (current.num===99 ? "物語の終わりへ" : "街に戻り、別の男とすれ違う")}
            </button>
          </div>
        )}
      </div>

      <div className="enc-progress">{viewedNums.length + (metEndingMan?1:0)} / {motokoStories.length} 人とすれ違った</div>

      <div className={`enc-blackout${blackout?" show":""}`} onClick={handleSkipBlackoutStage}>
        {blackoutStage==="silence" && (
          <div className="enc-absent-silence">
            <span className="enc-absent-open-sound">・・・</span>
          </div>
        )}

        {blackoutStage==="absent" && (
          <div className="enc-absent-wrap">
            <div className="enc-absent-num">NO.???</div>
            <h1 className="enc-absent-title">{ABSENT_MAN_TITLE}</h1>
            <div className="enc-absent-text">
              {ABSENT_MAN_PARAGRAPHS.map((p,i)=>(
                <p key={i} className={`enc-absent-para${i<=absentParaIdx?" show":""}`}>{p}</p>
              ))}
            </div>
          </div>
        )}

        {blackoutStage==="complete" && (
          <div className="enc-complete-wrap">
            <div className="enc-complete-count">
              <span className="enc-complete-num">100</span>
              <span className="enc-complete-slash">/</span>
              <span className="enc-complete-num">100</span>
            </div>
            <div className="enc-complete-label">記録は、完成した。</div>
            <h1 className="enc-complete-title">これは、あなたの物語</h1>
            <div className="enc-complete-body">
              九十九人の男たちの記録はここで途絶えている。<br/><br/>
              ここから先は、まだインクの乗っていない白紙の頁。<br/>
              街の喧騒に戻り、呼吸を整え、<br/>
              歩き出すあなたの足跡こそが、<br/>
              最後の一篇となる。
            </div>
            <div className="enc-complete-thanks">
              男たちの生き様を見届けた読者に、<br/>心からの敬意を。
            </div>
            <button className="enc-next-btn" style={{marginTop:"3.2rem"}} onClick={(e)=>{e.stopPropagation();handleRestart();}}>最初から歩き直す</button>
          </div>
        )}
      </div>

      {showArchive && (
        <EncounterArchiveModal
          stories={motokoStories}
          viewedNums={viewedNums}
          lastNewNum={lastNewNum}
          onClose={closeArchive}
          onReread={handleRereadMan}
        />
      )}
    </div>
  );
}

// 既読一覧（図鑑）モーダル：カテゴリ別に99人を「？」グリッドで表示し、
// 出会った男は名前を表示する。直近で新しく出会った男には「NEW」を付ける。
function EncounterArchiveModal({stories, viewedNums, lastNewNum, onClose, onReread}){
  const categories = useMemo(()=>{
    const order = [];
    const map = new Map();
    (stories||[]).forEach(s=>{
      if(s.num===99) return; // 「終わりの男」は図鑑には含めない
      if(!map.has(s.cat)){ map.set(s.cat,[]); order.push(s.cat); }
      map.get(s.cat).push(s);
    });
    return order.map(cat=>({cat, items:map.get(cat)}));
  },[stories]);

  const totalCount = (stories||[]).filter(s=>s.num!==99).length;
  const metCount = viewedNums.length;

  return (
    <div className="enc-archive-overlay" onClick={onClose}>
      <div className="enc-archive-panel" onClick={e=>e.stopPropagation()}>
        <div className="enc-archive-header">
          <div>
            <div className="enc-archive-title">すれ違った男たち</div>
            <div className="enc-archive-sub">街で出会った記録</div>
          </div>
          <button className="enc-archive-close" onClick={onClose}>✕</button>
        </div>
        <div className="enc-archive-count">
          <span>{metCount} 人と出会った</span>
          <span>残り {Math.max(0, totalCount-metCount)} 人</span>
        </div>
        <div className="enc-archive-scroll">
          {categories.map(({cat,items})=>(
            <div key={cat} className="enc-archive-cat-group">
              <div className="enc-archive-cat-label">{cat}</div>
              <div className="enc-archive-grid">
                {items.map(s=>{
                  const met = viewedNums.includes(s.num);
                  const isNew = met && lastNewNum===s.num;
                  return (
                    <div
                      key={s.num}
                      className={`enc-archive-card${met?" met":""}${met?" rereadable":""}`}
                      onClick={met ? ()=>onReread(s.num) : undefined}
                      title={met ? "タップして読み返す" : undefined}
                    >
                      {met
                        ? <span className="enc-archive-card-name">{s.title}</span>
                        : <span className="enc-archive-card-q">？</span>
                      }
                      {isNew && <span className="enc-archive-new">NEW</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>

// ═══════════════ MURMUR EDIT LIST ═══════════════
function MurmurEditList({murmurs, onUpdate, onDelete}){
  const [editId, setEditId] = useState(null);
  const [editText, setEditText] = useState("");
  const [saving, setSaving] = useState(false);

  const startEdit = m => { setEditId(m.id); setEditText(m.text); };
  const cancelEdit = () => { setEditId(null); setEditText(""); };
  const saveEdit = async id => {
    setSaving(true);
    await onUpdate(id, editText);
    setSaving(false);
    setEditId(null);
  };

  if(murmurs.length===0) return <div style={{padding:"16px",color:"var(--txt3)",fontSize:13}}>まだ投稿がありません</div>;
  return(
    <div className="msg-list">
      {murmurs.map(m=>(
        <div key={m.id} className="msg-row" style={{cursor:"default"}}>
          {editId===m.id ? (
            <>
              <textarea className="form-textarea" value={editText} onChange={e=>setEditText(e.target.value)} rows={4} style={{marginBottom:8}}/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-primary" disabled={saving} onClick={()=>saveEdit(m.id)} style={{fontSize:12,padding:"4px 14px"}}>{saving?"保存中…":"保存"}</button>
                <button className="btn" onClick={cancelEdit} style={{fontSize:12,padding:"4px 14px"}}>キャンセル</button>
              </div>
            </>
          ) : (
            <div className="msg-body" style={{whiteSpace:"pre-wrap"}}>{m.text}</div>
          )}
          {(m.files||[]).length>0&&<div style={{display:"flex",gap:6,marginTop:8}}>
            {(m.files||[]).map((f,i)=>f.type==="image"
              ?<img key={i} src={f.data} alt="" style={{width:48,height:48,objectFit:"cover",border:"1px solid var(--border)",borderRadius:2}}/>
              :<span key={i} style={{fontSize:11,color:"var(--txt3)"}}>📎{f.name}</span>)}
          </div>}
          <div className="msg-acts">
            <span className="msg-date">{m.date}</span>
            <div style={{marginLeft:"auto",display:"flex",gap:6}}>
              {editId!==m.id&&<button className="icon-btn" style={{fontSize:11}} onClick={()=>startEdit(m)}>✏️ 編集</button>}
              <button className="icon-btn danger" style={{fontSize:11}} onClick={()=>onDelete(m.id)}>🗑 削除</button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}
