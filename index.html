    chapters:[{ id:"c1", title:"第一章　鏡の前で",
      content:`深夜三時。部屋の灯りを落としてから、もう何時間が経ったのだろうか。\n\n彼は洗面台の前に立っていた。蛍光灯の青白い光が顔の輪郭を歪め、目の下の影を深くしていた。鏡の中の男が彼を見つめている。同じ顔、同じ目。しかしどこか——ほんのわずかに——違う気がした。\n\n「お前は誰だ」\n\n声に出すつもりはなかった。だが言葉は勝手に唇から零れ落ちた。鏡の男は答えなかった。ただ静かに、冷たく、彼の問いを反射するだけだった。` }]

const MOTOKO_STORIES = [
  {num:1, cat:"都市", title:"信号待ち男", text:"彼は毎朝、七時十五分に交差点へ現れる。\n\n青信号が点灯しても、彼は渡らない。足を一歩も踏み出さず、ただ赤に変わるのを待つ。通行人は初め怪訝な顔をするが、やがて彼の存在に慣れ、誰も気にしなくなった。\n\n彼が最後に渡ったのは、三年前の十月だった。あの日、向かいのビルで一人の老人が死んだ。心筋梗塞だったと翌日の地方紙は伝えた。彼だけが知っていた。自分が渡るたびに、街の誰かが逝くことを。\n\n今日も青が灯る。彼の足は動かない。赤になると、ほんの少しだけ、肩の力が抜けた。\n\n「まだ、いい」と彼は呟く。誰でもない誰かに向けて。横断歩道の白いラインが、午後の日差しに灼けている。"},
  {num:2, cat:"都市", title:"電柱男", text:"彼を見かけるようになったのは、町内に防犯カメラが増えた頃だった。\n\n四丁目と五丁目の境界にある電柱のそば、彼は毎晩直立している。雨の夜も、霜の朝も。電線が風に揺れるたび、彼は目を細め、なにかに耳を澄ます。\n\n隣の山田さんが不倫をしていることを、彼は知っている。三軒先の田中家で夫婦喧嘩があった夜も、彼の表情は微かに曇った. 街中の盗聴器のようなものだと、私はひそかに思っている。\n\n一度だけ話しかけたことがある。「何を聞いているんですか」。彼は電線を見上げたまま答えた。\n\n「街が、泣いているんです」\n\nその夜、隣の家の電球が一斉に切れた。"},
  {num:3, cat:"都市", title:"公衆電話男", text:"駅前に一台だけ残った公衆電話のそばで、彼はいつも受話器を握っている。\n\n繋がらない番号にかけ続けているのだと、後に知った。押すたびに違う数字の羅列。意味のないランダムな配列。それでも彼は耳を押し当て、じっと待つ。\n\n一月に一度だけ、繋がることがあるという。「過去」に通じた時は、誰かの懐かしい声が聞こえる。「死後」に通じた時は、無音の中にかすかな呼吸音がするだけだと彼は言った。\n\n「どちらが怖いですか」と訊いた。\n\n「過去です」と彼は答えた。「死者は何も責めない。でも、昔の自分の声は、今の私をずっと見ている気がして」\n\n今日も彼はかけている。繋がらない番号を。"},
  {num:4, cat:"都市", title:"地下鉄男", text:"彼は地上に出ない。\n\n駅の改札から先、太陽の光が届く場所へ踏み出せば肺が痛み、三十秒で倒れると医師に告げられたのだという。原因不明。検査するたびに異常なし。それでも彼は地上が怖い。\n\n日比谷線と丸ノ内線の分岐点、地図に載っていない小さなホームに彼の部屋はある。深夜零時を過ぎると電車が来なくなり、そこは静かな住居になる。布団、やかん、文庫本数冊。\n\n「外が見たくないですか」と訊いた。\n\n「毎朝ここで夜明けを想像します」と彼は言った。「地上の空気はきっと冷たくて、光は眩しくて、音がうるさい。でも、怖い場所ほど美しいと思いませんか」\n\n彼は一度も確かめたことがない。"},
  {num:5, cat:"都市", title:"路地裏男", text:"彼に道を訊いてはいけない。\n\n誰もがそう知っていたのに、引っ越してきたばかりの私は知らなかった。迷子になった夕暮れ、細い路地の奥で彼は微笑んだ。「駅なら案内しましょう」。\n\nついていった。角を曲がるたびに聞いたことのない通り名が続いた。レンガ壁、錆びた看板、誰かの洗濯物。三十分歩いて、気づいた。空が狭くなっている。光が遠のいている。\n\n「待ってください、方向が違う」と叫んだ時、彼の影がなかった。\n\n翌朝、どうやって家に戻ったのか覚えていない。ただ、自分の玄関の前に立っていた。鍵は開いていた。表通りへ戻る方法を、今も知らない。"},
  {num:6, cat:"都市", title:"エスカレーター男", text:"彼は一日中、デパートのエスカレーターに乗っている。\n\n上り、下り、上り、下り。同じ距離を、反対方向へ繰り返す。店員に声をかけられることもなく、他の客に怪しまれることもなく、ただ昇降を繰り返している。\n\n彼の隣に立った人間は、運が変わる。たまたま隣になった主婦が宝くじを当て、翌週また隣になった会社員がリストラされた。偶然だと皆は言うが、彼は笑わない。\n\n「運気を移しているんですか」と訊いた。\n\n「いいえ」と彼は言った。「ただ乗っているだけです。上がるものは下がる、下がるものは上がる。私はその隙間にいるだけで」\n\n彼の表情は、上りの時も下りの時も、変わらなかった。"},
  {num:7, cat:"都市", title:"コンビニ男", text:"深夜三時、彼はいつも窓際の雑誌コーナーにいる。\n\n蛍光灯の光を浴びていないと、彼の肌は腐り始める。そう聞いたのはレジのアルバイトからだった。確かめたことはないが、彼は絶対に外に出ない。\n\n彼が何かを買うのを見たことがない。ただ立って、入ってくる客を観察している。光に引き寄せられる虫のように、深夜の常連客が次々と現れ、彼はその顔を一人ずつ記憶していく。\n\n「何を見ているんですか」\n\n「孤独の種類です」と彼は答えた。「深夜に来る人間の孤独は、昼間のそれと全然違う。みんな、光が欲しくて来るんです。食べ物じゃなくて」\n\n彼も、光が欲しいのだろうと、私は思った。"},
  {num:8, cat:"都市", title:"点字ブロック男", text:"彼は裸足で歩く。\n\nどんな季節も、雨の日も、アスファルトの熱い夏も、点字ブロックの上だけを裸足で進む。足裏で読んでいるのだと彼は言う。文字ではなく、感情を。記憶を。誰かの痛みを。\n\n駅の点字ブロックは特に饒舌だという。毎朝そこで泣いた人間の体温が、ブロックに染みついている。転んで膝を擦った子供の恐怖。終電に乗れなかった夜の孤独。路上に染み込んだ悲鳴が、彼の足裏に語りかける。\n\n「読めないものはありますか」と訊いた。\n\n「幸福です」と彼は言った。「幸せな人間は爪先立ちで歩くから、ブロックを踏まない」\n\n彼はそのまま次の停留所へと歩き続けた。"},
  {num:9, cat:"都市", title:"自動ドア男", text:"彼は誰かが近づかないと自分を開けられない。\n\n友人に電話しようとして、手が止まる。声をかけようとして、唇が閉じる。カフェに入ろうとして、三周してから帰る。彼のあらゆる行動は、外部からの刺激がないと起動しない。\n\n「自分から話しかけたことは？」と訊いた。\n\n「ないと思います」と彼は言った。長い沈黙の後で。「でも、近づいてくれた人間を、拒んだこともありません。ドアだから。開くために存在するので」\n\n彼の部屋を訪ねた時、チャイムを鳴らす前から扉は開いていた。中は空っぽだった。家具も、荷物も、彼自身の気配さえも。誰かが来るのを、透明なまま待っていた。"},
  {num:10, cat:"都市", title:"歩道橋男", text:"夜になると、彼は歩道橋の上から車のライトを数える。\n\n一台、二台、三台。数え終えるまで欄干に両手をかけ、橋の下を流れる光の列を見つめる。数え終えた時、その車は必ず事故に遭う。彼はそれを知っている。だから数えるのをやめることができない。\n\n「数えなければいいじゃないですか」と言った。\n\n「そうすると、もっと多くが事故に遭うんです」と彼は答えた。「私が数えることで、一台に絞られる。言わば、生贄の選別です」\n\n彼は橋の欄干を両手で握った。白い指節が闇に浮かぶ。数える行為が、彼に何をしているのかは聞けなかった。"},
  {num:11, cat:"都市", title:"ひなたぼっこ男", text:"公園のベンチに、彼はいつも座っている。\n\n冬の日だまりで目を細め、鳩に囲まれ、段ボールの敷物の上で微睡んでいる。ある時から気づいた。彼の隣に座ると、悩み事を忘れるのだ。\n\n離婚の書類を持ったまま泣いていた女性が、気づけばベンチで眠り、目覚めた時には穏やかな顔をしていた。就職を失敗した青年が隣に腰を下ろし、三十分後に立ち上がって「もう一度やります」と言った。彼は何も言わなかったのに。\n\n「どうやるんですか」と訊いた。\n\n彼は目を開けずに答えた。「ここ、日当たりがいいんです」\n\nそれだけだった。彼はベンチの一部になっていた。悩みを吸い取る、木製の、温かい、なにかに。"},
  {num:12, cat:"都市", title:"ゴミ箱男", text:"彼は毎朝、街を歩く。\n\nそれだけに見える。昼も夜も、何かを拾っているわけでもない。でも、彼が通り過ぎた後、なぜかみんな少しだけ軽くなる。\n\n長年引きずっていた後悔が、翌朝には薄れている。誰かへの怒りが、気づけば色を失っている。恋人を忘れられなかった男が、彼とすれ執った夕方から急に前を向けるようになった。\n\n「何を食べているんですか」と訊いた。\n\n彼は少し考えてから言った。「不要になったものです。ずっと持っていても腐るものを、頂いているだけです」\n\n「苦くないですか」\n\n「慣れました」と彼は言った。「でも、たまに誰かの初恋が混じっていると、甘いんです。捨てたくないのに捨てた感情は、一番甘い」\n\n彼は次の角を曲がって消えた。"},
  {num:13, cat:"都市", title:"看板男", text:"彼の体には、常に何かが書かれている。\n\n看板のように。額に、腕に、背中に。文字は人によって違って見える。待ち合わせで彼に会った二人が、「彼の額に何て書いてありましたか」と訊き合って沈黙した。一方は「死」と読み、もう一方は「孤独」と読んだ。\n\n「自分には何が書いてあるか、わかりますか」と訊いた。\n\n「鏡に映すと白紙です」と彼は言った。「私だけ読めない。他人の恐れは見えるのに、自分の恐れを知らない」\n\n彼が向こうへ歩いていく背中に、何かが書かれていた。遠すぎて、読めなかった。読めなくて、よかったと思った。"},
  {num:14, cat:"自然", title:"陽炎男", text:"夏の昼間、彼の輪郭はぼやけている。\n\n正確には、近づくほど不明確になる。遠くから見ると人の形をしているのに、一メートルまで近づくと霞んで、どこまでが彼でどこからが空気なのかわからなくなる。\n\n彼と長く話した人間は、翌日から記憶が曖昧になる。昨日の朝食を思い出せない。先週会った友人の顔が滲む。大切なはずの約束が、液体のように容器から零れていく。\n\n「あなたと話すと忘れてしまう」と告げた。\n\n「それが私との話の感触なんです」と彼は言った。揺れながら。「熱い地面の上では、何も確かではない。私は夏の証明です。曖昧なままでいいと、誰もが一度は思う、あの感触」\n\n翌日、私は彼の名前を忘れていた。"},
  {num:15, cat:"自然", title:"五月雨男", text:"彼が来た翌日は、必ず雨だ。\n\n梅雨でも台風でもなく、静かなしとしとした雨が三日間続く。それだけではない。彼が通り過ぎた場所では、なんとなく物事がうまくいかなくなる。財布を失くした、口論になった、大事なメールを読み飛ばした。大きな不幸ではない。ただ、ジメジメした不運が続く。\n\n彼はいつも濡れたコートを着ている。晴れた日でも、乾くことがない。\n\n「自分のせいだと知っていますか」と訊いた。\n\n「知っています」と彼は静かに言った。「だから誰にも近づかないようにしているんです。でも、雨が降る前の空気が好きで、つい外に出てしまう」\n\nそれだけで、私は許してしまった。"},
  {num:16, cat:"自然", title:"雷鳴男", text:"彼が喋る前には、必ず沈黙がある。\n\n長い、圧迫するような沈黙の後に、彼の声は来る。鼓膜の奥を揺さぶるような低い声で、一言だけ。その一言がいつも予言になる。\n\n「その会社は来年ない」と言われた同僚は、翌春に倒産を知った。「その人はもうすぐ変わる」と告げられた婚約者は、三ヶ月後に人格が変容したと聞いた。\n\n「なぜ言うんですか」と訊いた。\n\n「言わないと、雷が落ちるんです」と彼は答えた。腹の底から響く声で。「私の中に溜まったものを、言葉として吐き出さないと、内側から裂ける。予言は、私の体を守るための避雷針です」\n\n窓の外で、何かが光った。"},
  {num:17, cat:"自然", title:"流氷男", text:"彼は十二月になると現れ、三月の終わりに消える。\n\n毎年同じコートを着て、同じ公園のベンチに座り、同じ角度で空を見上げている。夏の間、彼がどこにいるのかは誰も知らない。\n\n冬の間、彼は人を愛する。ただし、凍りついた愛し方しかできない。差し出す手は冷たく、言葉は固く、抱擁は氷のようにひんやりとしている。それでも、確かに愛している。体温がないだけで。\n\n「春になったらどうなるんですか」と訊いた。\n\n「溶けます」と彼は言った。少し遠くを見て。「温かい場所では、私という形が保てない。愛したくても、愛せる季節が限られているんです」\n\n雪が降り始めた。彼の頬に積もった。溶けなかった。"},
  {num:18, cat:"自然", title:"つむじ風男", text:"彼が来ると、部屋が荒れる。\n\n物を盗むわけではない。壊すわけでもない。ただ、すべてが少しずつずれる。積み上げた書類、整頓した棚、引き出しの中身、決まった場所にあったはずのすべてが、別の場所にある。\n\n泥棒ではなく、混乱そのものが目的らしい。「なぜこんなことを」と訊くと、彼は首を振った。\n\n「目的がないんです」と彼は言った。「強風が吹けば葉が舞う。それだけです。私は風なので、通り過ぎることしかできない。でも、通り過ぎた後に何かが変わっているのを見ると、少し安心します」\n\n「安心？」\n\n「自分が存在した証拠です。痕跡のない風は、吹いていないのと同じですから」\n\n彼はそう言って、立ち去った。"},
  {num:19, cat:"自然", title:"月食男", text:"満月の夜だけ、彼は外に出る。\n\n月が地球の影に隠れていく時間、彼はゆっくりと自分の影を食べる。道路に落ちた細長い影を、膝をついて口に運ぶように、少しずつ少しずつ。影が短くなるにつれ、彼の体が大きくなる。存在感が膨らむ。\n\n「痛くないですか」と訊いた。\n\n「美味しいです」と彼は答えた。「自分の影は自分の形をしている。飲み込むたびに、私は私になる」\n\n月食が終わると、影が戻ってくる。彼はまた小さくなる。普通の、目立たない、どこにでもいる男になる。次の満月まで、彼は透明なまま過ごす。\n\n影がないと誰かに見咎められるのが怖いと、彼は月の出る前に帰っていった。"},
  {num:20, cat:"自然", title:"土砂降り男", text:"彼の傘の内側だけに、雨が降る。\n\n外は晴れていても、彼が傘を広げると傘の内側の空間だけが曇り、雨粒が落ちてくる。他の誰にも濡れない、彼一人のための雨。\n\n「閉じればいいじゃないですか」と言った。\n\n「閉じると降り方が激しくなるんです」と彼は答えた。「傘が緩衝材みたいなもので、広げていると優しい霧雨程度で済む」\n\n彼のコートはいつも湿っている。靴の中も、鞄の中も。友人に見せると、雨が降っているように見えないと言われた。本当に降っているのか、自分でも疑わしい時がある。\n\n「でも、濡れているんです」と彼は言った。「世界で一番孤独な雨です。誰にも気づいてもらえない雨が、一番重い」"},
  {num:21, cat:"自然", title:"木枯らし男", text:"彼が触れたものは、すぐに枯れる。\n\n庭の植木鉢を手伝おうとして触れた枝が、翌日に茶色く変わった。差し出した花束を受け取った途端、花びらがしなびた。愛情も同じで、彼が「好きだ」と言った翌週には、相手の気持ちが急速に冷めるという。\n\n「なぜ触れるんですか」と訊いた。\n\n「触れずにいられないんです」と彼は言った。乾いた声で。「枯らすとわかっていても、美しいものに手が伸びる。木枯らしは秋の終わりを告げるためにあります。死なせているんじゃなくて、次の季節への扉を開けているんだと、そう思うことにしています」\n\n彼が去った後、庭の葉がすべて落ちていた。"},
  {num:22, cat:"自然", title:"薄氷男", text:"彼の周囲では、声を上げてはいけない。\n\n笑い声、怒声、急に鳴る電話。彼の近くで大きな音がするたびに、世界に亀裂が入る。床に、壁に、空中に、ガラスが割れるような細い線が走って、消える。\n\n彼自身は気づいていないようだった。「最近、地震が多いですね」と彼は言う。\n\n「地震じゃないんです」と伝えた。「あなたが驚くと、世界が割れるんです」\n\n長い沈黙があった。彼はゆっくりと自分の手を見た。\n\n「だから、みんな私の前では静かにするんですね」と言った。「優しいから、ではなくて」\n\n彼の声は、静かだった。静かすぎるほど静かだった。世界がひびわれないように、ずっとそうしてきた声だった。"},
  {num:23, cat:"自然", title:"夕焼け男", text:"午後五時十四分から二十二分の間だけ、彼はこの世に存在できる。\n\n八分間。空が橙から紫へ変わる、あの短い時間。その間だけ、彼に実体がある。触れられる。声が聞こえる。\n\n毎日その場所へ行くようになった。西向きの丘の上、ベンチの端。彼はいつも同じ場所にいる。八分間、私たちは話す。\n\n「昨日の続きを」と言うが、彼には昨日がない。毎日が最初の八分だ。「また明日」と言いかけて、やめた。彼に明日があるかどうか、日が沈むまでわからない。\n\n今日も空が赤く燃えて、彼が現れた。笑顔で。何も覚えていない、まっさらな笑顔で。\n\n私だけが、昨日を知っている。"},
  {num:24, cat:"自然", title:"積乱雲男", text:"彼の感情が爆発すると、雨が降る。\n\n本人から降るのではない。彼の周囲に突然分厚い雲が発生し、激しいスコールが降り注ぐ。怒った時、悲しい時、嬉しすぎる時も。感情の振れ幅が大きいほど、雨足が強い。\n\n雨の後、彼は小さくなっている。巨大な体躯が、泣いた分だけしぼんでいる。\n\n「泣いているんですか」と訊いた。\n\n「そうなんだと思います」と彼は言った。しぼんだまま。「でも涙がどこにあるかわからなくて、気づいたら外に降っているんです。空が代わりに泣いてくれているのか、私が空から泣いているのか」\n\n雲が晴れた。彼は少し照れたように笑って、また少し大きくなった。"},
  {num:25, cat:"自然", title:"不燃男", text:"火の中に入っても、彼は燃えない。\n\n建物火災の現場で偶然一緒になった消防士が、目を疑ったと後に言った。炎の中を歩いて、子供を抱えて出てきた。髪一本焦げていなかった。\n\nその後も何度か火に触れる場面があった。焚き火に手を突っ込み、ライターの炎を舐め、真夏のアスファルトに素足で立った。何も感じないと言う。\n\n「愛する人の体温は感じますか」と訊いた。\n\n長い沈黙があった。\n\n「感じません」と彼は答えた。「火は平気なんです。焼けないから。でも、人の温度だけは届かない。触れれば伝わるはずなのに、その熱さだけが、私の皮膚で消えてしまう」\n\n彼は手のひらを見た。何も傷ついていない手のひらを。"},
  {num:26, cat:"動物", title:"とかげ男", text:"彼はここぞという時に、大切なものを切り捨てる。\n\n友人、恋人、仕事、故郷。危機が来るたびに、彼は何かを置いていく。尻尾を切って逃げるように。そして必ず、しばらくすると同じ場所に戻ってくる。失ったものを探すように。\n\n「なぜ戻るんですか」と訊いた。\n\n「尻尾は生えてくるんです」と彼は言った。「でも、生えてくるのは尻尾であって、切った尻尾ではない。元の尻尾とは違う。私が戻っても、置いていったものはもうない」\n\n彼の背中には、切断の跡のような線がいくつもある。何度も切って、何度も生やして、また切った。\n\n「それでも切るんですか」\n\n「切らないと、全部失くすから」と彼は答えた。後悔の重さで、少し前屈みになって。"},
  {num:27, cat:"動物", title:"蝙蝠男", text:"彼は常に、少し高い場所にいる。\n\n階段の上、棚の上段、観客席の最後列。人より少し高い位置から、場の流れを読んでいる。どちらが優勢か、風向きがどこへ向かっているか。\n\n「敵ですか、味方ですか」と問い詰めたことがある。\n\n「どちらでもないです」と彼は答えた。高いところから。「敵でも味方でもないということは、常に自由に動けるということです。どちらかになった瞬間に、もう半分の選択肢が消える。私は選択肢を失いたくないんです」\n\n「それは孤独じゃないですか」\n\n「昼間の蝙蝠は鳥で、夜間の蝙蝠は鼠だと思われる。どちらにも属せるということは、どちらの孤独も知っているということです」\n\n彼は微笑んだ。どちらにも属さない笑みで。"},
  {num:28, cat:"動物", title:"深海魚男", text:"彼は穏やかな場所が苦手だ。\n\nストレスがないと形を保てない。緊張、プレッシャー、期待の重さ。それがなくなると、彼の輪郭がぼやけ始める。文字通り崩れていく。\n\n転職して楽な職場に移った時、三日で体が破裂しそうになって逃げ帰ったと言う。休暇に南の島へ行って、二日で過呼吸になった。\n\n「つらくないですか」と訊いた。\n\n「平和な場所に行くと怖いんです」と彼は言った。「深海魚が浅瀬に浮かぶと、水圧の変化で体が壊れる。私は、苦しくないと自分の輪郭が信じられない」\n\n彼の職場は残業が多い。上司は厳しい。彼はそこでだけ、ちゃんと人の形をしている。幸せそうには見えないが、確かに、そこにいる。"},
  {num:29, cat:"動物", title:"ナメクジ男", text:"彼が通った後には、銀色の跡が残る。\n\nアスファルトに、床板に、ソファの背もたれに。目に見えない何かが凝固したような、光を反射する細い線。\n\nその跡に触れると、感覚が消える。痛みではない。感触そのものが。指先で跡をなぞると、その指がどこにあるかわからなくなる。\n\n「何を残しているんですか」と訊いた。\n\n「虚無です」と彼は言った。「感情の残滓ではなく、感情がなかった場所の記録です。私が歩いた場所には、私が感じなかったすべてが積もっている」\n\n「何も感じないんですか」\n\n「そうです」と彼は静かに言った。「だから跡が残る。何も感じないことは、何も感じないという形で残り続ける。虚無は消えないんです」\n\n彼の後ろに、銀色の線が伸びていた。"},
  {num:30, cat:"動物", title:"毒蜘蛛男", text:"彼の言葉は美しい。\n\n聞いたことのない言い回し、誰かの核心を突く比喩、笑いと涙が同時に来るような話。初めて会った夜、三時間話して、私は彼のことしか考えられなくなった。\n\n二度目に会うと、話がさらに深まった。三度目には、自分の秘密を全部話していた。家族のこと、失敗のこと、誰にも言えない恐れ。彼は頷きながら聞いた。\n\nある日、気づいた。私の中身が空洞になっている。語るべき物語が、語るべき感情が、何も残っていない。\n\n「全部持っていったんですか」と訊いた。\n\n「美味しかったです」と彼は微笑んだ。「中身のある人間は、美しい言葉に弱い。網の形は、相手の心の形に合わせて変わります」\n\n私には何も残っていなかった。"},
  {num:31, cat:"動物", title:"カメレオン男", text:"彼は相手によって顔が変わる。\n\n威圧的な上司の前では委縮した新人の顔になり、甘えてくる後輩の前では頼れる先輩になり、私の前では何になるのか、自分でも把握していないようだった。\n\n「本当の顔はどれですか」と訊いた。\n\n彼はしばらく黙っていた。\n\n「鏡を見ると、泣きたくなるんです」と言った。「誰かの前にいる時は顔があるのに、一人になると何が本当の顔なのかわからなくなる。鏡の中の人間と目が合うたびに、他人に見えて、泣いてしまう」\n\n彼の目に、確かに涙があった。その涙だけは、誰の前でも同じ形をしていた。\n\n「これが本当の顔かもしれない」と思ったが、言えなかった。"},
  {num:32, cat:"動物", title:"寄生虫男", text:"彼は他人の夢に入り込む。\n\nREM睡眠の深いところで、彼は誰かの夢の中を歩いている。幸福な記憶でできた夢だけを選んで、食べる。家族と過ごした夏の日、初めて恋をした朝、誰かに褒められた瞬間。\n\n翌朝、夢を見た人は「良い夢だった気がするのに、思い出せない」と言う。\n\n「悪い夢は食べないんですか」と訊いた。\n\n「悪い夢は栄養がないんです」と彼は言った。「幸福な記憶は甘くて、力が出る。でも、食べてしまうと夢を見た人の中から消える。彼らが眠りながら微笑むのは、消える前の最後の輝きです」\n\n「罪悪感は」\n\n「あります」と彼は静かに言った。「だから食べた後、毎晩、眠れないんです」"},
  {num:33, cat:"動物", title:"カラス男", text:"彼の部屋は、光るもので溢れている。\n\nビー玉、千円札、誰かが落とした指輪、錆びたボタン、そしてそれと並んで、名前のわからない感情の欠片たち。\n\n「感情も集めているんですか」と訊いた。棚に並んだ小さな瓶を指して。\n\n「希望です」と彼は言った。「誰かが捨てた希望。ゴミ箱の近く、駅のホームの端、病院の待合室。光るものと一緒に落ちている。宝石だと思って拾ったら、誰かの希望だったことがある」\n\n「返さないんですか」\n\n「持ち主がわからないんです」と彼は言った。「だから集めて、保管している。いつか誰かが取りに来る日のために」\n\n部屋の棚に、瓶が増え続けていた。光が、溢れていた。"},
  {num:34, cat:"動物", title:"野良猫男", text:"彼には名前がない。\n\nいや、名前はある。ただ、それで呼ばれることを拒んでいる。「田中さん」と呼ぶと、別の方向を見た。「あなた」と呼ぶと、少しだけこちらを向いた。\n\n彼は愛情は受け取る。差し出した食べ物、かけた言葉、悩みを聞く時間。けれど所有されない。「私の友人」と紹介しようとすると、そっと離れる。「俺のことは、ただの通りすがりで」と言う。\n\n「寂しくないですか」と訊いた。\n\n「寂しいです」と彼は言った。「連れ去られるのが怖いんです。誰かのものになった瞬間に、私は私でなくなる。名前を持った猫は猫じゃなくなる気がして」\n\n彼は窓の外を見た。外の光が、彼の目に映っていた。どこか、遠いところへの光が。"},
  {num:35, cat:"動物", title:"蝶男", text:"彼は一晩だけ現れる。\n\n年に一度、決まって七月の初旬の夜。どこに連絡先もなく、翌朝には消えている。\n\n現れた夜、彼は話す。その年のことを、誰かへの愛を、世界で一番美しいと思ったものを。聞いている間、時間が止まる気がした。その夜だけが、永遠に続く気がした。\n\n翌朝、彼の姿はなく、ベッドの上に細かい金色の粉が残っていた。\n\n「また来ますか」と翌年の夜、また現れた彼に訊いた。\n\n「覚えていないんです」と彼は言った。「昨年の夜のことも、あなたのことも。毎年が初めての夜です。でも、美しいと思うものは同じ」\n\n鱗粉が夜風に散った。一晩の記憶が、消えていった。"},
  {num:36, cat:"動物", title:"ミミズ男", text:"彼が現れると、議論が止まる。\n\n会議室、居酒屋、夫婦の口論。どんな激しい言葉のぶつかり合いも、彼がそこへ入ると自然に沈黙する。強制ではない。ただ、言葉が土に還っていくように、力を失う。\n\n「なぜそうなるんですか」と訊いた。\n\n「言葉を土に還すからです」と彼は言った。「言葉は元々、沈黙でした。私はその前の形に戻しているだけです」\n\n「でも、大切な議論が止まることもある」\n\n「止まれる議論は、止まった方がいい議論です」と彼は静かに言った。「本当に必要な言葉は、沈黙の後にしか生まれない。私は、その沈黙を作っているだけです」\n\n彼が去ると、全員が少し違う言葉を探し始めた。"},
  {num:37, cat:"動物", title:"梟男", text:"彼は前を向いて歩きながら、後ろを見ている。\n\n首が百八十度回転する。正面を向いていても、視線は背後にある。どこへ歩いていても、目は来た道を追っている。\n\n「前が見えないじゃないですか」と言った。\n\n「足元で前は見えます」と彼は答えた。「でも、本当に大事なことは後ろにあります。どこへ向かうかより、どこから来たかを見ていたい」\n\n「過去ばかり見ていたら、躓きますよ」\n\n「躓きます」と彼は認めた。「何度も。でも、躓くたびに過去が一つ増える。増えた過去をまた振り返る。前に進むほど、見るべきものが多くなる」\n\n彼の後ろ向きの目が、私を見た。懐かしそうに、見た。"},
  {num:38, cat:"動物", title:"百足男", text:"彼はいつも、動き出すのが遅い。\n\n考えることが多すぎるのだと言う。一つのことをするのに、百の足をどの順番で動かすかを全部考えてしまう。最初の足を出す前に、最後の足のことが気になる。\n\n「一歩目を踏み出すだけでいいんですよ」と言った。\n\n「わかっています」と彼は言った。「でも、一歩目を踏み出した後の二歩目、三歩目、その先の景色まで全部見えてしまって、どれが正しい足並みかを確かめてから動きたいんです」\n\n「全部同時に動けば？」\n\n「一度やりました」と彼は言った。「バラバラになりました」\n\n彼はゆっくり立ち上がった。百本の足が、少しずつ揃っていった。目的地に着いた時、全員が疲れ果てていた。"},
  {num:39, cat:"社会", title:"サービス残業男", text:"彼のそばでは、時計が戻る。\n\n文字盤の針が逆に動く。十七時が十六時になり、十五時になる。彼が残業する間、周囲の時間は前へ進まない。\n\n「帰ればいいじゃないですか」と言った。\n\n「帰ると、周りが困ります」と彼は言った。針を逆回しにしながら。「私が動かしている間は、みんなの時間も止まっている。止まっているから、疲れない。老いない。彼らの時間を使っていない」\n\n「あなたの時間は」\n\n「私の時間は、逆に動いています」と彼は静かに言った。「残業するたびに、少しずつ若返っています。でも、若返っているのに疲れていくのが、不思議で」\n\n翌朝、彼の髪が少しだけ黒くなっていた。目の下に深い隈が刻まれたまま。"},
  {num:40, cat:"社会", title:"マニュアル男", text:"彼は台本がないと動けない。\n\n朝の挨拶から始まり、昼食の注文、帰りの挨拶まで、全部スクリプトに従っている。棚に分厚いバインダーが並んでいる。朝の巻、天気の巻、家族の話題の巻、緊急時対応の巻。\n\n「想定外のことが起きたら？」と訊いた。\n\n「フリーズします」と彼は言った。実際に少し固まってから。「この前、同僚に突然『最近どう？』と聞かれて、三十秒止まりました。耳から煙が出ました。比喩ではなく、実際に」\n\n「コミュニケーションが怖いんですか」\n\n「怖いというより、ルールがないのが怖いんです」と彼は言った。「マニュアルは、世界が私を傷つけないための説明書です。書いてないことをされると、世界が壊れた気がして」\n\n彼は新しいバインダーを取り出した。「緊急・想定外」と書かれていた。"},
  {num:41, cat:"社会", title:"領収書男", text:"彼はあらゆる感情を経費にしようとする。\n\n誕生日プレゼントに「交際費」、映画館での涙に「消耗品費」、失恋には「損失」と書いた領収書を作る。確定申告の時期、彼の机には愛の領収書が山積みになる。\n\n「悲しくないですか」と訊いた。「感情を数字にして」\n\n「逆です」と彼は言った。「数字にすることで、初めて向き合える。感情のままだと大きすぎて、処理できない。領収書にすると、保管できる。見直せる。いつか精算できる」\n\n「精算できるものですか、感情は」\n\n長い沈黙があった。\n\n「できないものが、引き出しに溜まっています」と彼は言った。「未払いの領収書だらけで、いつか破産するかもしれない」\n\n彼は苦笑した。初めて、人間の顔で。"},
  {num:42, cat:"社会", title:"定時退社男", text:"十七時になると、彼は消える。\n\n文字通り。椅子に座っていたのに、時計が五時を指した瞬間に、煙のように消える。荷物も、コートも、読みかけの書類も残したまま。\n\n「どこへ行くんですか」と翌朝訊いた。\n\n「帰っています」と彼は言った。\n\n「どこへ」\n\n沈黙があった。\n\n「わかりません」と彼は言った。「消えた時のことを覚えていないんです。朝になると、また机の前に座っている。夜に何をしているのかは、知りません」\n\n「怖くないですか」\n\n「帰っているという感覚はあります。どこかに。どこかの、誰かのところに」と彼は言った。「それだけで、今日も働けます」\n\n十七時が来た。彼は消えた。"},
  {num:43, cat:"社会", title:"満員電車男", text:"彼は他人の体温がないと凍えてしまう。\n\n朝の通勤電車に必ず乗る。すし詰めの、押しつぶされそうな、誰もが顔をしかめるあの時間に、彼だけは目を閉じて安心した顔をしている。\n\n「苦しくないですか」と訊いた。\n\n「温かいんです」と彼は言った。「知らない人の体温が、隙間なく伝わってくる。名前も知らない、顔も見えない人たちが、私を囲んでいる。孤独じゃないと思える、唯一の時間です」\n\nコロナ禍、電車が空になった時期、彼は低体温で倒れた。誰にも触れられない空間で、彼の体は静かに冷えていった。\n\n電車が混み始めた日、彼は泣いていた。他人の肩に顔を押しつけて、声を殺して。"},
  {num:44, cat:"社会", title:"ネクタイ男", text:"彼はネクタイを外したことがない。\n\n二十年間、一日も。風呂にも、眠る時も、首に結んだまま。\n\n「苦しくないですか」と訊いた。\n\n「苦しいから、いいんです」と彼は答えた。「首を締めることで理性を保っている。少し絞めると頭が澄む。緩めると、頭の中に変なものが入ってくる気がする。だから絶対に緩めない」\n\n一度だけ、彼がネクタイを外すのを見たという同僚がいた。彼は鏡の前で、自分の顔を誰かわからないと呟き、震えていたという。その後すぐ、彼はネクタイをきつく締め直し、いつもの有能な社員に戻った。\n\n「私にとって、これは服ではなく、境界線なんです」と彼は言った。"},
  {num:45, cat:"社会", title:"はんこ男", text:"彼は何にでもハンコを押す。\n\n契約書はもちろん、レシート、誰かのメモ、あるいは道端に咲いている花びら。そして、自分の肌にも。\n\n「承認です」と彼は言った。「そこに存在していい、と私が認めた証拠です。ハンコがないと、世界はいつ消えてもおかしくない。不安定すぎるんです」\n\n「自分にも押すんですか」\n\n「毎日押さないと、朝起きた時に自分が自分であることを認められないんです」\n\n彼の腕には、幾重にも赤い円が重なっていた。どれが今日の承認で、どれが昨日のものか、もう判別できなかった。承認し続けなければ消えてしまうという恐怖が、インクの匂いとともに漂っていた。"},
  {num:46, cat:"社会", title:"名刺男", text:"彼は名刺を持っていないと、自分が誰かわからなくなる。\n\n名刺を交換する時、彼は最も輝いている。相手の肩書きを読み取り、自分の位置を確認する。儀式が済むと、ようやく呼吸ができるようになる。\n\n「退職したらどうするんですか」と訊いた。\n\n彼は青ざめた。「その質問はやめてください。肩書きのない私には、重力さえ働かない。地面から浮いて、どこかへ飛んでいってしまう。だから私は、一生働き続けなければならないんです」\n\n彼は震える手で名刺入れを握った。そこには、何百枚もの「自分」が詰まっていた。一枚でも失えば、自分の欠片が消えるかのように、彼はそれを大切に守っていた。"},
  {num:47, cat:"社会", title:"メール男", text:"彼の言葉は、送信ボタンを押すまで実体を持たない。\n\n目の前で話していても、声は掠れ、意味は霧散する。けれど、彼がキーボードを叩き、メールを送信した瞬間、その言葉は鋼のような鋭さと、泉のような深さを持つ。\n\n「直接話せばいいじゃないですか」と言った。\n\n「空気が、言葉を薄めるんです」と彼は返信した。「モニター越しでなければ、私は本当のことが言えない。視線、湿度、物音。そういったものが、私の真意を捻じ曲げてしまう」\n\n彼は隣の席に座りながら、私にメールを送ってきた。「今、あなたの横顔を見て、とても寂しいと感じています」\n\n私は隣を見た。彼は無表情で画面を見つめていた。"},
  {num:48, cat:"社会", title:"コーヒー男", text:"彼は一日に五十杯のコーヒーを飲む。\n\n黒い液体を流し込まないと、脳が泥のように沈んでいくのだと言う。カフェインは彼の血管を走る電流であり、それなしでは一歩も動けない。\n\n「眠れないでしょう」と言った。\n\n「眠るのが怖いんです」と彼は答えた。「目が覚めた時、世界がまた一から始まるのが耐えられない。コーヒーを飲み続けていれば、昨日と今日が地続きでいられる。覚醒こそが、私の唯一の救いです」\n\n彼の目は血走り、手はかすかに震えていた。それでも彼はカップを離さない。暗闇の中で、黒い液体を飲み込み続ける。覚醒という名の終わりなき拷問を、彼は自ら選んでいた。"},
  {num:49, cat:"社会", title:"会議男", text:"彼は会議が終わるのを恐れている。\n\n決定を下すことではなく、決定を先延ばしにするために、彼は議論を続ける。アジェンダは増え続け、時間は引き延ばされ、誰も結論にたどり着けない。\n\n「いつ終わるんですか」と訊いた。\n\n「終わったら、行動しなければならない」と彼は囁いた。「行動には責任が伴う。失敗するかもしれない。でも、会議をしていれば、私たちはまだ『可能性』の中にいられる。誰も傷つかず、何も失われない聖域です」\n\nホワイトボードは書き込みで埋まり、参加者は疲弊していた。けれど、彼の目だけは爛々と輝いていた。議論という名の停滞の中で、彼は永遠の安らぎを見出していた。"},
  {num:50, cat:"感情", title:"忘れ物男", text:"彼はいつも、何かを探している。\n\n家を出る時に鍵を、駅に着いた時に財布を、会社に着いた時に昨日の記憶を。彼の人生は、失ったものを埋め合わせるための旅のようだった。\n\n「わざと置いているんですか」と訊いた。\n\n「置かないと、重すぎるんです」と彼は言った。「今日という日を生きるためには、昨日を捨てなければならない。でも、捨てたことを忘れて、また探しに戻ってしまう。その繰り返しです」\n\n彼が歩いた後には、いつも小さな落とし物があった。ボタン、レシート、そして見覚えのない幸福な欠片。彼はそれらを振り返ることなく、今日も何かを探して歩き続ける。"},
  {num:51, cat:"感情", title:"ため息男", text:"彼がため息をつくと、周囲の温度が一度下がる。\n\nそれは単なる空気の排出ではなく、彼の中にある熱が少しずつ漏れ出しているようだった。冬の公園で、彼は一日に何度も、白いため息を吐き出す。\n\n「幸せが逃げますよ」と冗談を言った。\n\n「逃げているのは、私の方かもしれません」と彼は言った。「ため息を吐くたびに、私はここではない場所へ、少しずつ移っているんです。全部吐ききった時、私は本当の自由になれる」\n\n彼の体は、年々薄くなっているように見えた。いつか、最後のため息とともに、彼は透明な風になって消えてしまうのだろう。私はその瞬間を、少しだけ恐れていた。"},
  {num:52, cat:"感情", title:"嫉妬男", text:"彼は他人の幸福を、自分の不幸としてカウントする。\n\n隣人が車を買えば、彼は自分の足が腐るように感じた。同僚が昇進すれば、自分の声が枯れるように感じた。誰かの喜びは、彼の体に刻まれる小さな傷だった。\n\n「疲れませんか」と訊いた。\n\n「疲れます」と彼は言った。「でも、他人の光を見ないと、自分の暗闇が測れないんです。私は彼らの幸福という鏡を通してしか、自分の輪郭を確認できない」\n\n彼は他人のSNSを眺めながら、自分の肌を掻きむしっていた。彼の体は、他人の輝きを吸収して黒く濁り、どろどろとした塊になっていた。その塊こそが、彼の愛そのものだった。"},
  {num:53, cat:"感情", title:"後悔男", text:"彼はバックミラー越しにしか世界を見ない。\n\n歩く時も、話す時も、常に後ろを振り返っている。あの時言えばよかった言葉、あの時選ばなかった道。彼の視界は、過去という名のセピア色の景色で埋め尽くされている。\n\n「前は怖くないですか」と訊いた。\n\n「前には、まだ後悔が落ちていない」と彼は言った。「真っ白な未来は、何も教えてくれない。でも、過去は饒舌だ。失敗という名前の教科書が、山ほどある」\n\n彼は躓きながらも、後ろを見続けていた。彼にとって、未来とは「新しい後悔を収集するための作業」に過ぎなかった。彼の背中は、誰よりも未来を向いていたのに。"},
  {num:54, cat:"感情", title:"初恋男", text:"彼は一生、十五歳の放課後に閉じ込められている。\n\n三十を過ぎ、四十を超えても、彼の心はあの日、図書室の窓際で笑っていた少女を追いかけ続けている。誰と付き合っても、誰と結婚しても、彼はそこにいない。\n\n「もういないんですよ、その子は」と言った。\n\n「知っています」と彼は微笑んだ。「でも、僕の中ではまだ図書室の匂いがしている。新しい記憶を上書きしようとしても、その子の笑顔がインクのように滲み出して、全部塗りつぶしてしまうんです」\n\n彼の現実は、常に二重露光のように重なっていた。目の前の妻の顔の向こうに、いつも誰か別の少女がいた。それは美しく、そして残酷な、永遠の静止画だった。"},
  {num:55, cat:"感情", title:"嘘つき男", text:"彼のつく嘘は、誰も傷つけない。\n\n「昨日は月まで散歩に行った」「私の胃袋の中には小さな宇宙がある」。そんな子供じみた嘘を、彼は真剣な顔でつく。嘘をつくたび、彼の周りには少しだけ色彩が増える。\n\n「なぜ嘘をつくんですか」と訊いた。\n\n「本当のことだけだと、世界が狭すぎるんです」と彼は言った。「嘘は、現実という名の檻に開けた小さな窓です。そこからだけ、私は呼吸ができる」\n\nある日、彼が「私は実は死んでいるんです」と言った。それが嘘なのか、それとも唯一の真実なのか、私には判別できなかった。彼はただ、窓の外を眺めて笑っていた。"},
  {num:56, cat:"感情", title:"泣き虫男", text:"彼は理由もなく泣く。\n\nトーストが焼けたことに感動し、靴紐が解けたことに絶望し、風が吹いたことに戸惑って、彼は涙を流す。彼の涙腺は、世界との境界線そのものだった。\n\n「泣きすぎですよ」と笑った。\n\n「世界が、あまりに生々しいんです」と彼は言った。「目に映るものすべてが、私の心に直接触れてくる。それを涙として外に出さないと、私の心はすぐにパンパンになって破裂してしまう」\n\n彼の瞳は常に潤み、世界を歪めて見ていた。その歪んだ景色こそが、彼にとっての真実であり、優しさだった。彼は泣くことで、世界と和解していた。"},
  {num:57, cat:"感情", title:"微笑み男", text:"彼は葬式でも、修羅場でも、ずっと微笑んでいる。\n\nそれは優しさではなく、一種の拒絶だった。どんな悲劇も、どんな怒りも、彼の微笑みという壁に当たって跳ね返される。彼は決して、その内側へ誰かを入れない。\n\n「何がそんなに面白いんですか」と問い詰めた。\n\n「面白くなんてありません」と彼は言った。口角を上げたまま。「ただ、こうしていないと、中のものが全部溢れ出してしまうんです。この微笑みは、私の心を閉じ込めるためのジッパーのようなものです」\n\n彼の笑顔の裏側で、激しい慟哭が聞こえた気がした。けれど、彼は今日も美しく微笑み、世界という名の惨劇を眺め続けている。"},
  {num:58, cat:"感情", title:"怒り男", text:"彼は世界そのものに怒っている。\n\n信号が長いこと、コーヒーが苦すぎること、誰かが自分を見ないこと。彼の怒りは、自分と世界の折り合いがつかないことへの悲鳴だった。\n\n「怒っても何も変わりませんよ」と言った。\n\n「変わらなくていいんです」と彼は言った。拳を握りしめて。「怒っている間だけ、私は世界と繋がっていられる。無関心になるより、憎んでいる方が、よほどマシだ。私は、この世界を許したくない」\n\n彼の怒りは、年を追うごとに研ぎ澄まされ、自分自身を傷つけ始めていた。それでも彼は怒り続けた。そうすることでしか、自分が「生きている」ことを証明できなかったから。"},
  {num:59, cat:"感情", title:"期待男", text:"彼は常に、何かが起こるのを待っている。\n\n誰かが自分を見つけ出してくれること、明日が劇的に変わること、宝くじが当たること。彼の人生は、永遠の待合室だった。\n\n「自分で動かないんですか」と訊いた。\n\n「動くと、可能性が消えてしまう」と彼は言った。「期待している間は、何にでもなれる。でも、選んでしまったら、それ以外にはなれない。私は、無限の可能性の中に留まっていたいんです」\n\n彼は結局、何もしないまま年老いていった。けれど、その目は最期まで、奇跡を待つ少年のように輝いていた。彼は「何も起こらなかった」という奇跡を、生きたのかもしれない。"},
  {num:60, cat:"感情", title:"諦め男", text:"彼はすべてを諦めることから一日を始める。\n\n「今日は何もうまくいかない」「誰も私を理解しない」。そう自分に言い聞かせることで、彼は世界から受ける傷を最小限に抑えていた。\n\n「悲しくないですか」と訊いた。\n\n「楽ですよ」と彼は言った。「期待しなければ、裏切られることもない。絶望の底は、意外と温かくて静かです。私はそこで、誰にも邪魔されずに眠っていたい」\n\n彼は透明な壁の中に引きこもり、静かに呼吸をしていた。その諦めは、ある種の悟りにも似ていた。彼は、何もしないことで、すべてを手に入れたような顔をしていた。"},
  {num:61, cat:"身体", title:"指先男", text:"彼は何にでも触れる。言葉より先に指が出る。\n\nカフェのテーブルの木目、誰かのコートのボタン、本屋の背表紙。触れることで、その物の「重さ」ではなく「物語」を感じ取っているのだと言う。\n\n「私の手に触れて、何がわかりますか」と訊いた。\n\n彼は私の指先にそっと触れた。「砂時計のような音がします」と言った。「あなたは、いつも何かに追われている。でも、その砂はとてもきれいです」\n\n彼の指は驚くほど冷たく、けれど吸い付くように優しかった。彼が触れた場所には、しばらくの間、見えない熱が残り続ける。彼は世界を、指先だけで読み解く預言者だった。"},
  {num:62, cat:"身体", title:"鼓動男", text:"彼は自分の心臓の音が、街の騒音に同期していると信じている。\n\n工事の音、車のクラクション、誰かの笑い声。それらが激しくなると、彼の鼓動も速くなる。静かな夜は、心臓が止まってしまうのではないかと怖くて眠れない。\n\n「自分のリズムはないんですか」と訊いた。\n\n「ないんです」と彼は言った。胸に手を当てて。「私はこの街の呼吸の一部です。みんなが生きている音が、私を動かしている。だから、この街が死ぬとき、私も一緒に止まるんでしょう」\n\n彼はイヤホンをして、都会の喧騒を聴き続けている。それは彼にとって、延命装置のようなものだった。"},
  {num:63, cat:"身体", title:"視線男", text:"彼は誰とも目を合わせない。けれど、誰よりも見ている。\n\n彼の視界は、人の顔ではなく、人の周囲にある「空気の揺れ」を捉えているのだと言う。誰かが嘘をつくとき、空気がわずかに濁る。誰かが恋をするとき、空気が桜色に染まる。\n\n「私を見て、何が見えますか」と訊いた。\n\n「あなたは、自分を透明にしようとしています」と彼は、足元を見たまま言った。「でも、あなたの輪郭からは、青い炎のような光が漏れている。隠そうとしても、それは消えません」\n\n彼と話していると、裸にされているような気分になる。彼は目を使わずに、魂を直視していた。"},
  {num:64, cat:"身体", title:"胃袋男", text:"彼は、悲しいときほど食べる。\n\n空腹を満たすためではなく、心に開いた穴を物理的に埋めるために、彼は食物を流し込む。パン、肉、菓子、ありとあらゆるものを、彼は無表情で咀嚼し、飲み込む。\n\n「お腹、壊しませんか」と言った。\n\n「壊れた方がいいんです」と彼は言った。「痛みが、悲しみを追い越してくれるから。胃が重い間だけ、私は自分の重さを感じられる。中身が空っぽだと、どこかへ飛んでいってしまいそうで」\n\n彼の胃袋は、孤独という名のブラックホールだった。どれだけ食べても、彼は決して満たされることはなく、ただ重くなっていくだけだった。"},
  {num:65, cat:"身体", title:"皮膚男", text:"彼の皮膚は、世界に対してあまりに敏感すぎた。\n\n誰かの視線が刺さるように感じ、言葉が火傷のように残り、空気のわずかな変化が震えを引き起こす。彼は一年中、厚手の服を着込み、自分を守っている。\n\n「脱げないんですか」と訊いた。\n\n「脱いだら、世界に溶けてしまう」と彼は言った。「この服は、私という存在を繋ぎ止めるための境界線です。剥き出しの皮膚では、この世界はあまりに鋭利すぎる」\n\n彼は手袋をはめた手で、自分の顔をなぞった。彼の本当の顔は、誰にも、彼自身にも、もう見えなくなっていた。"},
  {num:66, cat:"身体", title:"嗅覚男", text:"彼は人の「死」の匂いを知っている。\n\nそれは腐敗臭ではなく、花の枯れる直前の、甘くて重い香りがするのだと言う。彼は街を歩きながら、その匂いを探している。助けるためではなく、看取るために。\n\n「私からも、その匂いがしますか」と冗談めかして訊いた。\n\n彼は私の首筋に鼻を寄せ、深く吸い込んだ。「いいえ」と彼は言った。「あなたは、雨上がりの土の匂いがします。まだ、これから始まる匂いです」\n\n彼は少しだけ寂しそうに笑った。彼は誰かの最期に立ち会い、その香りを記憶に刻むことで、自分の生を繋いでいた。"},
  {num:67, cat:"身体", title:"爪男", text:"彼は、不安になると爪を噛む。噛みすぎて、指先が常に赤く腫れている。\n\n爪は、彼にとって「自分を外界から守るための武器」だった。けれど、その武器が自分を傷つけるようになり、彼はそれを排除せずにはいられなくなった。\n\n「痛くないですか」と訊いた。\n\n「痛みが、安心に変わるんです」と彼は言った。「自分がここにいることを、痛みで確認している。爪が伸びるのが怖い。自分が、自分以外の何かに変わっていく気がして」\n\n彼の指先には、もう爪と呼べるものは残っていなかった。けれど、彼はまだ噛み続けている。自分という存在を、少しずつ削り取るように。"},
  {num:68, cat:"身体", title:"足音男", text:"彼の歩く音は、決して重ならない。\n\n右足と左足が地面を叩く音が、微妙にズレている。それはまるで、二人の人間が交互に歩いているような、奇妙なリズムだった。\n\n「なぜそんな歩き方を？」と訊いた。\n\n「一人で歩くのが怖いんです」と彼は言った。「こうしてリズムをずらすと、誰かが後ろについてきているような気がして、少しだけ勇気が出る。私は、自分自身を連れ添って歩いているんです」\n\n彼は夜の道を、一人で、けれど二人分の足音を響かせて歩いていった。その背中は、誰よりも孤独で、けれど誰よりも賑やかだった。"},
  {num:69, cat:"身体", title:"産毛男", text:"彼の体は、常に微細な振動に包まれている。\n\n全身の産毛が、目に見えない電波をキャッチしているのだと言う。誰かの悪意、街の悲鳴、遠くで起こる災害。彼はそれらを、皮膚の表面で感じ取っていた。\n\n「静かになりたいと思いませんか」と訊いた。\n\n「思います」と彼は言った。震えながら。「でも、受信を止めることは、生きることを止めることと同じなんです。私は、世界のノイズを全部引き受けて、それを体温に変えている。それしか、私にできることはないから」\n\n彼は耳を塞ぎながら、街の中に立ち尽くしていた。彼の震えは、世界への祈りのようでもあった。"},
  {num:70, cat:"身体", title:"歯ぎしり男", text:"彼は眠っている間、自分の言葉を噛み潰している。\n\n夜中に響くギギギという音は、彼が昼間に言えなかった言葉たちが、歯と歯の間で火花を散らしている音だった。朝、彼の口の中は血の味がした。\n\n「何をそんなに噛んでいるんですか」と訊いた。\n\n「真実です」と彼は言った。欠けた奥歯を見せて。「本当のことを言おうとすると、喉の奥で言葉が固まってしまう。それを寝ている間に、噛み砕いて消化しようとしているんです。でも、硬すぎてなかなか壊れない」\n\n彼はいつか、自分の顎が砕けてしまうことを知っていた。それでも彼は、言葉を飲み込むことをやめなかった。"},
  {num:71, cat:"身体", title:"唾液男", text:"彼の言葉は、常に湿っている。\n\n話すたびに、唇の端に白い泡が溜まり、言葉が水滴となって零れ落ちる。それは熱心さの表れではなく、彼の中にある感情が、液体となって溢れ出しているようだった。\n\n「そんなに慌てなくても」とハンカチを差し出した。\n\n「渇くのが怖いんです」と彼は言った。「心が乾いて、砂漠のようになってしまうのが。私は、自分の感情で自分を潤し続けていないと、枯れて死んでしまう。この唾液は、私の命の水です」\n\n彼は自分の言葉で溺れているようにも見えた。けれど、その濡れた瞳には、確かな生の輝きがあった。彼は、湿った世界でしか生きられない魚だった。"},
  {num:72, cat:"身体", title:"瞬き男", text:"彼は、一秒間に何度も瞬きをする。\n\n世界を動画としてではなく、何万枚もの静止画として捉えるために、彼は瞼を動かし続けている。一度でも長く目を閉じれば、世界が消えてしまうと信じている。\n\n「疲れませんか、そんなに見つめて」と訊いた。\n\n「見逃したくないんです」と彼は言った。「光が射した瞬間、誰かが微笑んだ瞬間。それらは一瞬で消えてしまう。私は、その断片を瞼の裏に焼き付けて、永遠に保存したい」\n\n彼の視界は常に断続的だった。けれど、その断片をつなぎ合わせた景色は、誰が見る世界よりも美しく、そして切なかった。彼は、一瞬の永遠を生きる記録者だった。"},
  {num:73, cat:"文学", title:"短編小説男", text:"彼の人生は、四百文字で完結する。\n\n朝起きて、歯を磨き、家を出る。そこで物語は終わる。翌朝、彼はまた新しい「四百文字」として目覚める。彼には「昨日」も「明日」もなく、ただ「今」という短編があるだけだった。\n\n「続きはないんですか」と訊いた。\n\n「続きがある人生は、長すぎて退屈です」と彼は言った。「四百文字なら、どんな悲劇も美しく終わることができる。私は、起承転結の『結』だけを求めて生きているんです」\n\n彼は今日も、自分の人生を一行ずつ削りながら生きている。余白のない、けれど完璧な物語。彼は、自分という作品の、厳格な編集者だった。"},
  {num:74, cat:"文学", title:"引用男", text:"彼は自分の言葉を持たない。\n\n挨拶は漱石から、怒りはドストエフスキーから、愛の告白はシェイクスピアから。彼の発言はすべて、誰か偉大な先人の言葉の切り貼りだった。\n\n「あなたの言葉を聴かせて」と言った。\n\n長い沈黙の後、彼は小さな声で言った。「……『私は、私ではない』。これは、誰の言葉だったかな」\n\n彼は必死に記憶を探っていた。けれど、自分の心から湧き上がる言葉を見つけることができなかった。彼は、何千もの魂を着込んだ、空っぽのマネキンだった。"},
  {num:75, cat:"文学", title:"付箋男", text:"彼の体は、黄色い小さな紙で覆われている。\n\n忘れてはいけないこと、やるべきこと、誰かへの伝言。彼の皮膚は、情報の海に溺れないためのメモ帳になっていた。風が吹くたび、彼の記憶は一枚ずつ剥がれ落ちていく。\n\n「大事なことが消えてしまいますよ」と注意した。\n\n「消えるから、新しいことが書けるんです」と彼は言った。「貼りすぎて、元の肌がどんな色だったか忘れてしまったけれど。でも、この付箋こそが、今の私を形作っている筋肉なんです」\n\n彼は剥がれかけた「愛している」という付箋を、慌てて胸に貼り直した。それは、もう何度も貼り直された跡で、粘着力を失っていた。"},
  {num:76, cat:"文学", title:"誤植男", text:"彼の人生には、常に「間違い」が混じっている。\n\n名前の漢字が微妙に違う、約束の時間が一分ずれる、告白の言葉が一番大事なところで噛む。彼は、完璧な文章の中に紛れ込んだ、たった一つの誤りだった。\n\n「直さないんですか」と訊いた。\n\n「直すと、私は私でなくなってしまう」と彼は言った。「この誤植があるから、私は世界に見つけてもらえる。完璧なものは、誰の目にも留まらない。私は、間違い続けることで、ここに存在しているんです」\n\n彼は誇らしげに、間違った方向に歩き出した。その足取りは、誰よりも確かだった。"},
  {num:77, cat:"文学", title:"栞男", text:"彼は、物語の途中で立ち止まったまま動かない。\n\n誰かの人生が大きく動くとき、彼はその「一ページ」に挟まり、時間が進むのを防いでいる。彼がそこにいる間だけ、物語は終わらずに済む。\n\n「そろそろページをめくりませんか」と提案した。\n\n「めくったら、この幸福な時間は終わってしまう」と彼は言った。「私は、このまどろみの中に永遠に挟まっていたい。結末を知ることより、期待の中に留まることの方が、ずっと豊かだと思いませんか」\n\n彼は本を閉じることを許さなかった。彼は、誰かの人生を中断させることで、その美しさを永遠に凍結させていた。"},
  {num:78, cat:"文学", title:"ペンネーム男", text:"彼は、自分の本名を誰も知らない。\n\n職業によって、場所によって、相手によって、彼は名前を使い分ける。彼は、幾千もの名前を持つことで、自分という存在を分散させていた。\n\n「本当のあなたは誰？」と訊いた。\n\n「誰もいないよ」と彼は笑った。「名前は仮面だ。仮面をたくさん持っていれば、どんな役でも演じられる。でも、仮面を全部剥がしたら、そこにはただの空気が残るだけさ。私は、物語の中だけに住む幽霊なんだ」\n\n彼は新しい名刺を差し出した。そこには、私の名前が書かれていた。彼は、私という物語の一部になろうとしていた。"},
  {num:79, cat:"文学", title:"行間男", text:"彼は、言葉と言葉の間に住んでいる。\n\n彼が話す言葉自体には意味がない。けれど、その沈黙の長さ、息遣い、視線の配り方に、彼の真意が隠されている。彼は、沈黙で会話する詩人だった。\n\n「はっきり言ってください」と苛立った。\n\n「はっきり言うと、嘘になる」と彼は、長い沈黙の後に言った。「言葉にした瞬間に、感情の半分は死んでしまう。私は、死んでいない半分を、この行間に込めているんです。読み取ってください、私の空白を」\n\n彼の周囲には、いつも心地よい、けれど重い静寂が漂っていた。私はその空白に、自分の言葉を書き込まずにはいられなかった。"},
  {num:80, cat:"文学", title:"翻訳男", text:"彼は、自分の感情を別の言語に変換しないと理解できない。\n\n「悲しい」という代わりに「It's raining in my heart」と言い、「好きだ」という代わりに「月がきれいですね」と言う。彼は、自分の心に直接触れることを極端に恐れていた。\n\n「翻訳なしで話して」と頼んだ。\n\n彼はひどく戸惑い、言葉を失った。やがて、絞り出すように言った。「……痛い」。それは、彼が初めて口にした、加工されていない生の言葉だった。\n\n彼は自分の胸を、不思議そうな顔で押さえた。翻訳という名の防壁を失い、彼はようやく、自分の人生の当事者になった。"},
  {num:81, cat:"文学", title:"速読男", text:"彼は、人の人生を一瞬で読み取ってしまう。\n\n顔を三秒見れば、その人の過去と未来、そして隠された欲望までを把握する。彼は、世界という名の巨大な図書館を、猛スピードでスキャンしていた。\n\n「私の人生、どうでした？」と訊いた。\n\n「三行でまとめられます」と彼は言った。「でも、まとめられたら、あなたは生きる意味を失う。読まなくていいこともある。私は速読しすぎて、物語の細部を楽しむことを忘れてしまった」\n\n彼は少しだけ疲れ切った目をしていた。彼は、誰もが丁寧にめくるページを、一瞥して捨ててしまう。その虚無感こそが、彼の博識の代償だった。"},
  {num:82, cat:"文学", title:"推敲男", text:"彼は、自分の過去を何度も書き直している。\n\n「あの時、ああ言えばよかった」「あの時、あっちの道を選べばよかった」。彼は記憶の原稿を常に持ち歩き、赤ペンで修正を加え続けている。\n\n「過去は変わりませんよ」と言った。\n\n「解釈は変えられます」と彼は言った。「納得のいく物語になるまで、私は何度でも書き直す。そうしなければ、私は今日という一ページをめくることができない。私は、自分の人生の完成度を高めたいんです」\n\n彼の記憶は、修正の跡で真っ黒になっていた。けれど、彼はまだ満足していない。完璧な過去を手に入れるまで、彼の「今」は永遠に仮稿のままだった。"},
  {num:83, cat:"文学", title:"絶版男", text:"彼は、誰の記憶にも残らない。\n\n彼と過ごした時間は、翌朝には綺麗さっぱり消えてしまう。彼は、一度読まれたら二度と手に入らない、幻の本のような男だった。\n\n「忘れられたくない」と彼は言った。初めて、弱音を吐いた。\n\n「私が覚えているよ」と私は答えた。けれど、その言葉も、彼にとっては虚しい響きだった。翌日、私は彼の顔を思い出せず、ただ「何か大切な物語を読んだ」という微かな余韻だけが胸に残っていた。\n\n彼は、世界という名の本棚から、静かに消えていく。その消え方さえも、美しく、そして残酷な文学だった。"},
  {num:84, cat:"文学", title:"あとがき男", text:"彼は、すべての事件が終わった後に現れる。\n\n恋が終わった時、仕事が失敗した時、祭りが終わった時。彼はひっそりと現れ、その出来事の「意味」を解説し、優しく締めくくる。彼は、人生の余韻を管理する管理人だった。\n\n「主役にはなれないんですか」と訊いた。\n\n「主役は疲れます」と彼は言った。「私は、誰かの物語が美しく閉じるのを手伝いたいだけです。あとがきがなければ、物語はただの出来事の羅列になってしまう。私は、あなたの人生に『意味』という名前の栞を挟みたいんです」\n\n彼はそう言って、私の肩を叩いた。彼が去った後、私の悲しみは、少しだけ誇らしい思い出に変わっていた。"},
  {num:85, cat:"時空", title:"一秒男", text:"彼は、すべての行動を一秒で終わらせる。\n\n食事、睡眠、仕事、そして愛の告白までも。彼の時間は、普通の人の何十倍もの速さで流れていた。彼にとって、世界は常にスローモーションに見えていた。\n\n「もっとゆっくり楽しんで」と言った。\n\n「私にとって、この一秒は、あなたの何時間にも相当するんです」と彼は言った。「密度の問題です。私は、一秒の中に無限の宇宙を見ている。長く生きることが豊かだとは限りません」\n\n彼は一瞬だけ私の目を見つめ、そして去っていった。その一瞬の視線の中に、私は彼の生涯のすべてを読み取った気がした。彼は、瞬きほどの人生を、誰よりも深く生きていた。"},
  {num:86, cat:"時空", title:"百年男", text:"彼は、自分の時間を切り売りして生きている。\n\n誰かに時間を分け与えることで、彼はその人の寿命を延ばし、代わりに自分の寿命を削る。彼の肌は、一日にして十年分老け込むこともあった。\n\n「なぜそんなことを」と訊いた。\n\n「私は、時間が余っているんです」と彼は言った。皺だらけの顔で。「百年後の景色も、昨日のことのように思い出せる。私は、長すぎる人生に飽きているんです。誰かの『あと数分』になれるなら、この時間は意味を持つ」\n\n彼は震える手で、病床の子供に触れた。子供の顔に赤みが差し、彼の髪は一瞬で真っ白になった。彼は、時間を愛という名の通貨に換える、聖なる銀行員だった。"},
  {num:87, cat:"時空", title:"砂時計男", text:"彼は、逆立ちをしないと頭が働かない。\n\n彼の中の知恵は、重力に従って下に溜まっていくのだと言う。頭を下にすることで、知恵が脳全体に行き渡り、ようやく言葉が出てくる。\n\n「不便じゃないですか」と言った。\n\n「世界を逆さまに見ることで、初めて正解が見えるんです」と彼は、逆立ちしたまま答えた。「みんな、地面に縛られすぎている。重力を逆にすれば、思考は空へ向かって落ちていく。それが本来の自由です」\n\n彼の知恵が尽きると、彼はゆっくりと元の体勢に戻る。その時、彼は何一つ覚えていない、ただの無口な男に戻っていた。彼は、時間を逆流させることでしか、真理に触れられない。"},
  {num:88, cat:"時空", title:"迷子男", text:"彼は、自分の家へ帰る方法を忘れてしまった。\n\n物理的な場所ではなく、自分の「心の居場所」がわからなくなったのだと言う。彼は、どんなに親しい人の隣にいても、常に「ここは自分の場所ではない」という違和感を抱えていた。\n\n「どこへ行きたいんですか」と訊いた。\n\n「わからないんだ」と彼は泣きそうな顔で言った。「でも、どこかに自分にぴったりの温度、ぴったりの光があるはずなんだ。それを探して、僕はもう何千キロも歩いてきた。いつか、辿り着けるのかな」\n\n彼は、地図のない世界を彷徨い続けている。彼は、自分という存在の所在を確認するために、歩き続けるしかなかった。"},
  {num:89, cat:"時空", title:"並行世界男", text:"彼は、常に「もう一人の自分」と会話している。\n\n別の選択肢を選んだ自分、別の人生を歩んでいる自分。彼は、無限に枝分かれした可能性を、すべて同時に生きているかのように振る舞っていた。\n\n「集中してください」と叱った。\n\n「今、別の世界の君と結婚式を挙げているんだ」と彼は、虚空を見つめて言った。「こっちの君は少し冷たいけれど、あっちの君はとても優しい。でも、僕はどっちの君も愛している。選ぶ必要なんてないんだ」\n\n彼は、現実という名の単一の線に縛られることを拒んでいた。彼は、無数の可能性を抱きしめ、その重みで、この世界から少しずつ浮き上がっていた。"},
  {num:90, cat:"時空", title:"逆回転男", text:"彼は、未来から過去に向かって生きている。\n\n彼にとって、記憶は「これから起こること」であり、予言は「過去の思い出」だった。彼は、誰かが死ぬ日から出会い、生まれた日に別れる。\n\n「明日、何が起こる？」と訊いた。\n\n「君と初めて出会った日のことを、思い出すよ」と彼は言った。「君はとても若くて、輝いていた。私たちは、これからどんどん他人になっていく。それが悲しくて、けれど楽しみなんだ」\n\n彼と過ごす時間は、常にカウントダウンのようだった。近づくほどに遠ざかる。彼は、失われていく時間を慈しむように、私の手を握りしめた。"},
  {num:91, cat:"時空", title:"瞬間移動男", text:"彼は、まばたきする間に別の場所にいる。\n\n距離の問題ではなく、彼の「興味」が移動した瞬間に、体もそこへ引き寄せられるのだと言う。彼とカフェで話していても、彼が窓の外の猫に気を取られた瞬間、彼はもう歩道に立っている。\n\n「じっとしていて」と頼んだ。\n\n「私の心は、常に漂流しているんです」と彼は言った。「一箇所に留まることは、停滞ではなく消滅を意味する。私は、変化し続けることでしか、存在を維持できない。私は、風よりも落ち着きがないんです」\n\n彼は、自分の体さえも持て余しているようだった。彼は、自由という名の刑罰を、永遠に受け続けている。"},
  {num:92, cat:"時空", title:"冬眠男", text:"彼は、人生の半分を眠って過ごしている。\n\nつらいことがあった時、寒い季節になった時、彼は布団に潜り込み、数ヶ月間目を覚まさない。彼にとって、眠りは逃避ではなく、魂の充電期間だった。\n\n「時間がもったいない」と言った。\n\n「起きている時間は、私にとって削り取られる時間です」と彼は言った。「夢の中で、私はようやく自分を取り戻せる。現実は、夢を見るための燃料に過ぎない。私は、眠るために生きているんです」\n\n彼が目覚めた時、世界は少しだけ変わっていた。彼は、古びた世界を新しい目で見つめ、また次の眠りへと備える。彼は、時間の波を潜り抜ける、孤独な潜水艦だった。"},

  {num:94, cat:"時空", title:"磁石男", text:"彼は、あらゆる金属を引き寄せる。\n\nスプーン、鍵、硬貨、そして誰かの重い想念までも。彼の周囲には、常にガラクタが浮遊し、彼を物理的にも精神的にも圧迫していた。\n\n「捨てればいいのに」と言った。\n\n「捨てても戻ってくるんです」と彼は言った。「私は、世界の『忘れられたもの』を磁力で繋ぎ止めている。私がこれらを離したら、世界はバラバラになってしまう。私は、ガラクタの守護神なんです」\n\n彼は重い荷物を背負い、よろよろと歩く。その姿は、世界の重みを一人で引き受けているようでもあった。彼は、拒絶できない愛を、全身で受け止めていた。"},
  {num:95, cat:"時空", title:"透明男", text:"彼は、誰にも気づかれない。\n\n目の前にいても、声をかけても、誰も彼を認識しない。彼は、世界の景色の一部として、完全に同化していた。彼が透明になれるのは、彼自身が「自分はいない」と信じ込んでいるからだった。\n\n「私はあなたが見えるよ」と声をかけた。\n\n彼は驚いた顔で私を見た。その瞬間、彼の体が輪郭を持ち、色が付き始めた。「見つけてくれて、ありがとう」と彼は泣いた。「誰かに見られることで、初めて私は人間になれた。見られない時間は、死んでいるのと変わらなかった」\n\n彼は、誰かの視線を浴びることで、ようやくこの世界に繋ぎ止められていた。彼は、孤独という名の透明な檻から、私の言葉で救い出された。"},
  {num:96, cat:"時空", title:"羅針盤男", text:"彼は、常に「北」を向いている。\n\n体が磁石のように固定され、どんなに動こうとしても、心臓の鼓動が北を指し示している。彼にとって、方向を失うことは死を意味していた。\n\n「北に何があるんですか」と訊いた。\n\n「理想です」と彼は言った。「決して辿り着けないけれど、そこを目指すことで、私は真っ直ぐに歩ける。迷うことは、自分を失うことだ。私は、この針に従って生きるしかない」\n\n彼は、南へ向かう私に背を向けて、北へと歩き出した。その足取りに迷いはなかった。けれど、その背中は、誰よりも不自由そうに見えた。彼は、自分の信念という名の牢獄に囚われていた。"},
  {num:97, cat:"時空", title:"時計塔男", text:"彼は、街の時間を管理している。\n\n彼が止まれば、街の時計も止まり、人々の動きも止まる。彼は、自分自身の脈拍を、街のシステムと同期させていた。彼は、生ける時計塔だった。\n\n「休んでください」と心配した。\n\n「休んだら、この街の思い出が消えてしまう」と彼は言った。「時間は、記憶を刻むための歯車だ。私が動き続けることで、人々の営みは物語になる。私は、この街の心臓なんです」\n\n彼の体からは、カチカチという機械音が絶え間なく聞こえていた。彼は、自分の肉体を歯車に変え、永遠という名の時間を刻み続けていた。"},
  {num:98, cat:"時空", title:"万華鏡男", text:"彼の視界は、常に砕け散っている。\n\n世界が対称的な模様として映り、一歩歩くたびに、景色がガラガラと音を立てて崩れ、新しい模様に変わる。彼は、美しすぎる混乱の中に住んでいた。\n\n「まともな景色が見たくない？」と訊いた。\n\n「これがまともな景色ですよ」と彼は言った。「世界は本来、断片的で、混沌としている。それを無理やり繋ぎ合わせているのは、人間のエゴだ。私は、ありのままのバラバラな世界を楽しんでいるんです」\n\n彼の瞳の中には、無数の鏡の破片が反射していた。彼が見る世界は、誰が見るよりも残酷で、けれど誰が見るよりも煌びやかだった。"},
  {num:99, cat:"終わり", title:"終わりの男", text:"九十九人目の男は、何もしない。\n\n彼はただ、そこに立っている。他の九十八人の物語をすべて聞き終え、それらを自分の中に静かに収納していく。彼が物語を受け取るたびに、その男たちは世界から一人ずつ消えていった。\n\n「次は、あなたの番ですか」と訊いた。\n\n「いいえ」と彼は言った。「私は、物語の終わりを見届けるためにだけ存在しています。九十九人が揃った時、世界は一つの大きな本になります。私は、その表紙を閉じる役割です」\n\n彼はゆっくりと私に背を向けた。彼の背中には、これまでの男たちの人生が、無数の傷跡のように刻まれていた。彼が歩き出すと、街の灯が一つずつ消え、静かな沈黙が訪れた。物語は、ここで終わる。"}

// ═══════════════ FIREBASE HELPERS ═══════════════
const isDataUri = s => typeof s === "string" && s.startsWith("data:");

async function compressImage(dataUri, maxPx=800, quality=0.72) {
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      const scale = Math.min(1, maxPx/Math.max(img.width,img.height));
      const w = Math.round(img.width*scale);
      const h = Math.round(img.height*scale);
      const canvas = document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = ()=>resolve(dataUri);
    img.src = dataUri;
  });
}

async function uploadMurmurFiles(murmurId, files) {
  return await Promise.all((files||[]).map(async (f) => {
    if (f.type==="image" && isDataUri(f.data)) {
      const compressed = await compressImage(f.data);
      return { ...f, data: compressed };
    }
    return f;
  }));
}

async function uploadAuthorIcon(dataUri) {
  if (!isDataUri(dataUri)) return dataUri;
  return await compressImage(dataUri, 400, 0.80);
}

// ═══════════════ FIRESTORE STORE ═══════════════
function useStore() {
  const [site,    setSiteLocal]   = useState(DEFAULT_SITE);
  const [author,  setAuthorLocal] = useState(DEFAULT_AUTHOR);
  const [novels,  setNovelsLocal] = useState([]);
  const [messages,setMsgLocal]    = useState([]);
  const [motokoStories, setMotokoStoriesLocal] = useState(MOTOKO_STORIES);
  const [worksMap, setWorksMapLocal] = useState(DEFAULT_WORKS_MAP);
  const [loading, setLoading]     = useState(true);
  const [dbError, setDbError]     = useState(null);

  useEffect(() => {
    const unsubs = [];
    let resolved = 0;
    const check = () => { resolved++; if(resolved >= 6) setLoading(false); };

    unsubs.push(db.collection("settings").doc("site").onSnapshot(snap => {
      if (snap.exists) setSiteLocal(snap.data()); else setSiteLocal(DEFAULT_SITE);
      check();
    }, e => { setDbError(e.message); check(); }));

    unsubs.push(db.collection("settings").doc("author").onSnapshot(snap => {
      if (snap.exists) setAuthorLocal(snap.data()); else setAuthorLocal(DEFAULT_AUTHOR);
      check();
    }, e => { setDbError(e.message); check(); }));

    unsubs.push(db.collection("novels").orderBy("createdAt","asc").onSnapshot(snap => {
      setNovelsLocal(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      check();
    }, e => { setDbError(e.message); check(); }));

    unsubs.push(db.collection("messages").orderBy("createdAt","desc").onSnapshot(snap => {
      setMsgLocal(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      check();
    }, e => { setDbError(e.message); check(); }));

    // 「すれ違い」(九十九人の男たち)の物語データ。Firestoreに保存がなければ
    // コード内のデフォルト(MOTOKO_STORIES)をそのまま使う。
    unsubs.push(db.collection("settings").doc("motokoStories").onSnapshot(snap => {
      if (snap.exists && Array.isArray(snap.data().items)) {
        setMotokoStoriesLocal(snap.data().items);
      } else {
        setMotokoStoriesLocal(MOTOKO_STORIES);
      }
      check();
    }, e => { setDbError(e.message); check(); }));

    // 「作品マップ」(四象限・レーダー・フローチャート) の設定データ。
    // Firestoreに保存がなければデフォルト雛形(DEFAULT_WORKS_MAP)を使う。
    // 保存されているデータはデフォルトと深いマージをして、後から追加された
    // フィールド（例：新しいレーダー軸の初期値）が欠けないようにする。
    unsubs.push(db.collection("settings").doc("worksMap").onSnapshot(snap => {
      if (snap.exists) {
        const d = snap.data() || {};
        // 旧バージョン（ranking: 単一オブジェクト）からの移行：
        // rankings配列がまだ無く、旧ranking.itemsがあればそれを1件目として変換する。
        let rankings = Array.isArray(d.rankings) ? d.rankings : null;
        if (!rankings) {
          if (d.ranking && (d.ranking.items||[]).length) {
            rankings = [{ id: uid(), title: d.ranking.title||"作品ランキング", desc: d.ranking.desc||"", items: d.ranking.items||[] }];
          } else {
            rankings = DEFAULT_WORKS_MAP.rankings;
          }
        }
        setWorksMapLocal({
          sectionsEnabled: { ...DEFAULT_WORKS_MAP.sectionsEnabled, ...(d.sectionsEnabled||{}) },
          quadrant: { ...DEFAULT_WORKS_MAP.quadrant, ...(d.quadrant||{}) },
          radar: { ...DEFAULT_WORKS_MAP.radar, ...(d.radar||{}) },
          flowchart: { ...DEFAULT_WORKS_MAP.flowchart, ...(d.flowchart||{}) },
          rankings,
        });
      } else {
        setWorksMapLocal(DEFAULT_WORKS_MAP);
      }
      check();
    }, e => { setDbError(e.message); check(); }));

    return () => unsubs.forEach(u => u());
  }, []);

  const uid = () => db.collection("_").doc().id;

  // 相関図（人物・関係・グループ）の保存に失敗した場合、これまではconsole.errorのみで
  // 画面上は何も起きなかったかのように見えてしまっていた（＝サイレントに失敗→再読み込みで元に戻る）。
  // 失敗時はユーザーにも分かるよう警告を出す。
  const reportSaveError = (e) => {
    const code = e && e.code ? e.code : "";
    let msg = "相関図の変更を保存できませんでした。\n";
    if (code === "permission-denied") {
      msg += "（Firestoreのセキュリティルールにより書き込みが拒否されました。管理者としてログインしているかご確認ください）";
    } else {
      msg += "（" + (e && e.message ? e.message : String(e)) + "）";
    }

  }, [updateRanking]);

  return { site, setSite, author, setAuthor, novels, messages, loading, dbError,
    addMessage, deleteMessage, markRead,
    addNovel, updateNovel, deleteNovel, addChapter, updateChapter, deleteChapter,
    addCharacter, updateCharacter, deleteCharacter,
    addCharRelation, updateCharRelation, deleteCharRelation,
    addCharGroup, updateCharGroup, deleteCharGroup, toggleCharGroupMember,
    addMurmur, deleteMurmur, updateMurmur,
    motokoStories, updateMotokoStory, addMotokoStory, deleteMotokoStory,
    worksMap, updateQuadrant, setQuadrantPoint, removeQuadrantPoint,
    updateRadar, addRadarAxis, updateRadarAxis, deleteRadarAxis, toggleRadarNovel, setRadarValue,
    updateFlowchart, addFlowNode, updateFlowNode, deleteFlowNode, moveFlowNode, addFlowEdge, updateFlowEdge, deleteFlowEdge, moveFlowEdge,
    updateRanking, addRanking, deleteRanking, addRankingItem, removeRankingItem, setRankingReason, moveRankingItem,
    toggleMapSection };
}

function groupByYM(items, getISO) {
  const map = new Map();
  items.forEach(item => {
    let ym = "不明";
    try { const d=new Date(getISO(item)); if(!isNaN(d)) ym=`${d.getFullYear()}年${d.getMonth()+1}月`; } catch {}
    if(!map.has(ym)) map.set(ym,[]);
    map.get(ym).push(item);
  });
  return [...map.entries()].sort(([a],[b])=>{
    if(a==="不明") return 1; if(b==="不明") return -1;
    const parse=s=>{ const m=s.match(/(\d+)年(\d+)月/); return m?new Date(+m[1],+m[2]-1):new Date(0); };
    return parse(a)-parse(b);
  });
}

// ═══════════════ 地の文・セリフ 抽出 ═══════════════
// 投稿されているすべての作品の本文から、「」（鉤括弧）で囲まれた部分を
// 「セリフ」として、それ以外の地の文の段落を「地の文」として自動抽出する。
// 新しい作品が投稿・更新されるたびに novels が変わるので、この関数を
// 呼ぶたびに最新のプールが再計算される（＝自動更新）。
const MIN_LINE_LEN = 20;  // 短すぎる断片を候補から除く（旧: 8）
const MAX_LINE_LEN = 320; // 長い段落もそのままプールに入るよう拡張（旧: 140。短文だけに偏らないため）

// 隣接する地の文の段落どうしをつなげて、より長い一続きの抜粋も候補にする。
// 一段落だけでは短すぎる断片も、前後とつなげることで地の文本来の呼吸や
// 描写の積み重ねが伝わる長さの抜粋になる。
const LONG_COMBO_MIN = 150; // これより短い組み合わせは単独の候補と重複しがちなので除く
const LONG_COMBO_MAX = 320; // 読みにくくなりすぎない上限

// 「〜と〇〇は言った」のように、話者表示だけで完結する一文・断片は、
// 単体で読んでも面白みのない部分になりがちなので、地の文の候補からは除外する。
const SPEECH_VERBS = "言|答え|呟|囁|叫|笑|頷|聞|尋|告げ|呼びかけ|怒鳴|漏ら|零し|返し|問|思|考え|感じ";
// パターン1：セリフの直後に付く「と〜言った」のような断片（セリフを取り除いた残り）
const SPEECH_TAG_RE = new RegExp(`^と[、,]?[^「」、,]{0,6}(は|が|も)?[、,]?(${SPEECH_VERBS})[^「」]{0,10}[。.]?$`);
const SHORT_SPEECH_TAG_RE = new RegExp(`^(と[^\\n]{0,20}(${SPEECH_VERBS})[^\\n]{0,8}[。.]?|と[^\\n]{0,12}[。.]?)$`);
// パターン2：セリフを伴わず「〇〇は静かに言った。」のように、話者表示だけで
// 一文まるごと完結してしまっている場合（従来はこのパターンを見逃していた）
const SPEECH_SENTENCE_RE = new RegExp(`^[^。「」\\n]{0,14}(は|が|も)[^。「」\\n]{0,14}(${SPEECH_VERBS})[^。「」\\n]{0,6}[。.]?$`);
function isSpeechTagOnly(text){
  if(text.length > 40) return false; // ある程度の長さがあれば、実質的な描写を含むとみなす（旧: 30）
  return SPEECH_TAG_RE.test(text) || SHORT_SPEECH_TAG_RE.test(text) || SPEECH_SENTENCE_RE.test(text);
}

function extractTenSenPool(novels){
  const narration = []; // 地の文プール
  const dialogue   = []; // セリフプール

  (novels||[]).forEach(novel => {
    (novel.chapters||[]).forEach(ch => {
      const lines = (ch.content||"").split("\n");
      const pureNarrSegs = []; // このチャプター内で、セリフを含まない地の文段落を順番通りに集める（連結候補用）

      lines.forEach(raw => {
        const line = raw.trim();
        if(!line) return;

        // 行内の「」をすべて取り出してセリフプールへ
        const quoteRe = /「([^「」]*)」/g;
        let m; let hasQuote=false;
        while((m = quoteRe.exec(line))){
          hasQuote = true;
          const q = m[1].trim();
          if(q.length >= MIN_LINE_LEN-4 && q.length <= MAX_LINE_LEN){
            dialogue.push({ text:`「${q}」`, novelTitle:novel.title, novelId:novel.id, chapterId:ch.id });
          }
        }
        // 「」を取り除いた残りが、ある程度の文字数を持つ地の文ならプールへ
        // （ただし「〜と〇〇は言った」のような話者表示だけの断片は除外する）
        const stripped = line.replace(/「[^「」]*」/g, "").trim();
        if(!hasQuote){
          // 元からセリフを含まない行はそのまま地の文として扱う
          if(!isSpeechTagOnly(line)) pureNarrSegs.push(line);
        } else if(stripped.length >= MIN_LINE_LEN && stripped.length <= MAX_LINE_LEN && !isSpeechTagOnly(stripped)){
          narration.push({ text:stripped, novelTitle:novel.title, novelId:novel.id, chapterId:ch.id });
        }
      });

      // 1) 単独の段落をそのまま地の文候補に（従来通り、短文〜長めの段落まで）
      pureNarrSegs.forEach(s => {
        if(s.length >= MIN_LINE_LEN && s.length <= MAX_LINE_LEN){
          narration.push({ text:s, novelTitle:novel.title, novelId:novel.id, chapterId:ch.id });
        }
      });

      // 2) 隣接する段落どうしをつなげた、より長い一続きの抜粋も候補に加える
      for(let i=0;i<pureNarrSegs.length-1;i++){
        const combo2 = pureNarrSegs[i] + pureNarrSegs[i+1];
        if(combo2.length >= LONG_COMBO_MIN && combo2.length <= LONG_COMBO_MAX){
          narration.push({ text:combo2, novelTitle:novel.title, novelId:novel.id, chapterId:ch.id });
        }
        if(i < pureNarrSegs.length-2){
          const combo3 = combo2 + pureNarrSegs[i+2];
          if(combo3.length >= LONG_COMBO_MIN && combo3.length <= LONG_COMBO_MAX){
            narration.push({ text:combo3, novelTitle:novel.title, novelId:novel.id, chapterId:ch.id });
          }
        }
      }
    });
  });
  return { narration, dialogue };
}


// 配列からランダムにn件（重複なし）を取り出す
function sampleN(arr, n){
  if(arr.length<=n) return [...arr];
  const pool=[...arr]; const result=[];
  for(let i=0;i<n;i++){
    const idx=Math.floor(Math.random()*pool.length);
    result.push(pool[idx]);
    pool.splice(idx,1);
  }
  return result;
}

// ═══════════════ 相関図：ラベル衝突回避・矢印描画ヘルパー ═══════════════
// 矩形どうしが重なっているかを判定する単純なAABB（軸並行境界矩形）判定
function rectsOverlap(a, b){
  return !(a.x+a.w < b.x || b.x+b.w < a.x || a.y+a.h < b.y || b.y+b.h < a.y);
}

// 登場人物アイコン・名前ラベル・関係線ラベルが互いに重ならないよう、
// 各ラベルの表示位置を簡易的な衝突回避アルゴリズムで調整する。
// ノードの位置（円アイコン自体）は著者が配置した意味のある情報なので動かさず、
// 「ラベルをどちら向きにずらすか」だけを調整することで重なりを避ける。
function layoutGraphLabels({characters, relations, px, py, nodeRadius=24}){
  const placedBoxes = []; // これまでに確定した「これ以上重ねてはいけない」矩形の一覧
  const nodePos = {};

  // ① まずすべてのノード（アイコン）自体を、動かせない障害物として確保する
  characters.forEach(c=>{
    const cx=px(c.x), cy=py(c.y);
    nodePos[c.id] = {cx, cy};
    placedBoxes.push({x:cx-nodeRadius, y:cy-nodeRadius, w:nodeRadius*2, h:nodeRadius*2});
  });

  // ② 各ノードの名前ラベルを、重ならない位置に配置する（下→上→右→左→斜めの順に候補を試す）
  const nodeRender = characters.map(c=>{
    const {cx,cy} = nodePos[c.id];
    const labelW = Math.max(26, (c.name||"").length * 13);
    const labelH = 16;
    const candidates = [
      {x:cx-labelW/2, y:cy+nodeRadius+8},                          // 下（デフォルト）
      {x:cx-labelW/2, y:cy-nodeRadius-8-labelH},                    // 上
      {x:cx+nodeRadius+10, y:cy-labelH/2},                          // 右
      {x:cx-nodeRadius-10-labelW, y:cy-labelH/2},                   // 左
      {x:cx-labelW/2, y:cy+nodeRadius+8+labelH+6},                  // さらに下
      {x:cx+nodeRadius+10, y:cy+nodeRadius+8},                      // 右下
      {x:cx-nodeRadius-10-labelW, y:cy+nodeRadius+8},               // 左下
      {x:cx+nodeRadius+10, y:cy-nodeRadius-8-labelH},               // 右上
      {x:cx-nodeRadius-10-labelW, y:cy-nodeRadius-8-labelH},        // 左上
      {x:cx-labelW/2, y:cy+nodeRadius+8+(labelH+6)*2},              // さらにさらに下
    ];
    // 候補の中から「重なりが発生しないもの」を優先して選び、すべて重なる場合は
    // 重なりの個数が最も少ない候補（＝もっとも見え方が崩れにくい候補）にフォールバックする
    let chosen = candidates[0], bestOverlapCount = Infinity;
    for(const cand of candidates){
      const box={x:cand.x,y:cand.y,w:labelW,h:labelH};
      const overlapCount = placedBoxes.filter(p=>rectsOverlap(p,box)).length;
      if(overlapCount===0){ chosen=cand; bestOverlapCount=0; break; }
      if(overlapCount<bestOverlapCount){ chosen=cand; bestOverlapCount=overlapCount; }
    }
    placedBoxes.push({x:chosen.x,y:chosen.y,w:labelW,h:labelH});
    return { id:c.id, cx, cy, labelCx: chosen.x+labelW/2, labelCy: chosen.y+labelH/2+4 };
  });

  // ③ 関係線のラベルを、重ならない位置に配置する（線の中点から垂直方向に少しずつずらして候補を試す）
  const edgeRender = relations.map(r=>{
    const a=nodePos[r.fromId], b=nodePos[r.toId];
    if(!a||!b) return { ...r, show:false };
    const x1=a.cx, y1=a.cy, x2=b.cx, y2=b.cy;
    if(!r.label){
      return { ...r, show:true, x1,y1,x2,y2, hasLabel:false };
    }
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const dx=x2-x1, dy=y2-y1;
    const len=Math.max(1, Math.hypot(dx,dy));
    const nx=-dy/len, ny=dx/len; // 線に直交する単位ベクトル
    const labelW = Math.max(22, r.label.length * 10);
    const labelH = 16;
    let chosen = {x:mx-labelW/2, y:my-labelH/2}, bestOverlapCount=Infinity;
    for(let i=0;i<9;i++){
      const offset = i===0 ? 0 : Math.ceil(i/2)*15*(i%2===0?1:-1);
      const lx=mx+nx*offset, ly=my+ny*offset;
      const box={x:lx-labelW/2, y:ly-labelH/2, w:labelW, h:labelH};
      const overlapCount = placedBoxes.filter(p=>rectsOverlap(p,box)).length;
      if(overlapCount===0){ chosen={x:box.x,y:box.y}; placedBoxes.push(box); bestOverlapCount=0; break; }
      if(overlapCount<bestOverlapCount){ chosen={x:box.x,y:box.y}; bestOverlapCount=overlapCount; }
      if(i===8){ placedBoxes.push({x:chosen.x,y:chosen.y,w:labelW,h:labelH}); }
    }
    return { ...r, show:true, x1,y1,x2,y2, hasLabel:true, labelCx:chosen.x+labelW/2, labelCy:chosen.y+labelH/2, labelW, labelH };
  });

  return { nodeRender, edgeRender };
}

// 線を円アイコンの「縁」で止め、必要に応じて矢印（三角形）の頂点座標も計算する。
// arrowType: "none"（線のみ） | "end"（fromId→toIdの一方向矢印） | "both"（双方向矢印）
function arrowGeometry(x1,y1,x2,y2,arrowType,nodeRadius=24,arrowSize=9){
  const dx=x2-x1, dy=y2-y1;
  const len=Math.max(1, Math.hypot(dx,dy));
  const ux=dx/len, uy=dy/len;
  const hasEndArrow = arrowType==="end" || arrowType==="both";
  const hasStartArrow = arrowType==="both";
  const startTrim = nodeRadius + (hasStartArrow?arrowSize:0);
  const endTrim = nodeRadius + (hasEndArrow?arrowSize:0);
  const lx1=x1+ux*startTrim, ly1=y1+uy*startTrim;
  const lx2=x2-ux*endTrim, ly2=y2-uy*endTrim;
  const makeTriangle=(tipX,tipY,dirX,dirY)=>{
    const angle=Math.atan2(dirY,dirX);
    const a1=angle+Math.PI-Math.PI/7, a2=angle+Math.PI+Math.PI/7;
    return `${tipX},${tipY} ${tipX+arrowSize*Math.cos(a1)},${tipY+arrowSize*Math.sin(a1)} ${tipX+arrowSize*Math.cos(a2)},${tipY+arrowSize*Math.sin(a2)}`;
  };
  return {
    lx1, ly1, lx2, ly2,
    endArrowPoints: hasEndArrow ? makeTriangle(x2-ux*nodeRadius, y2-uy*nodeRadius, ux, uy) : null,
    startArrowPoints: hasStartArrow ? makeTriangle(x1+ux*nodeRadius, y1+uy*nodeRadius, -ux, -uy) : null,
  };
}

    .novel-card{background:var(--bg);cursor:pointer;overflow:hidden;transition:background .3s}.novel-card:hover{background:var(--deep)}
    .nc-cover{height:170px;position:relative;overflow:hidden}
    .nc-cover-bg{position:absolute;inset:0;transition:transform .6s cubic-bezier(.25,.46,.45,.94)}.novel-card:hover .nc-cover-bg{transform:scale(1.06)}
    .nc-cover-fade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 20%,var(--bg) 100%)}.novel-card:hover .nc-cover-fade{background:linear-gradient(to bottom,transparent 20%,var(--deep) 100%)}
    .nc-dot{position:absolute;top:16px;right:16px;width:7px;height:7px;border-radius:50%}
    .nc-body{padding:20px 24px 24px}
    .nc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}.nc-tag{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--txt3);border:1px solid var(--border);padding:2px 7px}
    .nc-title{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--txt);line-height:1.15;margin-bottom:5px}
    .nc-subtitle{font-size:11px;color:var(--txt3);font-style:italic;letter-spacing:.06em;margin-bottom:12px}
    .nc-desc{font-size:12px;line-height:1.9;color:var(--txt2);margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .nc-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border)}
    .nc-author{font-size:11px;color:var(--txt3)}.nc-words{font-size:10px;color:var(--txt3)}
    .no-results{padding:80px 0;text-align:center;color:var(--txt3);font-size:14px;letter-spacing:.1em;grid-column:1/-1}
    /* DETAIL */
    .detail-hero{height:420px;position:relative;overflow:hidden;margin-top:var(--nav-h)}
    .detail-hero-bg{position:absolute;inset:0}.detail-hero-fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,.2),var(--bg) 100%)}
    .detail-hero-content{position:absolute;bottom:52px;left:0;right:0;max-width:800px;margin:0 auto;padding:0 48px}
    .detail-genre{font-size:9px;letter-spacing:.4em;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
    .detail-title{font-family:var(--serif);font-size:clamp(36px,7vw,66px);font-weight:300;color:var(--txt);line-height:1.1;margin-bottom:8px}
    .detail-subtitle{font-size:13px;color:var(--txt2);font-style:italic}
    .detail-body{max-width:800px;margin:0 auto;padding:0 48px 80px}
    .detail-meta-bar{display:flex;align-items:center;gap:24px;padding:24px 0;border-bottom:1px solid var(--border);margin-bottom:36px;flex-wrap:wrap}
    .back-link{background:none;border:none;cursor:pointer;font-family:var(--body);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--txt3);padding:0;transition:color .25s;margin-right:auto}.back-link:hover{color:var(--accent)}
    .detail-meta-item{font-size:11px;color:var(--txt3);letter-spacing:.08em}.detail-meta-item b{color:var(--txt2);font-weight:400}
    .detail-desc{font-size:15px;line-height:2.4;color:var(--txt2);margin-bottom:48px;padding-bottom:48px;border-bottom:1px solid var(--border);letter-spacing:.04em}
    .detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:44px}.detail-tag{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--txt3);border:1px solid var(--border);padding:4px 11px}
    .toc-title{font-family:var(--serif);font-size:17px;font-weight:300;color:var(--txt3);letter-spacing:.14em;margin-bottom:18px}
    .toc-item{display:flex;align-items:center;gap:18px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:padding-left .2s}.toc-item:hover{padding-left:5px}.toc-item:hover .toc-text{color:var(--accent)}
    .toc-num{font-family:var(--serif);font-size:11px;color:var(--txt3);width:32px;flex-shrink:0}
    .toc-text{font-size:14px;color:var(--txt);transition:color .2s;letter-spacing:.04em}
    .toc-arrow{margin-left:auto;font-size:15px;color:var(--txt3);transition:transform .2s,color .2s}.toc-item:hover .toc-arrow{transform:translateX(5px);color:var(--accent)}
    /* READING */
    .reading-nav{position:fixed;top:0;left:0;right:0;z-index:500;height:54px;padding:0 36px;display:flex;align-items:center;gap:14px;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .reading-back{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:15px;padding:4px;transition:color .2s}.reading-back:hover{color:var(--accent)}
    .reading-crumb{font-size:11px;color:var(--txt3);letter-spacing:.1em}.reading-crumb b{color:var(--txt2);font-weight:400}
    .reading-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .progress-rail{position:fixed;top:54px;left:0;right:0;height:2px;background:var(--border);z-index:500}.progress-fill{height:100%;background:var(--accent);transition:width .1s}
    .reading-wrap{background:var(--reading-bg);min-height:100vh}
    .reading-content{max-width:820px;margin:0 auto;padding:88px 40px 60px}
    .reading-eyebrow{font-size:9px;letter-spacing:.44em;color:var(--accent);text-transform:uppercase;margin-bottom:20px;text-align:center}
    .reading-ch-title{font-family:'Noto Serif JP',serif;font-size:clamp(18px,3.5vw,24px);font-weight:500;color:var(--txt);line-height:1.9;margin-bottom:56px;padding-bottom:28px;border-bottom:1px solid var(--border);text-align:center;letter-spacing:.2em}
    .reading-body{font-family:'Noto Serif JP',serif;font-size:16px;line-height:2.3;color:var(--txt);letter-spacing:.06em}
    .reading-body p{margin-bottom:0;text-indent:1em}
    .reading-foot{display:flex;justify-content:space-between;align-items:center;max-width:820px;margin:0 auto;padding:48px 40px 90px;border-top:1px solid var(--border)}
    .reading-foot-btn{background:none;border:1px solid var(--border);color:var(--txt2);font-family:var(--body);font-size:11px;letter-spacing:.18em;padding:10px 20px;cursor:pointer;transition:all .2s;text-transform:uppercase}
    .reading-foot-btn:hover{border-color:var(--accent);color:var(--accent)}.reading-foot-btn:disabled{opacity:.22;cursor:not-allowed}
    .reading-foot-pos{font-family:var(--serif);font-size:14px;color:var(--txt3)}
    /* HITORIGOTO */
    .htg-wrap{max-width:800px;margin:0 auto;padding:calc(var(--nav-h) + 50px) 48px 80px}
    .htg-header{margin-bottom:48px}
    .htg-eyebrow{font-size:9px;letter-spacing:.44em;color:var(--txt3);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .htg-eyebrow::before{content:'';display:inline-block;width:22px;height:1px;background:var(--accent)}
    .htg-title{font-family:var(--serif);font-size:clamp(38px,7vw,64px);font-weight:300;color:var(--txt);line-height:1;margin-bottom:10px}
    .htg-sub{font-size:12px;color:var(--txt3);letter-spacing:.14em}
    .htg-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:28px;flex-wrap:wrap}
    .htg-count{font-size:10px;color:var(--txt3);letter-spacing:.18em;white-space:nowrap}
    .htg-card{border-bottom:1px solid var(--border);padding:28px 0}
    .htg-card-date{font-size:10px;letter-spacing:.2em;color:var(--txt3);margin-bottom:14px}
    .htg-card-text{font-size:15px;line-height:2.1;color:var(--txt2);white-space:pre-wrap;letter-spacing:.04em}
    .htg-card-files{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .htg-img{max-width:260px;max-height:180px;object-fit:cover;border:1px solid var(--border);border-radius:2px;cursor:pointer;transition:opacity .2s}.htg-img:hover{opacity:.85}
    .htg-file-link{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);padding:6px 12px;font-size:11px;color:var(--txt2);text-decoration:none;border-radius:2px;letter-spacing:.06em;transition:all .2s}.htg-file-link:hover{border-color:var(--accent);color:var(--accent)}
    .htg-empty{padding:72px 0;text-align:center;color:var(--txt3);font-size:14px;letter-spacing:.1em}
    /* LIGHTBOX */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
    /* ═══════════════ ENCOUNTER (九十九人の男たち) ═══════════════ */
    /* 「淵」全体のテーマ変数(--bg/--accent等)には依存せず、独立した黒背景の世界観を保つ */
    .enc-root{
      --enc-bg:#0a0a0c; --enc-text-p:#e0e0e0; --enc-text-s:#888; --enc-accent:#fff;
      --enc-font:"Shippori Mincho","Noto Serif JP","MS PMincho",serif;
      position:fixed; inset:0; z-index:600;
      background-color:var(--enc-bg); color:var(--enc-text-p);
      font-family:var(--enc-font);
      overflow:hidden; display:flex; justify-content:center; align-items:center;
    }
    .enc-noise{
      position:absolute; inset:0;
      background:linear-gradient(to bottom, rgba(10,10,12,0.8), rgba(10,10,12,0.92));
      z-index:0; opacity:.3; pointer-events:none;
    }
    .enc-exit-btn{
      position:absolute; top:22px; right:26px; z-index:50;
      background:transparent; border:1px solid #2a2a2e; color:var(--enc-text-s);
      font-family:var(--enc-font); font-size:11px; letter-spacing:.16em;
      padding:8px 16px; cursor:pointer; transition:.3s; border-radius:2px;
    }
    .enc-exit-btn:hover{ border-color:#888; color:var(--enc-accent); }
    .enc-archive-btn{
      position:absolute; top:22px; left:26px; z-index:50;
      background:transparent; border:1px solid #2a2a2e; color:var(--enc-text-s);
      font-family:var(--enc-font); font-size:11px; letter-spacing:.16em;
      padding:8px 16px; cursor:pointer; transition:.3s; border-radius:2px;
      display:inline-flex; align-items:center; gap:7px;
    }
    .enc-archive-btn:hover{ border-color:#888; color:var(--enc-accent); }
    .enc-archive-btn-dot{
      width:6px; height:6px; border-radius:50%; background:#e0c97a;
      box-shadow:0 0 6px rgba(224,201,122,.8);
      animation:encDotPulse 1.6s ease-in-out infinite;
    }
    @keyframes encDotPulse{ 0%,100%{opacity:.5;} 50%{opacity:1;} }
    .enc-city-container{
      position:absolute; bottom:0; left:0; width:100%; height:300px; z-index:5;
      pointer-events:none; transition:opacity 1.5s ease, transform 3.0s cubic-bezier(.25,.1,.25,1);
      opacity:1;
    }
    .enc-city-hidden{ opacity:0!important; transform:translateY(50px); }

lass='b' x='860' y='85' width='70' height='115'/%3E%3Crect class='w' x='875' y='105' width='8' height='10'/%3E%3Crect class='w' x='900' y='105' width='8' height='10'/%3E%3Crect class='w' x='875' y='125' width='8' height='10'/%3E%3Crect class='w' x='900' y='125' width='8' height='10'/%3E%3Crect class='b' x='930' y='60' width='70' height='140'/%3E%3Crect class='w' x='945' y='80' width='10' height='12'/%3E%3Crect class='w' x='970' y='80' width='10' height='12'/%3E%3Crect class='w' x='945' y='105' width='10' height='12'/%3E%3Crect class='w' x='970' y='105' width='10' height='12'/%3E%3C/svg%3E");
      background-repeat:repeat-x; background-size:25% 100%;
    }
    .enc-container{ width:90%; max-width:600px; text-align:center; position:relative; z-index:10; }
    .enc-view{ transition:opacity .8s ease; cursor:pointer; }
    .enc-label{
      font-size:.8rem; letter-spacing:.5rem; color:var(--enc-text-s);
      margin-bottom:2rem; display:block; animation:encPulse 4s infinite;
    }
    .enc-man-title{
      font-size:2.2rem; font-weight:500; letter-spacing:.3rem;
      text-shadow:0 0 15px rgba(255,255,255,.1); margin-bottom:1rem;
    }
    .enc-hint{ color:var(--enc-text-s); font-size:.75rem; margin-top:2rem; opacity:.6; }
    .enc-story-view{
      text-align:left; opacity:0; transition:opacity 1s ease;
      max-height:80vh; overflow-y:auto; padding:40px;
      background:rgba(10,10,12,.95); border-radius:4px;
    }
    .enc-story-view.show{ opacity:1; }
    .enc-story-header{
      border-bottom:1px solid #222; padding-bottom:1rem; margin-bottom:2.5rem;
      display:flex; justify-content:space-between; align-items:baseline;
    }
    .enc-story-num{ font-family:sans-serif; font-size:.7rem; color:var(--enc-text-s); letter-spacing:.1rem; }
    .enc-story-cat{ font-size:.7rem; color:#666; border:1px solid #333; padding:2px 8px; border-radius:10px; }
    .enc-story-title{ margin-top:.5rem; font-weight:500; font-family:var(--enc-font); font-size:1.4rem; color:var(--enc-text-p); }
    .enc-reread-badge{
      display:inline-block; font-size:.68rem; letter-spacing:.15em;
      color:var(--enc-accent); border:1px solid #3a3a30; background:rgba(255,255,255,.03);
      padding:3px 10px; border-radius:10px; margin-bottom:1.6rem;
    }
    .enc-story-content{
      font-size:1.05rem; line-height:2.5; white-space:pre-wrap;
      margin-bottom:5rem; color:#ccc; text-align:justify;
    }
    .enc-next-btn{
      background:transparent; border:1px solid #333; color:var(--enc-text-s);
      padding:12px 40px; cursor:pointer; font-family:var(--enc-font); font-size:.85rem;
      transition:.4s; display:block; margin:0 auto; letter-spacing:.1rem;
    }
    .enc-next-btn:hover{ border-color:#888; color:var(--enc-accent); }
    .enc-progress{
      position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
      font-size:.65rem; letter-spacing:.2rem; color:#555; z-index:20;
    }
    .enc-blackout{
      position:fixed; inset:0; background:#000; z-index:700; opacity:0;
      transition:opacity 4s ease; display:flex; flex-direction:column;
      justify-content:center; align-items:center; text-align:center; color:#fff;
      pointer-events:none;
    }
    .enc-blackout.show{ opacity:1; pointer-events:auto; }
    @keyframes encPulse{ 0%{opacity:.2;} 50%{opacity:.5;} 100%{opacity:.2;} }

    /* ── 不在の男（百人目）演出 ── */
    .enc-absent-silence{ display:flex; align-items:center; justify-content:center; }
    .enc-absent-open-sound{
      font-size:1.4rem; letter-spacing:.5rem; color:#3a3a40;
      animation:encAbsentBreath 3.2s ease-in-out infinite;
    }
    @keyframes encAbsentBreath{ 0%,100%{opacity:0;} 50%{opacity:.55;} }

    .enc-absent-wrap{
      width:90%; max-width:620px; max-height:82vh; overflow-y:auto;
      padding:10px 20px; cursor:default;
    }
    .enc-absent-wrap::-webkit-scrollbar{ width:2px; }
    .enc-absent-wrap::-webkit-scrollbar-thumb{ background:#222; }
    .enc-absent-num{
      font-family:sans-serif; font-size:.75rem; letter-spacing:.5rem;
      color:#4a4a52; margin-bottom:1.2rem; opacity:.7;
      animation:encAbsentFadeIn 2.4s ease forwards;
    }
    .enc-absent-title{
      font-family:var(--enc-font); font-size:1.9rem; font-weight:500;
      letter-spacing:.4rem; color:#e8e2d4; margin-bottom:2.8rem;
      text-shadow:0 0 22px rgba(232,226,212,.18);
      animation:encAbsentFadeIn 2.4s ease forwards;
    }
    @keyframes encAbsentFadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
    .enc-absent-text{ text-align:left; }
    .enc-absent-para{
      font-size:1rem; line-height:2.6; color:#a8a8ad; white-space:pre-wrap;
      margin-bottom:1.9rem; text-align:justify;
      opacity:0; transform:translateY(8px); filter:blur(2px);
      transition:opacity 2.4s ease, transform 2.4s ease, filter 2.4s ease;
    }
    .enc-absent-para.show{ opacity:1; transform:translateY(0); filter:blur(0); }

    /* ── コンプリート／敬意の演出 ── */
    .enc-complete-wrap{
      width:90%; max-width:560px; padding:0 25px;
      animation:encAbsentFadeIn 1.8s ease forwards;
    }
    .enc-complete-count{
      font-family:var(--enc-font); letter-spacing:.15rem;
      margin-bottom:.6rem;
    }
    .enc-complete-num{ font-size:2.6rem; color:var(--enc-accent); font-weight:500; }
    .enc-complete-slash{ font-size:1.6rem; color:#555; margin:0 .4rem; }
